name: Story Review Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '22.x'

jobs:
  # ── Baseline: existing tests must pass ──
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ── Scenario review: rubric-based acceptance tests ──
  review:
    needs: baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Extract story ID from PR title
        id: story
        run: |
          STORY_ID=$(echo "${{ github.event.pull_request.title }}" | grep -oP 'STORY-\d+' || echo "")
          echo "story_id=$STORY_ID" >> "$GITHUB_OUTPUT"

      - name: Check for scenario tests
        if: steps.story.outputs.story_id != ''
        id: check
        run: |
          DIR="tests/review/${{ steps.story.outputs.story_id }}"
          if [ -d "$DIR" ] && [ "$(ls -A "$DIR"/*.mjs 2>/dev/null)" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scenario tests
        if: steps.check.outputs.has_tests == 'true'
        id: scenarios
        continue-on-error: true
        run: |
          node tests/review/runner.mjs "${{ steps.story.outputs.story_id }}" > review-report.json || true
          cat review-report.json

      - name: Post review
        if: steps.check.outputs.has_tests == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'review-report.json';

            let report;
            try {
              const raw = fs.readFileSync(path, 'utf8');
              report = JSON.parse(raw);
            } catch (e) {
              report = { score: 0, passed: false, details: [{ id: 'runner', verdict: 'FAIL', reason: `Runner error: ${e.message}` }] };
            }

            const lines = [
              `## Story Review — Score: ${report.score}%`,
              '',
              `**Verdict: ${report.passed ? '✅ APPROVED' : '❌ CHANGES REQUESTED'}**`,
              '',
              '| Scenario | Weight | Score | Verdict | Details |',
              '|----------|--------|-------|---------|---------|',
            ];

            for (const d of report.details || []) {
              const emoji = d.verdict === 'PASS' ? '✅' : d.verdict === 'PARTIAL' ? '⚠️' : '❌';
              lines.push(`| ${d.id} | ${d.weight} | ${d.score} | ${emoji} ${d.verdict} | ${d.reason} |`);
            }

            lines.push('');
            lines.push(`> Threshold: 85%`);

            const event = report.passed ? 'APPROVE' : 'REQUEST_CHANGES';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event,
              body: lines.join('\n')
            });

      - name: Skip review (no scenario tests found)
        if: steps.story.outputs.story_id == '' || steps.check.outputs.has_tests != 'true'
        run: echo "No scenario tests found for '${{ steps.story.outputs.story_id }}' — skipping review gate"
