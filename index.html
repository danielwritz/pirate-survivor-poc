  const rowH = 36;
  const makeRect = (x, y) => ({ x, y, w: 34, h: 28 });
  sy.crewRects = {
    crewSub: makeRect(crewPanelX + 176, crewPanelY),
    crewAdd: makeRect(crewPanelX + 210, crewPanelY),
    rowerSub: makeRect(crewPanelX + 176, crewPanelY + rowH),
    rowerAdd: makeRect(crewPanelX + 210, crewPanelY + rowH),
    gunnerSub: makeRect(crewPanelX + 176, crewPanelY + rowH * 2),
    gunnerAdd: makeRect(crewPanelX + 210, crewPanelY + rowH * 2),
    repairSub: makeRect(crewPanelX + 176, crewPanelY + rowH * 3),
    repairAdd: makeRect(crewPanelX + 210, crewPanelY + rowH * 3)
  };

  ctx.textAlign = 'left';
  ctx.fillStyle = '#c4e1f2';
  ctx.font = '15px system-ui';
  ctx.fillText(`Crew Total (${SHIPYARD_COST.crew}g hire): ${player.crew}/${previewDeckCap}`, crewPanelX, crewPanelY + 17);
  ctx.fillText(`Rowers: ${player.rowers}`, crewPanelX, crewPanelY + rowH + 17);
  ctx.fillText(`Muskets/Gunners: ${player.gunners}`, crewPanelX, crewPanelY + rowH * 2 + 17);
  ctx.fillText(`Repair Crew: ${player.repairCrew}`, crewPanelX, crewPanelY + rowH * 3 + 17);

  for (const [name, rect] of Object.entries(sy.crewRects)) {
    ctx.fillStyle = '#2a4a60';
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = '#e8f5ff';
    ctx.textAlign = 'center';
    const symbol = name.endsWith('Add') ? '+' : '−';
    ctx.fillText(symbol, rect.x + rect.w * 0.5, rect.y + 20);
  }

  const controlsX = rightX + 2;
  const controlsY = panelY + panelH - 92;
  const canAfford = sy.freeEdit || state.gold >= sy.pendingCost;
  const hasStarterPreset = !sy.freeEdit || sy.starterPresetChosen;
  const canLaunch = canAfford && hasStarterPreset;

  sy.resetRect = { x: controlsX, y: controlsY, w: 130, h: 44 };
  sy.launchRect = { x: controlsX + 146, y: controlsY, w: 150, h: 44 };

  ctx.fillStyle = '#2a4a60';
  ctx.fillRect(sy.resetRect.x, sy.resetRect.y, sy.resetRect.w, sy.resetRect.h);
  ctx.fillStyle = canLaunch ? '#2f7f5d' : '#5d3a3a';
  ctx.fillRect(sy.launchRect.x, sy.launchRect.y, sy.launchRect.w, sy.launchRect.h);

  ctx.fillStyle = '#e8f5ff';
  ctx.font = '16px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Reset', sy.resetRect.x + sy.resetRect.w * 0.5, sy.resetRect.y + 28);
  const launchLabel = !hasStarterPreset ? 'Pick Preset' : (canAfford ? 'Launch' : 'Need Gold');
  ctx.fillText(launchLabel, sy.launchRect.x + sy.launchRect.w * 0.5, sy.launchRect.y + 28);

  if (sy.message) {
    ctx.fillStyle = '#ffd5b0';
    ctx.font = '15px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(sy.message, panelX + 24, panelY + panelH - 24);
  }
}

function draw() {
  canvas.style.cursor = state.mode === 'combat' ? 'none' : 'default';
  if (state.mode === 'shipyard') {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawShipyardScreen();
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawWorld();
  drawRangeIndicators();

  for (const p of state.particles) {
    if (!p.wake) continue;
    const life = clamp(p.life / p.maxLife, 0, 1);
    const pp = toScreen(p.x, p.y);
    const pr = p.size * (0.45 + life * 0.75) * state.zoom;
    ctx.save();
    ctx.translate(pp.x, pp.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = life;
    ctx.fillStyle = p.color;
    if (p.wakeLine) {
      const len = (p.lineLen || (pr * 2.2)) * state.zoom * (0.88 + life * 0.2);
      const width = Math.max(0.9, (p.lineW || 1) * state.zoom * (0.88 + life * 0.12));
      ctx.fillRect(-len * 0.5, -width * 0.5, len, width);
    } else if (p.circle) {
      ctx.beginPath();
      ctx.arc(0, 0, pr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  if (!state.playerSunk) drawShip();
  drawCollectorSkiffs();

  for (const b of state.bullets) {
    const bp = toScreen(b.x, b.y);
    const wt = b.weaponType;
    // Themed bullet visuals per weapon type
    if (wt === 'ghostCannon') {
      // Teal glowing orb
      const r = 5 * state.zoom;
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r * 1.7, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(80,220,200,0.18)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#50dcc8';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bp.x - 1.2, bp.y - 1.2, r * 0.38, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,255,250,0.7)';
      ctx.fill();
    } else if (wt === 'fireBomb') {
      // Large orange-red pulsing bomb
      const t = state.time * 8;
      const pulse = 1 + Math.sin(t) * 0.18;
      const r = 6 * state.zoom * pulse;
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,80,0,0.22)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ff5010';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bp.x - 1.5, bp.y - 1.5, r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,200,100,0.8)';
      ctx.fill();
    } else if (wt === 'chainShot') {
      // Two linked blue-white spheres
      const r = 4 * state.zoom;
      const ang = Math.atan2(b.vy, b.vx);
      const offX = Math.cos(ang) * r * 1.2;
      const offY = Math.sin(ang) * r * 1.2;
      ctx.strokeStyle = 'rgba(180,200,255,0.7)';
      ctx.lineWidth = 2 * state.zoom;
      ctx.beginPath();
      ctx.moveTo(bp.x - offX, bp.y - offY);
      ctx.lineTo(bp.x + offX, bp.y + offY);
      ctx.stroke();
      for (const [ox, oy] of [[-offX, -offY], [offX, offY]]) {
        ctx.beginPath();
        ctx.arc(bp.x + ox, bp.y + oy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#a0b8ff';
        ctx.fill();
      }
    } else if (wt === 'scattershot') {
      // Small yellow-white pellet
      const r = 3 * state.zoom;
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#f0d870';
      ctx.fill();
    } else {
      // Default: grey cannonball / musket ball
      const r = b.heavy ? 5 * state.zoom : 3.5 * state.zoom;
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#c8ccd0';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bp.x - 1.2, bp.y - 1.2, r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fill();
    }
  }

  for (const d of state.drops) {
    const dp = toScreen(d.x, d.y);
    const spin = Math.cos(state.time * 7 + d.x * 0.03 + d.y * 0.04);
    const rx = Math.max(1, 4 * Math.abs(spin) * state.zoom);
    const ry = 4 * state.zoom;
    ctx.fillStyle = '#ffdd55';
    ctx.fillRect(dp.x - rx, dp.y - ry, rx * 2, ry * 2);
    ctx.fillStyle = '#fff3b5';
    ctx.fillRect(dp.x - rx * 0.25, dp.y - ry * 0.9, rx * 0.5, ry * 1.8);
  }

  for (const p of state.particles) {
    if (p.wake) continue;
    const life = clamp(p.life / p.maxLife, 0, 1);
    const pp = toScreen(p.x, p.y);
    const pr = p.size * (0.45 + life * 0.75) * state.zoom;
    ctx.save();
    ctx.translate(pp.x, pp.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = life;
    ctx.fillStyle = p.color;
    if (p.wakeLine) {
      const len = (p.lineLen || (pr * 2.2)) * state.zoom * (0.88 + life * 0.2);
      const width = Math.max(0.9, (p.lineW || 1) * state.zoom * (0.88 + life * 0.12));
      ctx.fillRect(-len * 0.5, -width * 0.5, len, width);
    } else if (p.circle) {
      ctx.beginPath();
      ctx.arc(0, 0, pr, 0, Math.PI * 2);
      ctx.fill();
    } else {
      polygonPath(0, 0, pr, p.sides, 0);
      ctx.fill();
    }
    ctx.restore();
  }

  for (const e of state.enemies) {
    drawEnemyShip(e);

    if (e.kind === 'boss') {
      const ep = toScreen(e.x, e.y);
      ctx.fillStyle = '#f3c8d0';
      ctx.fillRect(ep.x - e.size * 0.6 * state.zoom, ep.y - (e.size + 10) * state.zoom, e.size * 1.2 * state.zoom, 6 * state.zoom);
      ctx.fillStyle = '#d74662';
      const hpRatio = Math.max(0, Math.min(1, e.hp / e.maxHp));
      ctx.fillRect(ep.x - e.size * 0.6 * state.zoom, ep.y - (e.size + 10) * state.zoom, e.size * 1.2 * hpRatio * state.zoom, 6 * state.zoom);
    }
  }

  drawCloudOverlay();
  drawVisionCloudMask();

  if (state.upgradesOffered) {
    const cardW = Math.min(560, canvas.width * 0.68);
    const cardX = (canvas.width - cardW) / 2;
    const titleX = canvas.width / 2;
    ctx.fillStyle = 'rgba(5,10,15,0.78)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f5fbff';
    ctx.font = '24px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(state.upgradesOffered.title, titleX, 120);
    ctx.font = '18px system-ui';
    state.upgradesOffered.options.forEach((u, i) => {
      const cardInfo = getUpgradeCardInfo(u);
      const y = 200 + i * 95;
      if (state.upgradesOffered.major) {
        ctx.fillStyle = '#4a2f18';
      } else {
        ctx.fillStyle = cardInfo.blocked ? '#3a2b2b' : '#163349';
      }
      ctx.fillRect(cardX, y - 34, cardW, 62);
      ctx.fillStyle = cardInfo.blocked ? '#ffd6ba' : '#e8f5ff';
      ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}) ${u.name}`, cardX + 22, y - 7);
      ctx.fillStyle = cardInfo.blocked ? '#f4b09a' : '#a8c6d9';
      ctx.fillText(cardInfo.desc, cardX + 22, y + 18);
    });
    ctx.textAlign = 'left';
  }

  if (state.gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff';
    ctx.font = '40px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Ship Sunk', canvas.width * 0.5, 240);
    ctx.font = '20px system-ui';
    ctx.fillText(`Score: ${Math.round(state.finalScore || 0)}`, canvas.width * 0.5, 278);
    ctx.fillStyle = '#ffd887';
    ctx.fillText(`+${state.earnedDoubloons || 0} Doubloons earned  (total: ${persistentDoubloons})`, canvas.width * 0.5, 308);
    ctx.fillStyle = '#a8c8e0';
    ctx.font = '15px system-ui';
    ctx.fillText('Spend Doubloons in the Shipyard to unlock new ships.', canvas.width * 0.5, 334);
    // Draw "Return to Shipyard" button
    const btnW = 240, btnH = 42, btnX = canvas.width * 0.5 - btnW * 0.5, btnY = 372;
    state.gameOverReturnRect = { x: btnX, y: btnY, w: btnW, h: btnH };
    ctx.fillStyle = '#1a4a6e';
    ctx.strokeStyle = '#5ab0f0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#e8f5ff';
    ctx.font = 'bold 17px system-ui';
    ctx.fillText('Return to Shipyard', canvas.width * 0.5, btnY + 27);
    ctx.textAlign = 'left';
  }

  statsEl.textContent = '';
  windEl.textContent = '';

  drawHud();
  drawCombatDevtools();
  drawAimReticle();

  ctx.save();
  ctx.translate(canvas.width - 78, 76);
  ctx.strokeStyle = 'rgba(220,242,255,0.85)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI * 2);
  ctx.stroke();
  const wx = state.wind.x;
  const wy = state.wind.y;
  const len = Math.hypot(wx, wy) || 1;
  const ax = (wx / len) * 22;
  const ay = (wy / len) * 22;
  ctx.strokeStyle = '#d6ecff';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(ax, ay);
  ctx.stroke();
  ctx.fillStyle = '#d6ecff';
  ctx.fillRect(ax - 2, ay - 2, 4, 4);
  ctx.restore();

  if (player.anchorDropped) {
    ctx.fillStyle = '#ffd79a';
    ctx.font = '19px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('⚓', canvas.width - 78, 122);
  }

  if ((state.anchorNoticeTimer || 0) > 0 && state.anchorNoticeText) {
    ctx.fillStyle = 'rgba(6,16,24,0.64)';
    ctx.fillRect(canvas.width * 0.5 - 110, canvas.height - 74, 220, 36);
    ctx.fillStyle = '#f6e8c8';
    ctx.font = '16px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(state.anchorNoticeText, canvas.width * 0.5, canvas.height - 50);
  }
}

let last = performance.now();
initWorld();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
