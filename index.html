function broadsideFire(sideSign, target, distanceToTarget, allowGunFire, allowCannonFire) {
  const right = getRightVector();
  const forward = getForwardVector();
  const shape = getHullShape(player);
  ensurePlayerWeaponLayout();
  const lane = sideSign < 0 ? player.weaponLayout.port : player.weaponLayout.starboard;
  const totalSlots = Math.max(1, lane.length);
  const ranges = getPlayerRanges();
  const allowGun = distanceToTarget <= ranges.gun && allowGunFire;
  const allowCannon = distanceToTarget <= ranges.cannon && allowCannonFire;

  if (!allowGun && !allowCannon) return { firedGun: false, firedCannon: false };

  const baseDir = player.heading + sideSign * Math.PI / 2;
  const targetAngle = target ? Math.atan2(target.y - player.y, target.x - player.x) : baseDir;
  const pivotRad = player.cannonPivot * (Math.PI / 180);
  const targetRadius = getTargetHitRadius(target);
  let firedGun = false;
  let firedCannon = false;
  let gunCount = 0;
  let cannonCount = 0;
  let gunDirX = 0;
  let gunDirY = 0;
  let cannonDirX = 0;
  let cannonDirY = 0;
  const crewFireChance = clamp(getWeaponCrewRatio(), 0.3, 1);

  for (let i = 0; i < totalSlots; i++) {
    const type = lane[i] || 'empty';
    if (type === 'empty') continue;
    const isCannonLike = CANNON_LIKE_TYPES.has(type);
    const isGunLike = GUN_LIKE_TYPES.has(type);
    if (isCannonLike && !allowCannon) continue;
    if (isGunLike && !allowGun) continue;
    if (Math.random() > crewFireChance) continue;

    const mount = getHullSideMount(shape, i, totalSlots, sideSign, 0.12, 0.88);
    const mountLen = isCannonLike ? Math.max(8, player.size * 0.48) : Math.max(4.5, player.size * 0.3);
    const muzzleLift = mountLen + (isCannonLike ? 0.7 : 0.35);
    const localX = mount.x + mount.nx * muzzleLift;
    const localY = mount.y + mount.ny * muzzleLift;
    const spawnX = player.x + forward.x * localX + right.x * localY;
    const spawnY = player.y + forward.y * localX + right.y * localY;

    const mountWorldAngle = player.heading + Math.atan2(mount.ny, mount.nx);
    const gunAdjust = clamp(angleDiff(targetAngle, mountWorldAngle), -GUN_PIVOT_RAD, GUN_PIVOT_RAD);
    const cannonAdjust = clamp(angleDiff(targetAngle, mountWorldAngle), -pivotRad, pivotRad);

    if (type === 'scattershot') {
      // 6 pellets in a wide 55-degree spread — devastating at close range
      const pelletCount = 6;
      const spreadTotal = 0.96; // ~55 degrees
      const pelletDmg = (player.bulletDamage * 0.55);
      const pelletSpeed = player.bulletSpeed + 0.3;
      const maxRange = ranges.gun * 0.65; // short range
      const baseDir = mountWorldAngle + gunAdjust;
      for (let p = 0; p < pelletCount; p++) {
        const t = pelletCount === 1 ? 0 : (p / (pelletCount - 1)) - 0.5;
        const jitter = (Math.random() - 0.5) * 0.12;
        const pelletAngle = baseDir + t * spreadTotal + jitter;
        const pdx = Math.cos(pelletAngle), pdy = Math.sin(pelletAngle);
        if (target) {
          const shotDist = Math.hypot(target.x - spawnX, target.y - spawnY);
          if (shotDist > maxRange) continue;
        }
        state.bullets.push({
          x: spawnX, y: spawnY,
          vx: pdx * pelletSpeed, vy: pdy * pelletSpeed,
          dmg: pelletDmg, heavy: false,
          weaponType: 'scattershot',
          owner: 'player', sourceSize: player.size,
          maxRange, travel: 0
        });
        spawnMuzzleBlast(spawnX, spawnY, pdx, pdy, false);
      }
      firedGun = true;
      gunCount += 1;
      gunDirX += Math.cos(baseDir);
      gunDirY += Math.sin(baseDir);
      continue;
    }

    const spread = (Math.random() - 0.5) * (isCannonLike ? 0.12 : 0.18);
    const dir = isCannonLike ? (mountWorldAngle + cannonAdjust + spread) : (mountWorldAngle + gunAdjust + spread);
    const dirX = Math.cos(dir);
    const dirY = Math.sin(dir);

    if (type === 'ghostCannon') {
      const speed = player.bulletSpeed + 0.55;
      const dmg = player.bulletDamage + 5;
      const maxRange = ranges.cannon;
      if (target) {
        const shotDist = Math.hypot(target.x - spawnX, target.y - spawnY);
        if (shotDist > maxRange) continue;
        if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, maxRange, target, targetRadius)) continue;
      }
      state.bullets.push({
        x: spawnX, y: spawnY,
        vx: dirX * speed, vy: dirY * speed,
        dmg, heavy: true,
        weaponType: 'ghostCannon',
        piercing: true, hitEnemies: new Set(),
        owner: 'player', sourceSize: player.size,
        maxRange, travel: 0
      });
      spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, true);
      firedCannon = true;
      cannonCount += 1;
      cannonDirX += dirX;
      cannonDirY += dirY;
      continue;
    }

    if (type === 'fireBomb') {
      const speed = player.bulletSpeed * 0.52; // slow arcing bomb
      const dmg = player.bulletDamage + 3;
      const maxRange = ranges.cannon * 0.80;
      if (target) {
        const shotDist = Math.hypot(target.x - spawnX, target.y - spawnY);
        if (shotDist > maxRange) continue;
        if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, maxRange, target, targetRadius)) continue;
      }
      state.bullets.push({
        x: spawnX, y: spawnY,
        vx: dirX * speed, vy: dirY * speed,
        dmg, heavy: true,
        weaponType: 'fireBomb',
        isBomb: true,
        owner: 'player', sourceSize: player.size,
        maxRange, travel: 0
      });
      spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, true);
      firedCannon = true;
      cannonCount += 1;
      cannonDirX += dirX;
      cannonDirY += dirY;
      continue;
    }

    if (type === 'chainShot') {
      const speed = player.bulletSpeed + 0.25;
      const dmg = player.bulletDamage + 6;
      const maxRange = ranges.cannon * 0.90;
      if (target) {
        const shotDist = Math.hypot(target.x - spawnX, target.y - spawnY);
        if (shotDist > maxRange) continue;
        if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, maxRange, target, targetRadius)) continue;
      }
      state.bullets.push({
        x: spawnX, y: spawnY,
        vx: dirX * speed, vy: dirY * speed,
        dmg, heavy: true,
        weaponType: 'chainShot',
        isChain: true,
        owner: 'player', sourceSize: player.size,
        maxRange, travel: 0
      });
      spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, true);
      firedCannon = true;
      cannonCount += 1;
      cannonDirX += dirX;
      cannonDirY += dirY;
      continue;
    }

    // Standard gun or cannon
    const speed = player.bulletSpeed + (isCannonLike ? 0.45 : 0.2);
    const dmg = player.bulletDamage + (isCannonLike ? 4 : 0);
    const maxRange = isCannonLike ? ranges.cannon : ranges.gun;

    if (target) {
      const shotDist = Math.hypot(target.x - spawnX, target.y - spawnY);
      if (shotDist > maxRange) continue;
      if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, maxRange, target, targetRadius)) continue;
    }

    state.bullets.push({
      x: spawnX,
      y: spawnY,
      vx: dirX * speed,
      vy: dirY * speed,
      dmg,
      heavy: isCannonLike,
      owner: 'player',
      sourceSize: player.size,
      maxRange,
      travel: 0
    });
    spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, isCannonLike);
    if (isCannonLike) {
      firedCannon = true;
      cannonCount += 1;
      cannonDirX += dirX;
      cannonDirY += dirY;
    } else {
      firedGun = true;
      gunCount += 1;
      gunDirX += dirX;
      gunDirY += dirY;
    }
  }

  if (firedGun && gunCount > 0) {
    const len = Math.hypot(gunDirX, gunDirY) || 1;
    playGunVolleySfx(player.x, player.y, gunDirX / len, gunDirY / len, gunCount, player.size);
  }
  if (firedCannon && cannonCount > 0) {
    const len = Math.hypot(cannonDirX, cannonDirY) || 1;
    playCannonVolleySfx(player.x, player.y, cannonDirX / len, cannonDirY / len, cannonCount, player.size);
  }

  return { firedGun, firedCannon };
}

function enemyVolley(enemy, target, sideSign, distanceToTarget, allowGunFire, allowCannonFire) {
  const fwd = { x: Math.cos(enemy.heading), y: Math.sin(enemy.heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const shape = getHullShape(enemy);
  const targetAngle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
  const allowGun = distanceToTarget <= enemy.gunRange && allowGunFire;
  const allowCannon = distanceToTarget <= enemy.cannonRange && allowCannonFire;
  const targetRadius = getTargetHitRadius(target);
  let firedGun = false;
  let firedCannon = false;
  let gunCount = 0;
  let cannonCount = 0;
  let gunDirX = 0;
  let gunDirY = 0;
  let cannonDirX = 0;
  let cannonDirY = 0;
  const baseDir = enemy.heading + sideSign * Math.PI / 2;

  if (allowGun) {
    const gunPorts = Math.max(1, enemy.gunners);
    for (let i = 0; i < gunPorts; i++) {
      const mount = getHullSideMount(shape, i, gunPorts, sideSign, 0.12, 0.88);
      const mountLen = Math.max(4, enemy.size * 0.28);
      const localX = mount.x + mount.nx * (mountLen + 0.3);
      const localY = mount.y + mount.ny * (mountLen + 0.3);
      const spawnX = enemy.x + fwd.x * localX + right.x * localY;
      const spawnY = enemy.y + fwd.y * localX + right.y * localY;
      const gunAdjust = clamp(angleDiff(targetAngle, baseDir), -GUN_PIVOT_RAD, GUN_PIVOT_RAD);
      const dir = baseDir + gunAdjust + (Math.random() - 0.5) * (enemy.gunSpread || 0.2);
      if (Math.hypot(target.x - spawnX, target.y - spawnY) > enemy.gunRange) continue;
      const dirX = Math.cos(dir);
      const dirY = Math.sin(dir);
      if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, enemy.gunRange, target, targetRadius)) continue;
      state.bullets.push({
        x: spawnX,
        y: spawnY,
        vx: dirX * (enemy.gunSpeed || 4.6),
        vy: dirY * (enemy.gunSpeed || 4.6),
        dmg: enemy.bulletDamage * 0.48,
        heavy: false,
        owner: 'enemy',
        shooterId: enemy.id,
        sourceKind: enemy.kind,
        sourceSize: enemy.size,
        maxRange: enemy.gunRange,
        travel: 0
      });
      spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, false);
      firedGun = true;
      gunCount += 1;
      gunDirX += dirX;
      gunDirY += dirY;
    }
  }

  if (allowCannon) {
    const cannonPorts = Math.max(0, enemy.cannons);
    const clamped = clamp(angleDiff(targetAngle, baseDir), -enemy.cannonPivot * (Math.PI / 180), enemy.cannonPivot * (Math.PI / 180));
    for (let i = 0; i < cannonPorts; i++) {
      const mount = getHullSideMount(shape, i, cannonPorts, sideSign, 0.16, 0.84);
      const mountLen = Math.max(7, enemy.size * 0.42);
      const localX = mount.x + mount.nx * (mountLen + 0.45);
      const localY = mount.y + mount.ny * (mountLen + 0.45);
      const spawnX = enemy.x + fwd.x * localX + right.x * localY;
      const spawnY = enemy.y + fwd.y * localX + right.y * localY;
      const dir = baseDir + clamped + (Math.random() - 0.5) * (enemy.cannonSpread || 0.1);
      if (Math.hypot(target.x - spawnX, target.y - spawnY) > enemy.cannonRange) continue;
      const dirX = Math.cos(dir);
      const dirY = Math.sin(dir);
      if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, enemy.cannonRange, target, targetRadius)) continue;
      state.bullets.push({
        x: spawnX,
        y: spawnY,
        vx: dirX * (enemy.cannonSpeed || 4.1),
        vy: dirY * (enemy.cannonSpeed || 4.1),
        dmg: enemy.bulletDamage,
        heavy: true,
        owner: 'enemy',
        shooterId: enemy.id,
        sourceKind: enemy.kind,
        sourceSize: enemy.size,
        maxRange: enemy.cannonRange,
        travel: 0
      });
      spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, true);
      firedCannon = true;
      cannonCount += 1;
      cannonDirX += dirX;
      cannonDirY += dirY;
    }
  }

  if (firedGun && gunCount > 0) {
    const len = Math.hypot(gunDirX, gunDirY) || 1;
    playGunVolleySfx(enemy.x, enemy.y, gunDirX / len, gunDirY / len, gunCount, enemy.size);
  }
  if (firedCannon && cannonCount > 0) {
    const len = Math.hypot(cannonDirX, cannonDirY) || 1;
    playCannonVolleySfx(enemy.x, enemy.y, cannonDirX / len, cannonDirY / len, cannonCount, enemy.size);
  }

  return { firedGun, firedCannon };
}

function shootAtNearest() {
  const aim = getPlayerAutoTarget();
  state.playerAim = aim;
  if (!aim) return { firedGun: false, firedCannon: false };

  const weapon = getPlayerWeaponCounts();
  if (weapon.gunTotal <= 0 && weapon.cannonTotal <= 0) return { firedGun: false, firedCannon: false };

  const ranges = getPlayerRanges();
  if (aim.dist > ranges.gun) return { firedGun: false, firedCannon: false };
  const effective = getEffectiveReloadTimes();
  const canGun = weapon.gunTotal > 0 && player.gunTimer >= effective.gun;
  if (!canGun) return { firedGun: false, firedCannon: false };
  return broadsideFire(aim.sideSign, aim.target, aim.dist, canGun, false);
}

function offerUpgrades() {
  const shuffled = [...upgradePool].sort(() => Math.random() - 0.5).slice(0, 3);
  state.upgradesOffered = {
    title: 'Choose an Upgrade',
    options: shuffled,
    major: false
  };
}

function offerMajorUpgrades() {
  const shuffled = [...majorUpgradePool].sort(() => Math.random() - 0.5).slice(0, 3);
  state.upgradesOffered = {
    title: 'Boss Defeated — Choose a Major Upgrade',
    options: shuffled,
    major: true
  };
}

function getUpgradeCardInfo(upgrade) {
  let desc = upgrade.desc;
  let blocked = false;

  if (upgrade.name === 'Cannoneers') {
    const weapon = getPlayerWeaponCounts();
    const caps = getShipWeaponCaps(player, player.cannonCapacityBonus);
    if (weapon.cannonPerSide >= caps.maxCannonsPerSide) {
      blocked = true;
      desc = `At cap ${weapon.cannonPerSide}/${caps.maxCannonsPerSide} per side. Take Cannon Racks to expand.`;
    } else {
      desc = `${upgrade.desc} (${Math.min(caps.maxCannonsPerSide, weapon.cannonPerSide + 1)}/${caps.maxCannonsPerSide} per side)`;
    }
  }

  if (upgrade.name === 'Cannon Racks') {
    const current = getShipWeaponCaps(player, player.cannonCapacityBonus);
    const next = getShipWeaponCaps(player, player.cannonCapacityBonus + 1);
    desc = `${upgrade.desc} (${current.maxCannonsPerSide}→${next.maxCannonsPerSide} per side)`;
  }

  if (upgrade.name === 'Shipwrights') {
    const spare = getSpareCrewCapacity(player);
    if (spare <= 0 && player.crew >= getDeckCrewCapacity(player)) {
      blocked = true;
      desc = `No crew slots free. Increase deck/crew capacity first (${player.crew}/${getDeckCrewCapacity(player)}).`;
    } else {
      const effective = player.repairCrew + (spare > 0 ? 1 : 1);
      const approxPerSec = (0.36 + effective * 0.3).toFixed(1);
      desc = `${upgrade.desc} (Repair crew ${player.repairCrew}→${effective}, ~${approxPerSec} HP/s out of combat)`;
    }
  }

  if (upgrade.name === "Crow's Nest") {
    const current = Math.round(getPlayerVisionRange());
    const next = Math.round(clamp(current + 40, 180, 980));
    desc = `${upgrade.desc} (${current}→${next})`;
  }

  return { desc, blocked };
}

function addGold(amount) {
  state.gold += amount;
  state.xp += amount;
  while (state.xp >= state.xpToNext) {
    state.xp -= state.xpToNext;
    state.level += 1;
    state.xpToNext = Math.floor(state.xpToNext * 1.3 + 5);
    player.size += 0.6;
    player.maxHp += 2;
    player.hp = Math.min(player.maxHp, player.hp + 4);
    offerUpgrades();
  }
}

function vesselForward(entity) {
  return { x: Math.cos(entity.heading), y: Math.sin(entity.heading) };
}

function collisionRadius(entity) {
  return entity.size * 0.72;
}

function vesselImpactPower(entity, normalX, normalY) {
  const fwd = vesselForward(entity);
  const bowDot = Math.max(0, fwd.x * normalX + fwd.y * normalY);
  const ramBonus = entity.ram ? 1.4 : (entity.kind === 'rammer' ? 1.24 : 1);
  return entity.speed * entity.mass * (0.78 + bowDot * 0.72) * ramBonus;
}

function resolveVesselCollision(a, b, dt) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const d = Math.hypot(dx, dy) || 0.0001;
  const minDist = collisionRadius(a) + collisionRadius(b);
  if (d >= minDist) return;

  const nx = dx / d;
  const ny = dy / d;
  const result = resolveShipCollision(a, b, state.world);
  if (!result) return;

  const hitAX = a.x + nx * collisionRadius(a) * 0.72;
  const hitAY = a.y + ny * collisionRadius(a) * 0.72;
  const hitBX = b.x - nx * collisionRadius(b) * 0.72;
  const hitBY = b.y - ny * collisionRadius(b) * 0.72;

  if (result.impactA > 0) {
    if (a === player) {
      const bossImpactScale = b.kind === 'boss' ? 1.45 : 1;
      damagePlayer(result.impactA * bossImpactScale);
    } else {
      a.hp -= result.impactA;
    }
    addHullFractureMark(a, hitAX, hitAY, 0.8 + result.impactA * 0.38 + (b.ram ? 0.45 : 0));
    spawnImpactDebris(hitAX, hitAY, -nx, -ny, true, a);
    spawnDeckBurst(hitAX, hitAY, -nx, -ny, true);
  }

  if (result.impactB > 0) {
    if (b === player) {
      const bossImpactScale = a.kind === 'boss' ? 1.45 : 1;
      damagePlayer(result.impactB * bossImpactScale);
    } else {
      b.hp -= result.impactB;
    }
    addHullFractureMark(b, hitBX, hitBY, 0.8 + result.impactB * 0.38 + (a.ram ? 0.45 : 0));
    spawnImpactDebris(hitBX, hitBY, nx, ny, true, b);
    spawnDeckBurst(hitBX, hitBY, nx, ny, true);
  }
}

function drawHullBody(size, hullColor, trimColor, profile, ramEnabled = false) {
  const shape = getHullShape({
    size,
    hullDesign: profile.hullDesign,
    hullLength: profile.hullLength,
    hullBeam: profile.hullBeam,
    bowSharpness: profile.bowSharpness,
    sternTaper: profile.sternTaper
  });
  const { len, beam, bowX, shoulderX, sternShoulderX, sternX, shoulderHalfBeam, sternHalfBeam } = shape;

  const pathHull = () => {
    ctx.beginPath();
    ctx.moveTo(bowX, 0);
    ctx.lineTo(shoulderX, -shoulderHalfBeam);
    ctx.lineTo(sternShoulderX, -sternHalfBeam);
    ctx.lineTo(sternX, 0);
    ctx.lineTo(sternShoulderX, sternHalfBeam);
    ctx.lineTo(shoulderX, shoulderHalfBeam);
    ctx.closePath();
  };

  ctx.fillStyle = hullColor;
  pathHull();
  ctx.fill();

  ctx.strokeStyle = trimColor;
  ctx.lineWidth = 2.2;
  ctx.lineJoin = 'miter';
  ctx.lineCap = 'butt';
  ctx.miterLimit = 2;
  pathHull();
  ctx.stroke();

  if (Number(profile?.hullArmorTier || 0) >= 4) {
    ctx.save();
    pathHull();
    ctx.clip();
    ctx.strokeStyle = 'rgba(58,62,69,0.82)';
    ctx.lineWidth = 1.6;
    const dashStep = Math.max(4.2, beam * 0.16);
    for (let y = -shoulderHalfBeam * 0.92; y <= shoulderHalfBeam * 0.92; y += dashStep) {
      const span = Math.max(10, (shoulderX - sternShoulderX) * 0.8);
      const startX = sternShoulderX + 2 + (Math.abs(y) * 0.22);
      const segment = Math.max(4.5, span * 0.08);
      const gap = Math.max(3.5, segment * 0.7);
      for (let x = startX; x < shoulderX - 2; x += segment + gap) {
        ctx.beginPath();
        ctx.moveTo(x, y - 0.3);
        ctx.lineTo(Math.min(x + segment, shoulderX - 2), y + 0.3);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  if (ramEnabled) {
    ctx.save();
    const baseRamDamage = 46;
    const ramDamage = Math.max(baseRamDamage, Number(profile?.ramDamage || baseRamDamage));
    const ramTier = clamp((ramDamage - baseRamDamage) / 18, 0, 4.5);
    const plateThickness = 1.8 + ramTier * 0.9;

    const edgeInset = clamp(0.16 + ramTier * 0.03, 0.16, 0.28);
    const portEdgeX = shoulderX + (bowX - shoulderX) * edgeInset;
    const portEdgeY = -shoulderHalfBeam * (1 - edgeInset);
    const starEdgeX = shoulderX + (bowX - shoulderX) * edgeInset;
    const starEdgeY = shoulderHalfBeam * (1 - edgeInset);

    ctx.fillStyle = '#99a0a8';
    ctx.beginPath();
    ctx.moveTo(bowX, 0);
    ctx.lineTo(shoulderX, -shoulderHalfBeam);
    ctx.lineTo(shoulderX, shoulderHalfBeam);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#6f7781';
    ctx.beginPath();
    ctx.moveTo(bowX + plateThickness, 0);
    ctx.lineTo(portEdgeX, portEdgeY);
    ctx.lineTo(starEdgeX, starEdgeY);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#d1d7dd';
    ctx.lineWidth = Math.max(1.2, 1.4 + ramTier * 0.45);
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(bowX + plateThickness, 0);
    ctx.lineTo(portEdgeX, portEdgeY);
    ctx.lineTo(shoulderX, -shoulderHalfBeam);
    ctx.moveTo(bowX + plateThickness, 0);
    ctx.lineTo(starEdgeX, starEdgeY);
    ctx.lineTo(shoulderX, shoulderHalfBeam);
    ctx.stroke();

    ctx.strokeStyle = '#4b535d';
    ctx.lineWidth = Math.max(1, 1 + ramTier * 0.25);
    ctx.beginPath();
    ctx.moveTo(portEdgeX, portEdgeY);
    ctx.lineTo(starEdgeX, starEdgeY);
    ctx.stroke();
    ctx.restore();
  }

  return shape;
}

function drawReactiveSail(entity, size, sailColor, mastTopY, enemySail = false) {
  const fwd = { x: Math.cos(entity.heading), y: Math.sin(entity.heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const windMag = Math.hypot(state.wind.x, state.wind.y);
  const windForward = fwd.x * state.wind.x + fwd.y * state.wind.y;
  const windSide = right.x * state.wind.x + right.y * state.wind.y;
  const intensity = clamp(windMag / 0.55, 0, 1.5);

  if (!entity.sailOpen) {
    ctx.fillStyle = '#d6ddd2';
    const furlW = Math.max(8, size * 0.5);
    const furlH = Math.max(2.5, size * 0.09);
    ctx.fillRect(-furlW * 0.4, mastTopY + size * 0.16, furlW, furlH);
    ctx.fillRect(-furlW * 0.33, mastTopY + size * 0.28, furlW * 0.86, furlH * 0.9);
    return;
  }

  const windAngleLocal = windMag > 0.0001 ? Math.atan2(windSide, windForward) : 0;
  const flutter = Math.sin(state.time * 8.6 + (entity.id || 0) * 0.73 + size * 0.09) * (0.03 + intensity * 0.02);
  const billowPulse = Math.sin(state.time * 3.2 + (entity.id || 0) * 0.41 + size * 0.05);
  const sailAngle = windAngleLocal + Math.PI * 0.5 + flutter;
  const pivotX = 0;
  const pivotY = mastTopY + size * 0.22;

  const mainW = size * (enemySail ? 2.02 : 2.3) * (1 + (billowPulse * 0.02 + intensity * 0.03));
  const mainH = Math.max(3.4, size * 0.27);
  const rearW = mainW * 0.58;
  const rearH = Math.max(2.8, mainH * 0.92);
  const frontW = mainW * 0.34;
  const frontH = Math.max(2.4, mainH * 0.84);

  const windLocalX = windForward;
  const windLocalY = windSide;
  const windLen = Math.hypot(windLocalX, windLocalY) || 1;
  const ghostOffX = (windLocalX / windLen) * (size * 0.15 + intensity * 0.45);
  const ghostOffY = (windLocalY / windLen) * (size * 0.15 + intensity * 0.45);

  const drawRigLayer = (alpha = 1, offX = 0, offY = 0) => {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(pivotX + offX, pivotY + offY);
    ctx.rotate(sailAngle + Math.sin(state.time * 6.4 + (entity.id || 0) * 0.31) * 0.015);

    ctx.fillStyle = sailColor;
    ctx.fillRect(-mainW * 0.5, -mainH * 0.5, mainW, mainH);

    ctx.fillStyle = sailColor;
    ctx.fillRect(-rearW * 0.5 - size * 0.6, -rearH * 0.5 + size * 0.06, rearW, rearH);

    ctx.fillStyle = 'rgba(206,214,224,0.92)';
    ctx.fillRect(-frontW * 0.5 + size * 0.33, -frontH * 0.5 - size * 0.08, frontW, frontH);

    ctx.restore();
  };

  drawRigLayer(0.38, ghostOffX, ghostOffY);
  drawRigLayer(1, 0, 0);

  ctx.save();
  ctx.globalAlpha = 0.78;
  ctx.strokeStyle = 'rgba(230,240,248,0.62)';
  ctx.lineWidth = Math.max(1, size * 0.05);
  const trailX = pivotX - Math.cos(sailAngle) * (mainW * 0.44);
  const trailY = pivotY - Math.sin(sailAngle) * (mainW * 0.44);
  ctx.beginPath();
  ctx.moveTo(trailX, trailY);
  ctx.lineTo(-size * 0.92, size * 0.54);
  ctx.stroke();
  ctx.restore();
}

function drawDeckCrewSpots(hull, crewCount, deckCapacity, committedCrew = 0, spotScale = 1) {
  const cap = clamp(deckCapacity || 0, 0, 64);
  if (cap <= 0) return;
  const occupied = clamp(crewCount || 0, 0, cap);
  const committed = clamp(committedCrew || 0, 0, occupied);

  const cols = Math.max(1, Math.ceil(Math.sqrt(cap * 1.2)));
  const rows = Math.max(1, Math.ceil(cap / cols));
  const spanX = Math.min(hull.len * 1.44 * 0.72, 8 + cols * 3.2);
  const spanY = Math.min(hull.beam * 0.95, 7 + rows * 3.0);
  const stepX = cols <= 1 ? 0 : spanX / (cols - 1);
  const stepY = rows <= 1 ? 0 : spanY / (rows - 1);
  const radius = (1.7 + spotScale * 0.2);

  for (let i = 0; i < cap; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const px = (col - (cols - 1) / 2) * stepX - hull.len * 0.02;
    let py = (row - (rows - 1) / 2) * stepY;
    const hw = hullHalfWidthAt(hull, px) * 0.72;
    py = clamp(py, -hw, hw);

    if (i < committed) {
      ctx.fillStyle = '#ffd3a1';
    } else if (i < occupied) {
      ctx.fillStyle = '#c6ecff';
    } else {
      ctx.fillStyle = 'rgba(150,184,205,0.18)';
    }
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(207,235,252,0.35)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function createCrewVisual(index, hull) {
  const minX = hull.sternShoulderX * 0.72;
  const maxX = hull.shoulderX * 0.72;
  const t = seeded01(index * 1.37 + 11.3);
  const x = minX + (maxX - minX) * t;
  const hw = hullHalfWidthAt(hull, x) * 0.62;
  const y = (seeded01(index * 2.11 + 7.9) * 2 - 1) * hw;
  const heading = seeded01(index * 3.73 + 4.2) * Math.PI * 2;
  return {
    x,
    y,
    vx: Math.cos(heading) * 0.18,
    vy: Math.sin(heading) * 0.18,
    tone: Math.floor(seeded01(index * 6.17 + 3.1) * 5),
    size: 1.65 + seeded01(index * 5.19 + 2.7) * 0.95,
    turnTimer: seeded01(index * 4.61 + 9.6) * 1.2
  };
}

function ensurePlayerCrewVisuals(hull) {
  if (!Array.isArray(player.crewVisuals)) player.crewVisuals = [];
  const crewCount = Math.max(0, Math.floor(Math.min(player.crew || 0, getDeckCrewCapacity(player))));

  while (player.crewVisuals.length < crewCount) {
    player.crewVisuals.push(createCrewVisual(player.crewVisuals.length, hull));
  }
  if (player.crewVisuals.length > crewCount) {
    player.crewVisuals.length = crewCount;
  }
}

function updatePlayerCrewVisuals(dt, frantic = true) {
  const hull = getHullShape(player);
  ensurePlayerCrewVisuals(hull);
  if (!player.crewVisuals.length) return;

  const accel = frantic ? 0.18 : 0.07;
  const maxSpeed = frantic ? 0.62 : 0.28;
  const drift = frantic ? 0.94 : 0.9;

  for (let i = 0; i < player.crewVisuals.length; i++) {
    const mover = player.crewVisuals[i];
    mover.turnTimer -= dt;
    if (mover.turnTimer <= 0) {
      const turn = (Math.random() - 0.5) * (frantic ? 1.9 : 1.2);
      const cs = Math.cos(turn);
      const sn = Math.sin(turn);
      const nvx = mover.vx * cs - mover.vy * sn;
      const nvy = mover.vx * sn + mover.vy * cs;
      mover.vx = nvx;
      mover.vy = nvy;
      mover.turnTimer = (frantic ? 0.08 : 0.22) + Math.random() * (frantic ? 0.32 : 0.68);
    }

    mover.vx += (Math.random() - 0.5) * accel;
    mover.vy += (Math.random() - 0.5) * accel;
    const speed = Math.hypot(mover.vx, mover.vy);
    if (speed > maxSpeed) {
      mover.vx = (mover.vx / speed) * maxSpeed;
      mover.vy = (mover.vy / speed) * maxSpeed;
    }

    mover.vx *= drift;
    mover.vy *= drift;
    mover.x += mover.vx * dt * 60;
    mover.y += mover.vy * dt * 60;

    const minX = hull.sternShoulderX * 0.74;
    const maxX = hull.shoulderX * 0.74;
    if (mover.x < minX) {
      mover.x = minX;
      mover.vx = Math.abs(mover.vx) * 0.7;
    } else if (mover.x > maxX) {
      mover.x = maxX;
      mover.vx = -Math.abs(mover.vx) * 0.7;
    }

    const hw = hullHalfWidthAt(hull, mover.x) * 0.66;
    if (mover.y < -hw) {
      mover.y = -hw;
      mover.vy = Math.abs(mover.vy) * 0.7;
    } else if (mover.y > hw) {
      mover.y = hw;
      mover.vy = -Math.abs(mover.vy) * 0.7;
    }
  }
}

window.addEventListener('keydown', (e) => {
  if (!state.upgradesOffered) return;
  const key = e.key;
  const idx = key === '1' ? 0 : key === '2' ? 1 : key === '3' ? 2 : -1;
  if (idx >= 0 && state.upgradesOffered.options[idx]) {
    state.upgradesOffered.options[idx].apply();
    state.upgradesOffered = null;
  }
});

function update(dt) {
  if (state.mode !== 'combat') {
    state.time += dt;
    updatePlayerCrewVisuals(dt, false);
    return;
  }
  updatePlayerCrewVisuals(dt, !state.upgradesOffered);
  if (state.upgradesOffered) return;
  clampPlayerCrewToDeck();
  clampPlayerSupportCrewToDeck();
  clampPlayerArmamentToHull();

  state.time += dt;
  state.anchorNoticeTimer = Math.max(0, (state.anchorNoticeTimer || 0) - dt);
  player.impactTimer = Math.max(0, (player.impactTimer || 0) - dt);
  player.repairSuppressed = Math.max(0, (player.repairSuppressed || 0) - dt);
  updateShipDamageState(player, dt, true);

  const cfg = getLevelConfig(state.stageIndex);
  state.stageTimer += dt;
  state.bossTimer += dt;
  const enemyCount = state.enemies.length;

  const hasBossAlive = state.enemies.some((e) => e.kind === 'boss');
  if (state.bossTimer >= cfg.bossEvery && !hasBossAlive && !state.bossSpawnedThisStage && enemyCount < MAX_ENEMIES_ON_SCREEN) {
    state.bossTimer = 0;
    state.bossSpawnedThisStage = true;
    spawnBoss();
  }

  state.wind.timer += dt;
  if (state.wind.timer > cfg.windShift) {
    state.wind.timer = 0;
    const nextWind = rollWindVector();
    state.wind.x = nextWind.x;
    state.wind.y = nextWind.y;
  }

  const controlsEnabled = !state.gameOver;
  const forwardPressed = controlsEnabled && (keys.has('w') || keys.has('arrowup'));
  const brakePressed = controlsEnabled && (keys.has('s') || keys.has('arrowdown'));
  const turnLeft = controlsEnabled && (keys.has('a') || keys.has('arrowleft'));
  const turnRight = controlsEnabled && (keys.has('d') || keys.has('arrowright'));
  const anchored = !!player.anchorDropped;

  const rowPower = (!anchored && forwardPressed) ? (ROW_ACCEL_BASE + player.rowers * ROW_ACCEL_PER_ROWER) : 0;
  state.rowEffort = clamp(rowPower / 0.55, 0, 1);
  stepShipPhysics(player, {
    forward: forwardPressed,
    brake: brakePressed,
    turnLeft,
    turnRight,
    sailOpen: player.sailOpen,
    anchored
  }, state.wind, state.world, dt);
  resolveIslandCollisions(player, dt, true);
  spawnVesselWakeParticles(player.x, player.y, player.heading, player.size, player.speed, player.baseSpeed + 0.4, 1);

  const zoomTarget = clamp(2.0 - (player.size - 16) * 0.008 + state.zoomUserOffset, 0.6, 2.4);
  state.zoom += (zoomTarget - state.zoom) * 0.09;
  state.difficultyFromSize = Math.floor(Math.max(0, (16 - state.zoom * 16) * 0.9));
  ensureIslandDefenses();
  updateCamera();

  player.gunTimer += dt;
  player.cannonTimer += dt;
  tickPlayerCannonMountTimers(dt);
  const firedPlayer = state.gameOver ? { firedGun: false, firedCannon: false } : shootAtNearest();
  if (firedPlayer.firedGun) player.gunTimer = 0;

  updateShipValueTier();

  // Phase system: alternate calm breathers and enemy swarms
  const CALM_DURATION = 25;
  const swarmDuration = Math.min(30, 12 + state.swarmCycle * 1.5);
  state.swarmTimer += dt;
  if (state.swarmPhase === 'calm' && state.swarmTimer >= CALM_DURATION) {
    state.swarmPhase = 'swarm';
    state.swarmTimer = 0;
  } else if (state.swarmPhase === 'swarm' && state.swarmTimer >= swarmDuration) {
    state.swarmPhase = 'calm';
    state.swarmTimer = 0;
    state.swarmCycle += 1;
  }
  const calmCap = 6;
  const swarmCap = Math.min(50, 15 + state.swarmCycle * 4);
  const activeCap = state.swarmPhase === 'swarm' ? swarmCap : calmCap;
  const baseSpawnRate = 0.007 + state.stageIndex * 0.001 + state.difficultyTier * 0.0006;
  const phaseMultiplier = state.swarmPhase === 'swarm' ? 8.0 : 0.7;
  const spawnChance = baseSpawnRate * phaseMultiplier * dt * 60;
  if (state.enemies.length < activeCap && Math.random() < spawnChance) spawnEnemy();

  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const bullet = state.bullets[i];
    const stepX = bullet.vx * dt * 60;
    const stepY = bullet.vy * dt * 60;
    bullet.x += stepX;
    bullet.y += stepY;
    const stepDist = Math.hypot(stepX, stepY);
    bullet.travel = (bullet.travel || 0) + stepDist;
    const maxRange = bullet.maxRange || (bullet.heavy ? 320 : 230);
    if (bullet.travel >= maxRange) {
      if (bullet.isBomb) {
        // Fire bomb explodes even on miss
        detonateBomb(bullet.x, bullet.y, bullet.dmg, bullet.sourceSize);
      } else {
        spawnWaterSplash(bullet.x, bullet.y, !!bullet.heavy);
      }
      state.bullets.splice(i, 1);
      continue;
    }
    if (bullet.x < -30 || bullet.x > state.world.width + 30 || bullet.y < -30 || bullet.y > state.world.height + 30) {
      state.bullets.splice(i, 1);
    }
  }

  function getEnemySteerTarget(enemy) {
    if (enemy.kind === 'boss' || enemy.kind === 'rammer' || enemy.kind === 'skiff') {
      return { x: player.x, y: player.y };
    }

    if (enemy.squadId != null) {
      let mates = 0;
      let cx = 0;
      let cy = 0;
      let alignX = 0;
      let alignY = 0;
      let sepX = 0;
      let sepY = 0;

      for (const ally of state.enemies) {
        if (ally === enemy || ally.squadId !== enemy.squadId) continue;
        const dx = ally.x - enemy.x;
        const dy = ally.y - enemy.y;
        const d = Math.hypot(dx, dy);
        if (d > 260) continue;

        mates += 1;
        cx += ally.x;
        cy += ally.y;
        alignX += Math.cos(ally.heading);
        alignY += Math.sin(ally.heading);

        if (d < enemy.size * 2.6) {
          const inv = 1 / Math.max(1, d);
          sepX -= dx * inv;
          sepY -= dy * inv;
        }
      }

      if (mates > 0) {
        cx /= mates;
        cy /= mates;
        const len = Math.hypot(alignX, alignY) || 1;
        const flank = enemy.kind === 'raider' ? 46 : 32;
        const flockTarget = {
          x: cx + (alignX / len) * flank + sepX * 8,
          y: cy + (alignY / len) * flank + sepY * 8
        };
        const attackWeight = enemy.kind === 'raider' ? 0.58 : 0.44;
        return {
          x: flockTarget.x * (1 - attackWeight) + player.x * attackWeight,
          y: flockTarget.y * (1 - attackWeight) + player.y * attackWeight
        };
      }
    }

    let bestAlly = null;
    let bestD2 = Infinity;
    const followRange = 220;
    for (const ally of state.enemies) {
      if (ally === enemy || ally.kind === 'boss' || ally.kind === 'rammer' || ally.kind === 'skiff') continue;
      const dx = ally.x - enemy.x;
      const dy = ally.y - enemy.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < followRange * followRange && d2 < bestD2) {
        bestD2 = d2;
        bestAlly = ally;
      }
    }

    if (!bestAlly) return { x: player.x, y: player.y };

    if (enemy.kind === 'pirate') {
      return { x: bestAlly.x, y: bestAlly.y };
    }

    if (enemy.kind === 'raider') {
      const lead = 40;
      return {
        x: bestAlly.x + Math.cos(bestAlly.heading) * lead,
        y: bestAlly.y + Math.sin(bestAlly.heading) * lead
      };
    }

    return { x: player.x, y: player.y };
  }

  for (const enemy of state.enemies) {
    enemy.impactTimer = Math.max(0, (enemy.impactTimer || 0) - dt);
    // Chain shot slow decay
    if ((enemy.chainSlowTimer || 0) > 0) {
      enemy.chainSlowTimer -= dt;
      if (enemy.chainSlowTimer <= 0 && enemy.chainSlowOrigSpeed != null) {
        enemy.baseSpeed = enemy.chainSlowOrigSpeed;
        enemy.chainSlowOrigSpeed = null;
        enemy.chainSlowTimer = 0;
      }
    }
    updateShipDamageState(enemy, dt, false);
    const ai = ensureEnemyAiState(enemy);
    const profile = getEnemyAiProfile(enemy);
    ai.sideLock = Math.max(0, ai.sideLock - dt);
    ai.recoveryTimer = Math.max(0, ai.recoveryTimer - dt);
    ai.fireCommitTimer = Math.max(0, ai.fireCommitTimer - dt);

    const steeringTarget = getEnemySteerTarget(enemy);
    let combatTarget = player;
    if (enemy.kind === 'boss') {
      const playerPlan = getBroadsideFirePlan(enemy, player);
      combatTarget = pickBossTarget(enemy, playerPlan).target;
    } else if (enemy.kind === 'rammer' || enemy.kind === 'skiff') {
      combatTarget = player;
    }

    const sideEval = chooseEnemySideForTarget(enemy, combatTarget, ai.sideSign);
    if (sideEval.score > 0) {
      const shouldSwitch = ai.sideLock <= 0 || sideEval.sideSign === ai.sideSign || sideEval.score > ai.lastScore + profile.sideSwitchBonus;
      if (shouldSwitch) {
        if (sideEval.sideSign !== ai.sideSign) ai.sideLock = 1.05;
        ai.sideSign = sideEval.sideSign;
      }
      ai.fireCommitTimer = Math.max(ai.fireCommitTimer, profile.fireCommitTime);
    }
    ai.lastScore = sideEval.score;

    const distToTarget = Math.hypot(combatTarget.x - enemy.x, combatTarget.y - enemy.y);
    const shoreAvoid = getShoreAvoidanceVector(enemy, 200);
    const vesselAvoid = getVesselSeparationVector(enemy);
    const avoidPressure = Math.hypot(vesselAvoid.x, vesselAvoid.y);

    const targetAngle = Math.atan2(combatTarget.y - enemy.y, combatTarget.x - enemy.x);
    const preferredHeading = targetAngle - ai.sideSign * Math.PI / 2;
    const fallbackRange = Math.min(enemy.gunRange * 0.88, enemy.cannonRange * 0.82);
    const desiredRange = sideEval.cannonHits > 0
      ? enemy.cannonRange * profile.preferredRange
      : sideEval.gunHits > 0
        ? enemy.gunRange * Math.min(0.94, profile.preferredRange + 0.1)
        : fallbackRange;
    const rangeError = distToTarget - desiredRange;

    const tacticalPoint = {
      x: steeringTarget.x + shoreAvoid.x * profile.shoreWeight + vesselAvoid.x * profile.vesselWeight,
      y: steeringTarget.y + shoreAvoid.y * profile.shoreWeight + vesselAvoid.y * profile.vesselWeight
    };

    const headingTargetPoint = {
      x: enemy.x + Math.cos(preferredHeading) * 120,
      y: enemy.y + Math.sin(preferredHeading) * 120
    };

    const blend = sideEval.score > 0 ? profile.broadsideBlend : profile.approachBlend;
    const steerTarget = {
      x: tacticalPoint.x * (1 - blend) + headingTargetPoint.x * blend,
      y: tacticalPoint.y * (1 - blend) + headingTargetPoint.y * blend
    };

    let turn = clamp(angleDiff(Math.atan2(steerTarget.y - enemy.y, steerTarget.x - enemy.x), enemy.heading) / profile.turnScale, -1, 1);
    let rowing = distToTarget > desiredRange * profile.rowThreshold || sideEval.score <= 0 || Math.abs(turn) > 0.85;
    let brake = distToTarget < desiredRange * profile.brakeRangeScale && sideEval.score > 0 && Math.abs(turn) < profile.brakeTurnThreshold;

    if (enemy.kind === 'rammer' || enemy.kind === 'skiff') {
      rowing = true;
      brake = false;
    }

    const moved = Math.hypot(enemy.x - (ai.lastX || enemy.x), enemy.y - (ai.lastY || enemy.y));
    const likelyStuck = moved < 0.32 && enemy.speed < 0.5 && avoidPressure > 0.55;
    ai.stuck = likelyStuck ? (ai.stuck + dt * 1.5) : Math.max(0, ai.stuck - dt * 0.7);
    if (ai.stuck > 0.95 && ai.recoveryTimer <= 0) {
      ai.recoveryTimer = 0.8 + Math.random() * 0.45;
      ai.recoveryTurn = Math.random() < 0.5 ? -1 : 1;
      ai.stuck = 0;
    }

    if (ai.recoveryTimer > 0) {
      rowing = true;
      brake = false;
      turn = ai.recoveryTurn;
      ai.mode = 'unstick';
    } else if (sideEval.score > 0 && Math.abs(rangeError) < enemy.size * profile.fireWindowRangeSizeMul) {
      ai.mode = 'fireWindow';
    } else if (sideEval.score > 0) {
      ai.mode = 'setupBroadside';
    } else {
      ai.mode = 'approach';
    }

    if (avoidPressure > profile.avoidEmergencyThreshold) {
      brake = false;
      rowing = true;
    }

    simulateVessel(enemy, dt, {
      rowing,
      brake,
      turn
    });
    applyShoreRepulsion(enemy, dt, 0.9);
    resolveIslandCollisions(enemy, dt, false);
    spawnVesselWakeParticles(enemy.x, enemy.y, enemy.heading, enemy.size, enemy.speed, enemy.baseSpeed + 0.3, enemy.kind === 'raider' ? 1.1 : 1);

    ai.lastX = enemy.x;
    ai.lastY = enemy.y;

    enemy.gunTimer += dt;
    enemy.cannonTimer += dt;
    const canGun = enemy.gunTimer >= enemy.gunReload;
    const canCannon = enemy.cannonTimer >= enemy.cannonReload;
    if (canGun || canCannon) {
      const fireEval = chooseEnemySideForTarget(enemy, combatTarget, ai.sideSign);
      if (fireEval.score > 0) ai.sideSign = fireEval.sideSign;
      const inCommittedFireWindow = ai.mode === 'fireWindow' || ai.fireCommitTimer > 0;
      const allowGun = canGun && fireEval.gunHits > 0 && inCommittedFireWindow;
      const allowCannon = canCannon && fireEval.cannonHits > 0 && inCommittedFireWindow;
      if (allowGun || allowCannon) {
        const fired = enemyVolley(enemy, combatTarget, ai.sideSign, fireEval.dist, allowGun, allowCannon);
        if (fired.firedGun) enemy.gunTimer = 0;
        if (fired.firedCannon) enemy.cannonTimer = 0;
        if (fired.firedGun || fired.firedCannon) {
          ai.fireCommitTimer = Math.max(ai.fireCommitTimer, profile.fireCommitTime * 0.7);
        }
      }
    }
  }

  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < state.enemies.length; i++) {
      resolveVesselCollision(player, state.enemies[i], dt);
    }

    for (let i = 0; i < state.enemies.length; i++) {
      for (let j = i + 1; j < state.enemies.length; j++) {
        resolveVesselCollision(state.enemies[i], state.enemies[j], dt);
      }
    }
  }

  // Helper: explode a fire bomb at world position (AOE ignition)
  function detonateBomb(bx, by, dmg, sourceSize) {
    const BOMB_RADIUS = 58;
    for (const e2 of state.enemies) {
      if (e2.hp <= 0) continue;
      const dist = Math.hypot(e2.x - bx, e2.y - by);
      if (dist > BOMB_RADIUS) continue;
      const falloff = 1 - dist / BOMB_RADIUS * 0.5;
      e2.hp -= dmg * 0.75 * falloff;
      tryIgniteShip(e2, { heavy: true, sourceSize }, 3, 0.95);
      spawnImpactDebris(e2.x, e2.y, (e2.x - bx) / (dist || 1), (e2.y - by) / (dist || 1), true, e2);
    }
    // Fiery explosion particles at bomb position
    for (let k = 0; k < 18; k++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1.2 + Math.random() * 2.8;
      state.particles.push({
        x: bx, y: by,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        life: 0.55 + Math.random() * 0.55, maxLife: 1.1,
        size: 6 + Math.random() * 10,
        color: Math.random() < 0.5 ? '#ff6020' : '#ffb030',
        sides: 5, rot: Math.random() * Math.PI * 2, circle: true
      });
    }
    playCannonImpactSfx(bx, by, 0, -1, sourceSize || 16);
  }

  for (let i = state.enemies.length - 1; i >= 0; i--) {
    const enemy = state.enemies[i];

    for (let j = state.bullets.length - 1; j >= 0; j--) {
      const b = state.bullets[j];
      if (b.owner === 'enemy') {
        const bossFriendlyFire = b.sourceKind === 'boss' && b.shooterId !== enemy.id && enemy.kind !== 'boss';
        if (!bossFriendlyFire) continue;
      }
      // Ghost cannon: skip enemies already hit by this bullet
      if (b.piercing && b.hitEnemies && b.hitEnemies.has(enemy.id)) continue;

      const d = Math.hypot(enemy.x - b.x, enemy.y - b.y);
      if (d < enemy.size + 4) {
        const dmgScale = b.owner === 'enemy' ? 0.64 : 1;
        const n = normalizeOr(b.vx, b.vy, 1, 0);

        if (b.isBomb) {
          // Fire bomb: AOE explosion on impact, then remove bullet
          detonateBomb(b.x, b.y, b.dmg, b.sourceSize);
          state.bullets.splice(j, 1);
          // Re-check enemy death after AOE
          if (enemy.hp <= 0) {
            spawnShipExplosion(enemy.x, enemy.y, enemy.size, enemy.kind === 'boss', enemy);
            state.enemies.splice(i, 1);
            if (enemy.kind === 'boss') {
              state.drops.push({ x: enemy.x, y: enemy.y, v: 22 + Math.random() * 6 });
              onBossDefeated();
            } else {
              const bonus = enemy.kind === 'raider' ? 6 : enemy.kind === 'skiff' ? 1 : 3;
              state.drops.push({ x: enemy.x, y: enemy.y, v: bonus + Math.random() * 2.5 });
            }
            break;
          }
          continue;
        }

        enemy.hp -= b.dmg * dmgScale;
        addHullFractureMark(enemy, b.x, b.y, 0.6 + (b.heavy ? 0.8 : 0.3));
        spawnImpactDebris(enemy.x, enemy.y, n.x, n.y, !!b.heavy, enemy);
        spawnDeckBurst(enemy.x, enemy.y, n.x, n.y, !!b.heavy);

        if (b.isChain) {
          // Chain shot: slow the enemy for 4 seconds
          if (!enemy.chainSlowOrigSpeed) enemy.chainSlowOrigSpeed = enemy.baseSpeed;
          enemy.baseSpeed = enemy.chainSlowOrigSpeed * 0.30;
          enemy.chainSlowTimer = 4.0;
          // Chain visual: blue-white debris
          for (let k = 0; k < 6; k++) {
            const ang = Math.random() * Math.PI * 2;
            state.particles.push({
              x: enemy.x, y: enemy.y,
              vx: Math.cos(ang) * (1 + Math.random()), vy: Math.sin(ang) * (1 + Math.random()),
              life: 0.5, maxLife: 0.5, size: 4 + Math.random() * 4,
              color: '#88b8ff', sides: 4, rot: 0, circle: false
            });
          }
          tryIgniteShip(enemy, b, 0, 0);
        } else {
          tryIgniteShip(enemy, b, b.heavy ? 1 : 0, 0.12);
        }

        if (b.heavy) playCannonImpactSfx(enemy.x, enemy.y, n.x, n.y, b.sourceSize || 16);
        else playGunImpactSfx(enemy.x, enemy.y, n.x, n.y, b.sourceSize || 16);

        if (b.piercing) {
          // Ghost cannon: track hit, keep bullet alive
          if (!b.hitEnemies) b.hitEnemies = new Set();
          b.hitEnemies.add(enemy.id);
        } else {
          state.bullets.splice(j, 1);
        }

        if (enemy.hp <= 0) {
          spawnShipExplosion(enemy.x, enemy.y, enemy.size, enemy.kind === 'boss', enemy);
          state.enemies.splice(i, 1);
          if (enemy.kind === 'boss') {
            state.drops.push({ x: enemy.x, y: enemy.y, v: 22 + Math.random() * 6 });
            onBossDefeated();
          } else {
            const bonus = enemy.kind === 'raider' ? 6 : enemy.kind === 'skiff' ? 1 : 3;
            state.drops.push({ x: enemy.x, y: enemy.y, v: bonus + Math.random() * 2.5 });
          }
          break;
        }
      }
    }
  }

  for (const island of state.islands) {
    for (let i = island.buildings.length - 1; i >= 0; i--) {
      const building = island.buildings[i];
      for (let j = state.bullets.length - 1; j >= 0; j--) {
        const b = state.bullets[j];
        if (b.owner !== 'player') continue;
        const d = Math.hypot(building.x - b.x, building.y - b.y);
        if (d < building.size * 0.65 + 4) {
          const dmgScale = b.heavy ? 1.05 : 0.58;
          building.hp -= b.dmg * dmgScale;
          const n = normalizeOr(b.vx, b.vy, 1, 0);
          const hpRatio = clamp(building.hp / building.maxHp, 0, 1);
          building.fireLevel = Math.max(building.fireLevel || 0, (1 - hpRatio) * 1.1);
          if (!Array.isArray(building.damageMarks)) building.damageMarks = [];
          building.damageMarks.push({
            ox: (Math.random() - 0.5) * building.size * 0.48,
            oy: (Math.random() - 0.5) * building.size * 0.52,
            r: building.size * (0.12 + Math.random() * 0.2),
            rot: Math.random() * Math.PI * 2,
            sides: 4 + Math.floor(Math.random() * 4)
          });
          if (building.damageMarks.length > 7) building.damageMarks.shift();
          spawnBuildingFireFx(building, Math.min(1, building.fireLevel + 0.2));
          spawnImpactDebris(building.x, building.y, n.x, n.y, !!b.heavy, { hullColor: '#a77556', trimColor: '#7d593f' });
          if (b.heavy) playCannonImpactSfx(building.x, building.y, n.x, n.y, b.sourceSize || 16);
          else playGunImpactSfx(building.x, building.y, n.x, n.y, b.sourceSize || 16);
          state.bullets.splice(j, 1);
          if (building.hp <= 0) {
            const goldCount = Math.max(2, Math.floor(building.size / 4));
            for (let g = 0; g < goldCount; g++) {
              const radial = Math.atan2(building.y - island.y, building.x - island.x);
              const ang = radial + (Math.random() - 0.5) * 1.5;
              const dist = building.size * (0.15 + Math.random() * 0.7);
              const burst = 1.4 + Math.random() * 3.2;
              state.drops.push({
                x: building.x + Math.cos(ang) * dist,
                y: building.y + Math.sin(ang) * dist,
                v: 1 + building.size * 0.16 + Math.random() * 1.6,
                vx: Math.cos(ang) * burst,
                vy: Math.sin(ang) * burst
              });
            }
            island.buildings.splice(i, 1);
          }
          break;
        }
      }

      if (building.hp < building.maxHp) {
        const hpRatio = clamp(building.hp / building.maxHp, 0, 1);
        const severity = clamp(1 - hpRatio, 0, 1);
        building.fireLevel = Math.max(building.fireLevel || 0, severity * 1.05);
        building.fxTimer = (building.fxTimer || 0) + dt;
        const cadence = 0.38 - severity * 0.18;
        if (building.fxTimer >= cadence) {
          building.fxTimer = 0;
          spawnBuildingFireFx(building, severity);
        }
      }
    }

    const activeTowers = island.buildings.filter((b) => b.tower);
    for (const tower of activeTowers) {
      tower.fireTimer += dt;
      const cadence = Math.max(0.7, 1.6 - island.defenseLevel * 0.12);
      const batteryRange = getPlayerRanges().cannon;
      if (tower.fireTimer >= cadence) {
        const dxToPlayer = player.x - tower.x;
        const dyToPlayer = player.y - tower.y;
        const distToPlayer = Math.hypot(dxToPlayer, dyToPlayer);
        if (distToPlayer > batteryRange) continue;
        tower.fireTimer = 0;
        const ang = Math.atan2(player.y - tower.y, player.x - tower.x) + (Math.random() - 0.5) * 0.16;
        state.bullets.push({
          x: tower.x,
          y: tower.y,
          vx: Math.cos(ang) * 4.2,
          vy: Math.sin(ang) * 4.2,
          dmg: 5 + island.defenseLevel * 1.5,
          heavy: true,
          owner: 'enemy',
          sourceSize: Math.max(14, tower.size * 0.9),
          maxRange: batteryRange * 1.02,
          travel: 0
        });
      }
    }
  }

  for (let i = state.enemies.length - 1; i >= 0; i--) {
    const enemy = state.enemies[i];
    if (enemy.hp <= 0) {
      spawnShipExplosion(enemy.x, enemy.y, enemy.size, enemy.kind === 'boss', enemy);
      state.enemies.splice(i, 1);
      if (enemy.kind === 'boss') {
        state.drops.push({ x: enemy.x, y: enemy.y, v: 22 + Math.random() * 6 });
        onBossDefeated();
      } else {
        const bonus = enemy.kind === 'raider' ? 6 : enemy.kind === 'skiff' ? 1 : 3;
        state.drops.push({ x: enemy.x, y: enemy.y, v: bonus + Math.random() * 2.5 });
      }
    }
  }

  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    if (b.owner !== 'enemy') continue;
    const d = Math.hypot(player.x - b.x, player.y - b.y);
    if (d < player.size * 0.78 + 4) {
      const bossScale = b.sourceKind === 'boss' ? 1.6 : 1;
      damagePlayer(b.dmg * (b.heavy ? 0.28 : 0.18) * bossScale);
      const n = normalizeOr(b.vx, b.vy, 1, 0);
      addHullFractureMark(player, b.x, b.y, 0.6 + (b.heavy ? 0.9 : 0.35));
      tryIgniteShip(player, b, b.heavy ? 1 : 0, 0);
      spawnImpactDebris(player.x, player.y, n.x, n.y, !!b.heavy, player);
      spawnDeckBurst(player.x, player.y, n.x, n.y, !!b.heavy);
      if (b.heavy) playCannonImpactSfx(player.x, player.y, n.x, n.y, b.sourceSize || 16);
      else playGunImpactSfx(player.x, player.y, n.x, n.y, b.sourceSize || 16);
      state.bullets.splice(i, 1);
    }
  }

  for (let i = state.drops.length - 1; i >= 0; i--) {
    const d = state.drops[i];

    d.vx = d.vx || 0;
    d.vy = d.vy || 0;
    d.x += d.vx * dt * 60;
    d.y += d.vy * dt * 60;
    d.vx *= 0.92;
    d.vy *= 0.92;

    d.x = clamp(d.x, 16, state.world.width - 16);
    d.y = clamp(d.y, 16, state.world.height - 16);

    const dx = player.x - d.x;
    const dy = player.y - d.y;
    const dist = Math.hypot(dx, dy) || 1;
    const magnetRange = getGoldMagnetRange();
    if (dist < magnetRange) {
      const pull = GOLD_MAGNET_BASE_SPEED + (1 - dist / magnetRange) * 5.4;
      d.x += (dx / dist) * pull * dt * 60;
      d.y += (dy / dist) * pull * dt * 60;
    }
    if (dist < 16) {
      addGold(d.v);
      state.drops.splice(i, 1);
    }
  }

  updateCollectorSkiffs(dt);

  for (const p of state.particles) {
    if (p.settleToWater && !p.settled) {
      const totalAirTime = Math.max(0.0001, Number(p.maxLife || 1));
      const airProgress = clamp(1 - ((p.life || 0) / totalAirTime), 0, 1);
      const baseSize = Number.isFinite(p.baseSize) ? p.baseSize : (p.size || 1.5);
      const peakSize = Number.isFinite(p.peakSize) ? p.peakSize : baseSize * 1.5;
      const settleSize = Number.isFinite(p.settleSize) ? p.settleSize : baseSize * 0.7;
      if (airProgress < 0.75) {
        const t = airProgress / 0.75;
        p.size = baseSize + (peakSize - baseSize) * t;
      } else {
        const t = (airProgress - 0.75) / 0.25;
        p.size = peakSize + (settleSize - peakSize) * t;
      }
    }

    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.currentX || p.currentY) {
      p.x += (p.currentX || 0) * dt * 60;
      p.y += (p.currentY || 0) * dt * 60;
    }
    const drag = p.drag ?? 0.95;
    p.vx *= drag;
    p.vy *= drag;
    p.y -= p.drift * dt * 60;
    p.rot += p.spin;
    p.life -= dt;

    if (p.settleToWater && !p.settled && p.life <= 0) {
      p.settled = true;
      p.life = Math.max(1, Number(p.lingerLife || 120));
      p.maxLife = p.life;
      p.size = Number.isFinite(p.settleSize) ? p.settleSize : p.size;
      p.vx *= 0.03;
      p.vy *= 0.03;
      p.spin = 0;
      p.drag = Number.isFinite(p.lingerDrag) ? p.lingerDrag : 0.992;
      p.drift = Number.isFinite(p.lingerDrift) ? p.lingerDrift : 0.006;
      p.currentX = (state.wind.x || 0) * 0.006;
      p.currentY = (state.wind.y || 0) * 0.006;
      if (p.splashOnSettle) {
        spawnWaterSplash(p.x, p.y, !!p.splashHeavy);
        p.splashOnSettle = false;
      }
    }
  }
  state.particles = state.particles.filter((p) => p.life > 0);

  for (const cloud of state.clouds) {
    cloud.x += (state.wind.x * 0.35 + cloud.drift) * dt * 60;
    cloud.y += (state.wind.y * 0.2) * dt * 60;
    if (cloud.x > state.world.width + 200) cloud.x = -220;
    if (cloud.x < -240) cloud.x = state.world.width + 180;
    if (cloud.y > state.world.height + 120) cloud.y = -120;
    if (cloud.y < -120) cloud.y = state.world.height + 120;
  }

  if (player.hp > 0 && player.hp < player.maxHp && (player.repairCrew || 0) > 0) {
    const movementPenalty = clamp(player.speed / Math.max(0.1, player.baseSpeed + 1.2), 0, 1);
    const suppression = clamp((player.repairSuppressed || 0) / 2.4, 0, 1);
    const regenPerSec = 0.36 + player.repairCrew * 0.3;
    const regenScale = (1 - suppression) * (1 - movementPenalty * 0.45);
    if (regenScale > 0) {
      player.hp = Math.min(player.maxHp, player.hp + regenPerSec * regenScale * dt);
    }
  }

  if (player.hp <= 0) {
    player.hp = 0;
    if (!state.gameOver) {
      state.gameOver = true;
      state.playerSunk = true;
      state.finalScore = Math.round(state.gold + state.level * 28 + state.bossesDefeated * 180 + state.stageIndex * 95);
      // Award persistent doubloons: 25% of in-run gold + level bonus
      const earnedDoubloons = Math.floor(state.gold * 0.25 + state.level * 4 + state.bossesDefeated * 20);
      persistentDoubloons += earnedDoubloons;
      state.earnedDoubloons = earnedDoubloons;
      const sv = loadSave();
      sv.doubloons = persistentDoubloons;
      sv.unlocked = [...unlockedShips];
      writeSave(sv);
      spawnPlayerShipBreakup();
    }
  }
}

function drawShip() {
  const pos = toScreen(player.x, player.y);
  const z = state.zoom;
  const aim = state.playerAim;
  const manualAim = getManualAimTarget();
  const targetWorldAngle = Number.isFinite(manualAim?.angle)
    ? manualAim.angle
    : (aim ? aim.targetAngle : null);
  const targetSideSign = aim
    ? (aim.sideSign || 0)
    : (Number.isFinite(targetWorldAngle) ? (Math.sin(angleDiff(targetWorldAngle, player.heading)) >= 0 ? 1 : -1) : 0);

  drawShipRenderer(ctx, pos.x, pos.y, player, {
    zoom: z,
    wind: state.wind,
    time: state.time,
    targetWorldAngle,
    targetSideSign,
    showInWorldCannonReload: true,
    getCannonReloadRatio: ({ side, index }) => getPlayerCannonRemainingRatio(side, index),
    drawInterior: ({ shape, z }) => {
      ensurePlayerCrewVisuals(shape);
      const crewPalette = ['#f4efe6', '#d5ccb8', '#b49b76', '#2a2d31', '#5c4636'];
      ctx.save();
      ctx.scale(z, z);
      for (const mover of player.crewVisuals || []) {
        const hw = hullHalfWidthAt(shape, mover.x) * 0.68;
        const px = mover.x;
        const py = clamp(mover.y, -hw, hw);
        const size = mover.size;
        const tone = crewPalette[mover.tone % crewPalette.length];
        ctx.fillStyle = tone;
        ctx.fillRect(px - size * 0.5, py - size * 0.5, size, size);
        ctx.fillStyle = 'rgba(240,245,250,0.34)';
        ctx.fillRect(px - size * 0.22, py - size * 0.46, size * 0.44, size * 0.2);
      }
      ctx.restore();
    },
    drawOverlays: ({ shape, z }) => {
      ctx.save();
      ctx.scale(z, z);
      drawDeckDamageMarks(player, shape, 1);
      drawFractureMarks(player, shape, 1);
      drawShipBurningOverlay(player, shape);
      ctx.restore();
    }
  });
}

function spRendererMountLayoutStrategy(entity) {
  const layout = entity?.weaponLayout;
  if (Array.isArray(layout?.port) && Array.isArray(layout?.starboard)) {
    return {
      port: layout.port.map((slot) => slot || 'empty'),
      starboard: layout.starboard.map((slot) => slot || 'empty')
    };
  }

  const slotCount = Math.max(1, Number(entity?.cannons || 0), Number(entity?.gunners || 0));
  const port = new Array(slotCount).fill('empty');
  const starboard = new Array(slotCount).fill('empty');
  const cannonCount = Math.max(0, Math.min(slotCount, Number(entity?.cannons || 0)));
  const gunCount = Math.max(0, Math.min(slotCount - cannonCount, Number(entity?.gunners || 0)));

  for (let i = 0; i < cannonCount; i++) {
    port[i] = 'cannon';
    starboard[i] = 'cannon';
  }
  for (let i = 0; i < gunCount; i++) {
    const idx = cannonCount + i;
    port[idx] = 'gun';
    starboard[idx] = 'gun';
  }

  return { port, starboard };
}

function drawEnemyShip(enemy) {
  const size = enemy.size;
  const pos = toScreen(enemy.x, enemy.y);
  const z = state.zoom;

  const { shape } = drawShipRenderer(ctx, pos.x, pos.y, enemy, {
    zoom: z,
    wind: state.wind,
    time: state.time,
    mountLayoutStrategy: spRendererMountLayoutStrategy,
    showInWorldCannonReload: false,
    drawOverlays: ({ shape, z }) => {
      ctx.save();
      ctx.scale(z, z);
      drawDeckDamageMarks(enemy, shape, 0.95);
      drawFractureMarks(enemy, shape, 0.95);
      drawShipBurningOverlay(enemy, shape);
      ctx.restore();
    }
  });

  const mastX = ((shape.sternShoulderX + shape.shoulderX) * 0.5) * z;
  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(enemy.heading);

  const flagBaseX = 2;
  const flagTop = -size * 1.08 * z;
  const flagLen = Math.max(7, size * 0.55) * z;
  const flagH = Math.max(5, size * 0.28) * z;
  ctx.fillStyle = enemy.flagColor || '#a65a43';
  ctx.beginPath();
  ctx.moveTo(flagBaseX * z, flagTop);
  ctx.lineTo(flagBaseX * z + flagLen, flagTop + flagH * 0.48);
  ctx.lineTo(flagBaseX * z, flagTop + flagH);
  ctx.closePath();
  ctx.fill();

  const stripes = clamp(enemy.flagStripes || 1, 1, 5);
  ctx.fillStyle = enemy.flagAccent || '#f4d7b0';
  for (let i = 0; i < stripes; i++) {
    const t = (i + 1) / (stripes + 1);
    const x = flagBaseX * z + t * (flagLen * 0.74);
    const y1 = flagTop + t * flagH * 0.35;
    const y2 = flagTop + flagH - t * flagH * 0.35;
    ctx.fillRect(x, y1, Math.max(1.1, size * 0.05) * z, Math.max(1.6 * z, y2 - y1));
  }

  if (enemy.squadId != null) {
    ctx.fillStyle = '#f9fff6';
    const dotX = flagBaseX * z + flagLen * 0.32;
    const dotY = flagTop + flagH * 0.5;
    ctx.beginPath();
    ctx.arc(dotX, dotY, Math.max(1.1, size * 0.05) * z, 0, Math.PI * 2);
    ctx.fill();
  }

  // Anchor to mast center for consistent pennant placement with shared hull renderer.
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.moveTo(mastX, -Math.max(8, size * 1.2 * (enemy.mastScale || 1)) * z);
  ctx.lineTo(flagBaseX * z, flagTop + flagH * 0.5);
  ctx.stroke();
  ctx.restore();
}

function drawCollectorSkiffs() {
  if (!player.collectorSkiffs || !player.collectorSkiffs.length) return;
  for (let i = 0; i < player.collectorSkiffs.length; i++) {
    const skiff = player.collectorSkiffs[i];
    const visible = !skiff.docked || !!skiff.runner || !!skiff.target || (skiff.carrying || 0) > 0;
    if (!visible) continue;
    const pos = toScreen(skiff.x, skiff.y);
    const heading = Math.atan2(skiff.vy || 0, skiff.vx || 1);
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(heading);
    ctx.scale(state.zoom, state.zoom);
    ctx.fillStyle = '#8a623e';
    ctx.fillRect(-5.8, -3.1, 11.6, 6.2);
    ctx.fillStyle = '#a4744b';
    ctx.fillRect(-5.2, -2.6, 10.4, 1.9);
    ctx.fillStyle = '#714f31';
    ctx.fillRect(-5.1, 0.2, 10.2, 1.3);
    if (skiff.carrying > 0) {
      ctx.fillStyle = '#ffdd55';
      ctx.fillRect(1.2, -1.4, 2.5, 2.8);
    }
    ctx.restore();

    if (skiff.runner) {
      const rp = toScreen(skiff.runner.x, skiff.runner.y);
      const drop = skiff.runner.drop;
      if (drop) {
        const dp = toScreen(drop.x, drop.y);
        ctx.strokeStyle = 'rgba(10,14,18,0.7)';
        ctx.lineWidth = Math.max(1.2, 1.5 * state.zoom);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(rp.x, rp.y);
        ctx.lineTo(dp.x, dp.y);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(12,16,20,0.85)';
        ctx.lineWidth = Math.max(1, 1.2 * state.zoom);
        ctx.beginPath();
        ctx.arc(dp.x, dp.y, 4.5 * state.zoom, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.fillStyle = '#0c1014';
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, 2.8 * state.zoom, 0, Math.PI * 2);
      ctx.fill();
      if (skiff.runner.carrying > 0) {
        ctx.fillStyle = '#ffdd55';
        ctx.fillRect(rp.x + 2 * state.zoom, rp.y - 1.2 * state.zoom, 2.4 * state.zoom, 2.4 * state.zoom);
      }
    }
  }
}

function drawWorld() {
  const camX = state.camera.x;
  const camY = state.camera.y;
  const z = state.zoom;
  const viewW = canvas.width / z;
  const viewH = canvas.height / z;

  const tile = 16;
  const startX = Math.floor(camX / tile) * tile;
  const startY = Math.floor(camY / tile) * tile;
  for (let worldY = startY; worldY < camY + viewH + tile; worldY += tile) {
    for (let worldX = startX; worldX < camX + viewW + tile; worldX += tile) {
      const pattern = ((Math.floor(worldX / tile) + Math.floor(worldY / tile)) % 2 === 0);
      ctx.fillStyle = pattern ? '#0a2e45' : '#0b334d';
      ctx.fillRect((worldX - camX) * z, (worldY - camY) * z, tile * z + 1, tile * z + 1);
    }
  }

  ctx.strokeStyle = 'rgba(132,188,220,0.16)';
  for (let y = 0; y < canvas.height; y += 20 * z) {
    const worldY = camY + y / z;
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin((state.time * 1.4) + worldY * 0.03) * 2 * z);
    ctx.lineTo(canvas.width, y + Math.sin((state.time * 1.4) + worldY * 0.03) * 2 * z);
    ctx.stroke();
  }

  for (const island of state.islands) {
    const sx = (island.x - camX) * z;
    const sy = (island.y - camY) * z;
    const sr = island.r * z;
    if (sx < -sr - 40 || sx > canvas.width + sr + 40 || sy < -sr - 40 || sy > canvas.height + sr + 40) continue;

    if (!island.outerPoly || !island.innerPoly) buildIslandPolygons(island);
    const outer = island.outerPoly.map((pt) => ({
      x: (island.x + pt.x - camX) * z,
      y: (island.y + pt.y - camY) * z
    }));
    const inner = island.innerPoly.map((pt) => ({
      x: (island.x + pt.x - camX) * z,
      y: (island.y + pt.y - camY) * z
    }));

    ctx.fillStyle = '#b2a46f';
    polygonFromPoints(outer);
    ctx.fill();
    ctx.strokeStyle = 'rgba(206,176,118,0.78)';
    ctx.lineWidth = Math.max(1.8, 2.6 * z);
    polygonFromPoints(outer);
    ctx.stroke();

    ctx.fillStyle = '#6e9d4b';
    polygonFromPoints(inner);
    ctx.fill();
    ctx.strokeStyle = 'rgba(95,132,72,0.6)';
    ctx.lineWidth = Math.max(1.2, 1.9 * z);
    polygonFromPoints(inner);
    ctx.stroke();

    for (const dock of island.docks) {
      const dp = toScreen(dock.x, dock.y);
      ctx.save();
      ctx.translate(dp.x, dp.y);
      ctx.rotate(dock.rot);
      const dl = dock.length * z;
      const dw = dock.width * z;
      ctx.fillStyle = '#7a5435';
      ctx.fillRect(0, -dw * 0.5, dl, dw);
      ctx.fillStyle = '#8c6542';
      for (let p = 2; p < dl; p += Math.max(3, 4 * z)) {
        ctx.fillRect(p, -dw * 0.5, 1 * z + 0.6, dw);
      }
      ctx.fillStyle = '#604229';
      const postW = Math.max(1, 1.4 * z);
      const postH = Math.max(2, 2.5 * z);
      ctx.fillRect(1, -dw * 0.5 - postH, postW, postH);
      ctx.fillRect(1, dw * 0.5, postW, postH);
      ctx.fillRect(dl - 2, -dw * 0.5 - postH, postW, postH);
      ctx.fillRect(dl - 2, dw * 0.5, postW, postH);
      ctx.restore();
    }

    for (const plant of island.foliage || []) {
      const fp = toScreen(plant.x, plant.y);
      if (plant.kind === 'tree') {
        const trunkW = Math.max(1, 1.6 * z);
        const trunkH = plant.trunk * z;
        ctx.fillStyle = '#6b4c33';
        ctx.fillRect(fp.x - trunkW * 0.5, fp.y - trunkH * 0.2, trunkW, trunkH);
      } else {
        ctx.fillStyle = '#5f8d4a';
        ctx.fillRect(fp.x - plant.width * z * 0.5, fp.y - plant.height * z * 0.4, plant.width * z, plant.height * z);
        ctx.fillStyle = '#6ea553';
        ctx.beginPath();
        ctx.arc(fp.x - plant.width * z * 0.12, fp.y - plant.height * z * 0.35, plant.height * z * 0.48, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (const building of island.buildings) {
      const bp = toScreen(building.x, building.y);
      const bw = building.size * 0.9 * z;
      const bh = building.size * z;
      ctx.fillStyle = 'rgba(12,16,22,0.22)';
      ctx.fillRect(bp.x - bw * 0.46, bp.y + bh * 0.44, bw * 0.92, bh * 0.16);

      ctx.fillStyle = building.tower ? '#7e8f9e' : '#ba8a63';
      ctx.fillRect(bp.x - bw * 0.5, bp.y - bh * 0.55, bw, bh);

      ctx.fillStyle = building.tower ? '#97a8b8' : '#cf9a70';
      ctx.fillRect(bp.x - bw * 0.45, bp.y - bh * 0.49, bw * 0.9, bh * 0.12);

      if (building.tower) {
        ctx.fillStyle = '#4f5d69';
        ctx.fillRect(bp.x - bw * 0.22, bp.y - bh * 0.9, bw * 0.44, bh * 0.34);
      } else {
        ctx.fillStyle = '#8d5f40';
        ctx.beginPath();
        ctx.moveTo(bp.x - bw * 0.34, bp.y - bh * 0.54);
        ctx.lineTo(bp.x + bw * 0.34, bp.y - bh * 0.54);
        ctx.lineTo(bp.x, bp.y - bh * 0.92);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = building.tower ? '#cfd9e4' : '#f2d2a8';
      ctx.fillRect(bp.x - bw * 0.08, bp.y - bh * 0.14, bw * 0.16, bh * 0.18);
      if (!building.tower) {
        ctx.fillRect(bp.x - bw * 0.3, bp.y - bh * 0.08, bw * 0.12, bh * 0.12);
        ctx.fillRect(bp.x + bw * 0.18, bp.y - bh * 0.08, bw * 0.12, bh * 0.12);
      }

      const damageRatio = clamp(1 - (building.hp / building.maxHp), 0, 1);
      if (damageRatio > 0.02) {
        const marks = Array.isArray(building.damageMarks) ? building.damageMarks : [];
        ctx.fillStyle = `rgba(10,10,12,${0.26 + damageRatio * 0.28})`;
        for (const mark of marks) {
          ctx.save();
          ctx.translate(bp.x + mark.ox * z, bp.y + mark.oy * z);
          ctx.rotate(mark.rot);
          polygonPath(0, 0, Math.max(1.4, mark.r * z), mark.sides || 5, 0);
          ctx.fill();
          ctx.restore();
        }

        const flameCount = 1 + Math.floor(damageRatio * 3);
        for (let f = 0; f < flameCount; f++) {
          const t = (f + 1) / (flameCount + 1);
          const fx = bp.x + (t - 0.5) * bw * 0.52 + Math.sin(state.time * 6 + building.x * 0.03 + f) * bw * 0.06;
          const fy = bp.y - bh * (0.56 + 0.1 * Math.sin(state.time * 8 + f));
          const fh = Math.max(2.2, bh * (0.08 + damageRatio * 0.15));
          ctx.fillStyle = 'rgba(255,176,73,0.84)';
          ctx.beginPath();
          ctx.moveTo(fx, fy - fh);
          ctx.lineTo(fx + fh * 0.52, fy);
          ctx.lineTo(fx - fh * 0.52, fy);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = 'rgba(255,120,52,0.76)';
          ctx.beginPath();
          ctx.arc(fx, fy - fh * 0.25, fh * 0.36, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    for (const plant of island.foliage || []) {
      if (plant.kind !== 'tree') continue;
      const fp = toScreen(plant.x, plant.y);
      const trunkH = plant.trunk * z;
      const canopyBaseX = fp.x;
      const canopyBaseY = fp.y - trunkH * 0.58;
      const canopy = plant.canopy && plant.canopy.length
        ? plant.canopy
        : [{ ox: 0, oy: 0, r: plant.crown, tone: 1 }];

      for (const blob of canopy) {
        const px = canopyBaseX + blob.ox * z;
        const py = canopyBaseY + blob.oy * z;
        const radius = Math.max(1.2, blob.r * z);
        if (blob.tone === 0) ctx.fillStyle = '#4d7f3e';
        else if (blob.tone === 1) ctx.fillStyle = '#5d9149';
        else if (blob.tone === 2) ctx.fillStyle = '#6ba551';
        else ctx.fillStyle = '#7bb35d';
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawCloudOverlay() {
  const z = state.zoom;
  for (const cloud of state.clouds) {
    const sx = (cloud.x - state.camera.x) * z;
    const sy = (cloud.y - state.camera.y) * z;
    const cw = cloud.w * z;
    const ch = cloud.h * z;
    if (sx < -260 || sx > canvas.width + 260 || sy < -160 || sy > canvas.height + 160) continue;
    ctx.fillStyle = 'rgba(210,225,236,0.14)';
    ctx.fillRect(sx, sy, cw, ch);
    ctx.fillRect(sx + cw * 0.2, sy - ch * 0.35, cw * 0.6, ch * 0.45);
    ctx.fillRect(sx + cw * 0.15, sy + ch * 0.62, cw * 0.5, ch * 0.3);
  }
}

function drawVisionCloudMask() {
  const center = toScreen(player.x, player.y);
  const visionPx = getPlayerVisionRange() * state.zoom;

  const baseRadius = Math.max(140, visionPx * 0.98);
  const dissolveBand = Math.max(90, visionPx * 0.28);

  const fieldRadiusAt = (angle) => {
    const wobbleA = Math.sin(angle * 3 + state.time * 0.19 + player.x * 0.0017) * 0.08;
    const wobbleB = Math.sin(angle * 5 - state.time * 0.27 + player.y * 0.0013) * 0.05;
    const wobbleC = Math.sin(angle * 8 + state.time * 0.11) * 0.03;
    return baseRadius * (1 + wobbleA + wobbleB + wobbleC);
  };

  const cloudOutsideFactor = (px, py) => {
    const dx = px - center.x;
    const dy = py - center.y;
    const dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx);
    const edge = fieldRadiusAt(angle);
    return clamp((dist - edge) / dissolveBand, 0, 1);
  };

  const drawFogCloudBlob = (x, y, scale, alphaBase) => {
    const w = 154 * scale;
    const h = 52 * scale;
    ctx.fillStyle = `rgba(198,216,231,${alphaBase * 0.78})`;
    ctx.fillRect(x, y, w, h);
    ctx.fillRect(x + w * 0.18, y - h * 0.34, w * 0.64, h * 0.46);
    ctx.fillRect(x + w * 0.14, y + h * 0.6, w * 0.52, h * 0.32);

    ctx.fillStyle = `rgba(156,178,197,${alphaBase * 0.68})`;
    ctx.fillRect(x + w * 0.06, y + h * 0.18, w * 0.88, h * 0.52);

    ctx.fillStyle = `rgba(108,132,154,${alphaBase * 0.58})`;
    ctx.fillRect(x + w * 0.24, y - h * 0.06, w * 0.46, h * 0.72);
  };

  const layers = [
    { sx: 154, sy: 104, ox: 0, oy: 0, scale: 1.22, driftMul: 1, alphaMul: 1 },
    { sx: 148, sy: 98, ox: 58, oy: 30, scale: 1.14, driftMul: 0.8, alphaMul: 0.92 },
    { sx: 142, sy: 94, ox: 28, oy: 58, scale: 1.08, driftMul: 1.24, alphaMul: 0.86 },
    { sx: 136, sy: 90, ox: 74, oy: 14, scale: 1.02, driftMul: 0.66, alphaMul: 0.82 }
  ];

  for (let l = 0; l < layers.length; l++) {
    const layer = layers[l];
    const driftX = (state.time * (11 + l * 1.6) + state.wind.x * 110 * layer.driftMul) % layer.sx;
    const driftY = (state.time * (7 + l * 1.2) + state.wind.y * 90 * layer.driftMul) % layer.sy;

    for (let y = -220; y < canvas.height + 220; y += layer.sy) {
      for (let x = -280; x < canvas.width + 280; x += layer.sx) {
        const cellX = Math.floor((x + 5000) / layer.sx);
        const cellY = Math.floor((y + 5000) / layer.sy);
        const seed = cellX * 17.13 + cellY * 31.79 + l * 91.37;
        const r1 = seeded01(seed + 0.11);
        const r2 = seeded01(seed + 0.29);
        const r3 = seeded01(seed + 0.47);
        const r4 = seeded01(seed + 0.63);
        const r5 = seeded01(seed + 0.83);

        const jitterX = (r1 * 2 - 1) * 26;
        const jitterY = (r2 * 2 - 1) * 20;
        const scaleJitter = 0.86 + r3 * 0.42;
        const alphaJitter = 0.7 + r4 * 0.56;

        const baseX = x + driftX + layer.ox + jitterX;
        const baseY = y + driftY + layer.oy + jitterY;

        const probeX = baseX + 94 * layer.scale;
        const probeY = baseY + 32 * layer.scale;
        const outside = cloudOutsideFactor(probeX, probeY);
        if (outside <= 0.01) continue;

        const alpha = (0.2 + Math.pow(outside, 0.74) * 0.72) * layer.alphaMul * alphaJitter;
        const mainScale = layer.scale * scaleJitter;
        drawFogCloudBlob(baseX, baseY, mainScale, alpha);

        if (r5 > 0.34) {
          const subX = baseX + (r2 * 2 - 1) * 34;
          const subY = baseY + (r1 * 2 - 1) * 26;
          const subScale = mainScale * (0.72 + r4 * 0.28);
          drawFogCloudBlob(subX, subY, subScale, alpha * 0.78);
        }
      }
    }
  }

  ctx.fillStyle = 'rgba(9,15,22,0.24)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawRangeIndicators() {
  const pos = toScreen(player.x, player.y);
  const ranges = getPlayerRanges();

  ctx.save();
  ctx.strokeStyle = 'rgba(189,226,248,0.62)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 6]);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, ranges.gun * state.zoom, 0, Math.PI * 2);
  ctx.stroke();

  if (player.cannons > 0) {
    ctx.strokeStyle = 'rgba(232,191,142,0.64)';
    ctx.lineWidth = 2.3;
    ctx.setLineDash([12, 9]);

function windDirectionLabel() {
  const a = Math.atan2(state.wind.y, state.wind.x);
  const dirs = ['E', 'SE', 'S', 'SW', 'W', 'NW', 'N', 'NE'];
  const idx = Math.round(((a + Math.PI) / (Math.PI * 2)) * 8) % 8;
  return dirs[idx];
}

function drawShipyardScreen() {

  syncArmamentDerivedStats();

  ctx.fillStyle = 'rgba(5,12,18,0.62)';

  ctx.font = '24px system-ui';
  ctx.textAlign = 'center';

  sy.starterPresetRects = [];

    const areaX = panelX + 18;
    const areaY = panelY + 58;

    const gap = 8;

    const cardH = 78;
    const rowH = cardH + gap;

    // Section header with persistent doubloons
    ctx.fillStyle = '#cfe5f7';
    ctx.font = '13px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('Ship Roster', areaX + 2, areaY + 10);
    ctx.fillStyle = '#ffd887';
    ctx.textAlign = 'right';
    ctx.fillText(`Doubloons: ${persistentDoubloons}`, areaX + areaW - 2, areaY + 10);

    for (let row = 0; row < rows.length; row++) {
      const rowShips = rows[row];
      const rowY = areaY + 16 + row * rowH;
      for (let col = 0; col < rowShips.length; col++) {
        const preset = rowShips[col];
        const isUnlocked = unlockedShips.has(preset.id);
        const canAfford = persistentDoubloons >= preset.cost;
        const rect = {
          id: preset.id,
          x: areaX + col * (cardW + gap),
          y: rowY,
          w: cardW,
          h: cardH,
          isUnlocked,
          canAfford,
          cost: preset.cost
        };
        sy.starterPresetRects.push(rect);

        const selected = sy.starterPresetId === preset.id;
        let bg = isUnlocked
          ? (selected ? '#2f7f5d' : '#1b3d54')
          : (canAfford ? '#3a2810' : '#1e1e22');
        ctx.fillStyle = bg;
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.strokeStyle = selected ? '#84d6ae' : (isUnlocked ? '#4a6e86' : (canAfford ? '#8a6030' : '#3a3a44'));
        ctx.lineWidth = selected ? 2 : 1;
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

        // Ship name

        ctx.textAlign = 'left';
        ctx.fillText(preset.name, rect.x + 7, rect.y + 15);

        // Weapon summary
        ctx.font = '11px system-ui';
        ctx.fillStyle = isUnlocked ? '#a8d0e8' : (canAfford ? '#a08050' : '#585860');
        const specType = preset.specialType;

        const specLabel = specType === 'ghostCannon' ? 'Ghost' : specType === 'scattershot' ? 'Scatter' : specType === 'fireBomb' ? 'Bomb' : specType === 'chainShot' ? 'Chain' : null;
        const weapLine = specLabel && specCount > 0
          ? `${specLabel} ×${specCount}/side${preset.gunPerSide > 0 ? ` + G${preset.gunPerSide}` : ''}`

        // Crew line

        } else {
          // Lock icon and cost

          ctx.fillText(canAfford ? `Unlock: ${preset.cost} 🪙` : `Locked: ${preset.cost} 🪙`, rect.x + 7, rect.y + 60);
          // Lock bar at top-right
          ctx.fillStyle = canAfford ? 'rgba(255,180,50,0.25)' : 'rgba(80,60,60,0.3)';
          ctx.fillRect(rect.x + rect.w - 24, rect.y, 24, cardH);
          ctx.fillStyle = canAfford ? '#e0a030' : '#685858';
          ctx.font = '14px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText('🔒', rect.x + rect.w - 12, rect.y + cardH * 0.54);
          ctx.textAlign = 'left';

        }
      }
    }

    shape: { x: modeStartX, y: modeY, w: modeW, h: modeH },

  const previewCy = panelY + panelH * 0.55;
  sy.previewCenterX = previewCx;
  sy.previewCenterY = previewCy;
  ctx.save();
  ctx.translate(previewCx, previewCy);
  ctx.scale(previewScale, previewScale);
  const previewProfile = {
    hullDesign: design,
    hullLength: player.hullLength,
    hullBeam: player.hullBeam,
    bowSharpness: player.bowSharpness,
    sternTaper: player.sternTaper
  };
  const previewHull = drawHullBody(previewSize, player.hullColor, player.trimColor, previewProfile, player.ram);
  const capEntity = {
    size: player.size,
    hullDesign: design,
    hullLength: player.hullLength,
    hullBeam: player.hullBeam,
    bowSharpness: player.bowSharpness,
    sternTaper: player.sternTaper
  };
  const previewDeckCap = getDeckCrewCapacity(capEntity);
  const previewCrew = clamp(player.crew, 0, previewDeckCap);
  const committedCrew = Math.min(previewCrew, (player.rowers || 0) + (player.gunners || 0) + (player.repairCrew || 0));
  drawDeckCrewSpots(previewHull, previewCrew, previewDeckCap, committedCrew, 1);
  ctx.restore();

  if (sy.editMode === 'weapons') {
    sy.slotRects = getShipyardWeaponSlotScreenPoints();
    for (const slot of sy.slotRects) {
      const slotColorMap = {
        cannon: '#d8a167', gun: '#9fcfe6',
        ghostCannon: '#40c8c0', fireBomb: '#e05820',
        chainShot: '#8080d8', scattershot: '#d4c040'
      };
      const color = slotColorMap[slot.type] || '#33566f';
      const ring = slot.type === 'empty' ? '#678aa1' : '#ecf7ff';
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, slot.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = ring;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, slot.r, 0, Math.PI * 2);
      ctx.stroke();
      if (slot.type === 'gun') {
        ctx.fillStyle = '#f2fbff';
        ctx.fillRect(slot.x - 5, slot.y - 1, 10, 2);
      }
      if (slot.type === 'cannon') {

  const infoX = rightX + 14;
