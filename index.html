<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pirate Survivor Prototype</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #071521; color: #e8f5ff; font-family: system-ui, sans-serif; }
    .wrap { position: fixed; inset: 0; }
    canvas { display: block; width: 100vw; height: 100vh; border: 0; background: radial-gradient(circle at 30% 30%, #0a2a3f, #071521 70%); }
    .hud { position: absolute; top: 10px; left: 14px; right: 14px; z-index: 5; display: flex; justify-content: space-between; font-size: 14px; pointer-events: none; }
    .hud-right { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
    .audio-btn {
      border: 1px solid #4f7896;
      background: #123149;
      color: #e8f5ff;
      font-size: 12px;
      letter-spacing: 0.3px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      pointer-events: auto;
    }
    .audio-btn.is-muted { background: #3a2023; border-color: #88545b; color: #ffd4d8; }
    .xp-track-wrap {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      width: min(680px, calc(100vw - 30px));
      pointer-events: none;
      text-align: center;
    }
    .xp-track-label {
      font-size: 11px;
      color: #ffd887;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,0.65);
      margin-bottom: 4px;
      opacity: 0.95;
    }
    .xp-track {
      height: 20px;
      border-radius: 2px;
      background: rgba(20, 30, 40, 0.88);
      border: 1px solid rgba(255,216,135,0.45);
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 6px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.35);
    }
    .xp-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #b3771b 0%, #d49b3d 30%, #ffd887 65%, #f6e7ba 100%);
      transition: width 0.12s linear;
    }
    .xp-track-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #102030;
      text-shadow: 0 1px 0 rgba(255,255,255,0.45);
    }
    .hint { position: absolute; left: 14px; right: 14px; bottom: 12px; z-index: 5; color: #9fc2d9; font-size: 13px; text-align: center; pointer-events: none; }
  </style>
</head>

  for (const url of urls) {
    try {
      const response = await fetch(url);
      if (response.ok) return response.json();
    } catch {
    }
  }
  return fallbackValue;
}

// Maps old name to full roster for backward compat
const STARTER_SHIP_PRESETS = SHIP_ROSTER;

// Weapon types that behave like cannons (use cannonTimer / cannonReload)
const CANNON_LIKE_TYPES = new Set(['cannon', 'ghostCannon', 'fireBomb', 'chainShot']);
// Weapon types that behave like guns (use gunTimer / gunReload)
const GUN_LIKE_TYPES = new Set(['gun', 'scattershot']);

function resizeCanvas() {
  const w = Math.max(900, window.innerWidth);
  const h = Math.max(540, window.innerHeight);
  canvas.width = w;
  canvas.height = h;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function pointerOnCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: ((e.clientX - rect.left) / rect.width) * canvas.width,
    y: ((e.clientY - rect.top) / rect.height) * canvas.height
  };
}

const DEVTOOLS_ENEMY_KINDS = ['pirate', 'raider', 'rammer', 'skiff', 'boss'];

function ensureDevtoolsState() {
  if (!state.devtools) {
    state.devtools = {
      visible: false,
      selectedKind: 'pirate',
      spawnOnClick: true,
      cursorWorld: { x: player.x || 0, y: player.y || 0 }
    };
  }
  if (!state.devtools.cursorWorld) {
    state.devtools.cursorWorld = { x: player.x || 0, y: player.y || 0 };
  }
  if (!DEVTOOLS_ENEMY_KINDS.includes(state.devtools.selectedKind)) {
    state.devtools.selectedKind = 'pirate';
  }
  return state.devtools;
}

function screenToWorld(sx, sy) {
  return {
    x: state.camera.x + sx / state.zoom,
    y: state.camera.y + sy / state.zoom
  };
}

function getDevtoolsPanelLayout() {
  const panelW = 340;
  const panelH = 156;
  const x = 14;
  const y = canvas.height - panelH - 14;
  const kindRects = [];
  const kindW = 74;
  const kindH = 30;
  const gap = 8;
  const rowY = y + 46;
  for (let i = 0; i < DEVTOOLS_ENEMY_KINDS.length; i++) {
    kindRects.push({
      kind: DEVTOOLS_ENEMY_KINDS[i],
      x: x + 12 + i * (kindW + gap),
      y: rowY,
      w: kindW,
      h: kindH
    });
  }
  const spawnToggleRect = { x: x + 12, y: y + 84, w: 156, h: 28 };
  return {
    panelRect: { x, y, w: panelW, h: panelH },
    kindRects,
    spawnToggleRect
  };
}

function spawnDevtoolsEnemyAtCursor() {
  const devtools = ensureDevtoolsState();
  const wx = clamp(devtools.cursorWorld.x, 20, state.world.width - 20);
  const wy = clamp(devtools.cursorWorld.y, 20, state.world.height - 20);
  if (devtools.selectedKind === 'boss') {
    spawnBossAt(wx, wy);
  } else {
    spawnEnemyAt(wx, wy, devtools.selectedKind);
  }
}

function handleCombatDevtoolsClick(px, py) {
  const devtools = ensureDevtoolsState();
  if (!devtools.visible) return false;

  const layout = getDevtoolsPanelLayout();
  const { panelRect, kindRects, spawnToggleRect } = layout;

  for (const rect of kindRects) {
    if (isPointInRect(px, py, rect)) {
      devtools.selectedKind = rect.kind;
      return true;
    }
  }

  if (isPointInRect(px, py, spawnToggleRect)) {
    devtools.spawnOnClick = !devtools.spawnOnClick;
    return true;
  }

  return isPointInRect(px, py, panelRect);
}

function applyStarterShipPreset(presetId) {
  const preset = STARTER_SHIP_PRESETS.find((entry) => entry.id === presetId);
  if (!preset) return false;

  const sy = state.shipyard;
  player.hullDesign = { ...preset.hullDesign };
  sy.baseDesign = { ...player.hullDesign };
  sy.editDesign = { ...player.hullDesign };

  player.rowers = Math.max(0, preset.rowers || 0);
  player.gunners = Math.max(0, preset.gunners || 0);
  player.repairCrew = Math.max(0, preset.repairCrew || 0);
  const committedCrew = player.rowers + player.gunners + player.repairCrew;
  player.crew = Math.max(committedCrew, preset.crew || committedCrew);
  player.cannonPivot = clamp(preset.cannonPivot || 0, 0, 30);

  // Apply ship theme colors if defined
  if (preset.hullColor) player.hullColor = preset.hullColor;
  if (preset.trimColor) player.trimColor = preset.trimColor;
  if (preset.sailColor) player.sailColor = preset.sailColor;

  ensurePlayerWeaponLayout();
  const caps = getShipWeaponCaps(player, player.cannonCapacityBonus);
  const slotCount = Math.max(1, player.weaponLayout.port.length);
  const center = (slotCount - 1) / 2;
  const order = Array.from({ length: slotCount }, (_, idx) => idx).sort((a, b) => {
    const da = Math.abs(a - center);
    const db = Math.abs(b - center);
    if (da !== db) return da - db;
    return a - b;
  });

  const laneFromPreset = () => {
    const lane = new Array(slotCount).fill('empty');
    let used = 0;
    // Special weapons (ghostCannon, fireBomb, chainShot, scattershot) go in first
    const specials = Math.max(0, preset.specialPerSide || 0);
    const specType = preset.specialType || null;
    if (specType && specials > 0) {
      for (let i = 0; i < specials && used < order.length; i++) {
        lane[order[used]] = specType;
        used += 1;
      }
    }
    // Standard cannons
    const cannons = Math.min(caps.maxCannonsPerSide, preset.cannonPerSide || 0);
    for (let i = 0; i < cannons && used < order.length; i++) {
      lane[order[used]] = 'cannon';
      used += 1;
    }
    // Standard guns
    const guns = Math.max(0, preset.gunPerSide || 0);
    for (let i = 0; i < guns && used < order.length; i++) {
      lane[order[used]] = 'gun';
      used += 1;
    }
    return lane;
  };

  player.weaponLayout.port = laneFromPreset();
  player.weaponLayout.starboard = laneFromPreset();

  clampPlayerCrewToDeck();
  clampPlayerSupportCrewToDeck();
  clampPlayerArmamentToHull();
  syncArmamentDerivedStats();
  updateShipValueTier();

  sy.pendingCost = 0;
  sy.starterPresetId = preset.id;
  sy.starterPresetChosen = true;
  sy.message = `${preset.name} selected. Tweak it or launch.`;
  return true;
}

function startDirectlyWithStarterShip() {
  const fallbackId = STARTER_SHIP_PRESETS[0]?.id;
  const applied = applyStarterShipPreset(DEFAULT_STARTER_PRESET_ID) || (fallbackId ? applyStarterShipPreset(fallbackId) : false);
  if (!applied) return;
  launchFromShipyard();
  state.shipyard.message = '';
}

function getShipyardHandleScreenPoints() {
  const sy = state.shipyard;
  if (!sy.editDesign) return null;
  const cx = sy.previewCenterX ?? (canvas.width * 0.5);
  const cy = sy.previewCenterY ?? (canvas.height * 0.54);
  const scale = sy.previewScale;
  const s = 44;
  const bodyHalfLen = sy.editDesign.bodyHalfLenMul * s;
  const bodyHalfBeam = sy.editDesign.bodyHalfBeamMul * s;
  const sternHalfBeam = bodyHalfBeam * clamp(sy.editDesign.sternBeamMul ?? DEFAULT_HULL_DESIGN.sternBeamMul, 0.34, 1.08);
  const bowTip = sy.editDesign.bowTipMul * s;
  const sternTip = sy.editDesign.sternTipMul * s;
  return {
    center: { x: cx, y: cy },
    scale,
    handles: {
      bow: { x: cx + (bodyHalfLen + bowTip) * scale, y: cy },
      stern: { x: cx - (bodyHalfLen + sternTip) * scale, y: cy },
      len: { x: cx + bodyHalfLen * scale, y: cy },
      beam: { x: cx, y: cy - bodyHalfBeam * scale },
      sternBeam: { x: cx - bodyHalfLen * scale, y: cy - sternHalfBeam * scale }
    }
  };
}

function pickShipyardHandle(px, py) {
  const data = getShipyardHandleScreenPoints();
  if (!data) return null;
  const r = 22;
  for (const [name, pt] of Object.entries(data.handles)) {
    if (Math.hypot(px - pt.x, py - pt.y) <= r) return name;
  }
  return null;
}

function updateShipyardDrag(px, py) {
  const sy = state.shipyard;
  if (!sy.dragHandle || !sy.editDesign) return;
  const data = getShipyardHandleScreenPoints();
  if (!data) return;
  const scale = data.scale;
  const s = 44;
  const localX = (px - data.center.x) / scale;
  const localY = (py - data.center.y) / scale;
  const d = sy.editDesign;

  if (sy.dragHandle === 'bow') {
    d.bowTipMul = clamp(localX / s - d.bodyHalfLenMul, 0.2, 1.25);
  } else if (sy.dragHandle === 'stern') {
    d.sternTipMul = clamp((-localX / s) - d.bodyHalfLenMul, 0.12, 1.15);
  } else if (sy.dragHandle === 'len') {
    d.bodyHalfLenMul = clamp(Math.abs(localX) / s, 0.36, 0.95);
  } else if (sy.dragHandle === 'beam') {
    d.bodyHalfBeamMul = clamp(Math.abs(localY) / s, 0.38, 1.12);
  } else if (sy.dragHandle === 'sternBeam') {
    const sternHalfBeam = Math.abs(localY) / s;
    const bodyHalfBeam = Math.max(0.01, d.bodyHalfBeamMul);
    d.sternBeamMul = clamp(sternHalfBeam / bodyHalfBeam, 0.34, 1.08);
  }

  clampCrewToShipyardEditCapacity();
  sy.pendingCost = sy.freeEdit ? 0 : getShipDesignCost(d, sy.baseDesign);
}

function isPointInRect(px, py, rect) {
  return !!rect && px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

function getShipyardWeaponSlotScreenPoints() {
  const sy = state.shipyard;
  if (!sy.editDesign) return [];
  ensurePlayerWeaponLayout();
  const slotCount = player.weaponLayout.port.length;
  const shape = getHullShape({
    size: 44,
    hullDesign: sy.editDesign,
    hullLength: player.hullLength,
    hullBeam: player.hullBeam,
    bowSharpness: player.bowSharpness,
    sternTaper: player.sternTaper
  });
  const cx = sy.previewCenterX ?? (canvas.width * 0.5);
  const cy = sy.previewCenterY ?? (canvas.height * 0.54);
  const scale = sy.previewScale;
  const points = [];

  for (let i = 0; i < slotCount; i++) {
    const port = getHullSideMount(shape, i, slotCount, -1, 0.12, 0.88);
    const star = getHullSideMount(shape, i, slotCount, 1, 0.12, 0.88);
    points.push({
      side: 'port',
      index: i,
      type: player.weaponLayout.port[i],
      x: cx + port.x * scale,
      y: cy + port.y * scale,
      r: 10
    });
    points.push({
      side: 'starboard',
      index: i,
      type: player.weaponLayout.starboard[i],
      x: cx + star.x * scale,
      y: cy + star.y * scale,
      r: 10
    });
  }

  return points;
}

function pickShipyardWeaponSlot(px, py) {
  const sy = state.shipyard;
  const slots = sy.slotRects || [];
  for (const slot of slots) {
    if (Math.hypot(px - slot.x, py - slot.y) <= slot.r + 8) return slot;
  }
  return null;
}

canvas.addEventListener('pointerdown', (e) => {
  const p = pointerOnCanvas(e);

  if (state.gameOver) {
    const r = state.gameOverReturnRect;
    if (r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h) {
      resetForNewRun();
    }
    return;
  }

  if (state.mode === 'combat') {
    const devtools = ensureDevtoolsState();
    devtools.cursorWorld = screenToWorld(p.x, p.y);

    if (handleCombatDevtoolsClick(p.x, p.y)) return;

    if (devtools.visible && devtools.spawnOnClick && !state.upgradesOffered && !state.gameOver) {
      spawnDevtoolsEnemyAtCursor();
      return;
    }

    handlePlayerCannonClick(p.x, p.y);
    return;
  }

  if (state.mode !== 'shipyard') return;
  const sy = state.shipyard;

  if (sy.freeEdit) {
    for (const rect of sy.starterPresetRects || []) {
      if (isPointInRect(p.x, p.y, rect)) {
        if (rect.isUnlocked) {
          applyStarterShipPreset(rect.id);
        } else if (rect.canAfford) {
          // Unlock the ship
          persistentDoubloons -= rect.cost;
          unlockedShips.add(rect.id);
          const sv = loadSave();
          sv.doubloons = persistentDoubloons;
          sv.unlocked = [...unlockedShips];
          writeSave(sv);
          applyStarterShipPreset(rect.id);
          sy.message = `Unlocked ${SHIP_ROSTER.find(s => s.id === rect.id)?.name}!`;
        } else {
          sy.message = `Need ${rect.cost} doubloons to unlock. Earn more by playing!`;
        }
        return;
      }
    }
  }

  const modeRects = sy.modeRects || {};
  if (isPointInRect(p.x, p.y, modeRects.shape)) {
    sy.editMode = 'shape';
    sy.dragHandle = null;
    sy.message = '';
    return;
  }
  if (isPointInRect(p.x, p.y, modeRects.weapons)) {
    sy.editMode = 'weapons';
    sy.dragHandle = null;
    sy.message = '';
    return;
  }

  if (sy.editMode === 'weapons') {
    for (const [name, rect] of Object.entries(sy.brushRects || {})) {
      if (isPointInRect(p.x, p.y, rect)) {
        sy.weaponBrush = name;
        sy.message = '';
        return;
      }
    }
  }

  const crewRects = sy.crewRects || {};
  if (isPointInRect(p.x, p.y, crewRects.crewAdd)) return adjustTotalCrew(1);
  if (isPointInRect(p.x, p.y, crewRects.crewSub)) return adjustTotalCrew(-1);
  if (isPointInRect(p.x, p.y, crewRects.rowerAdd)) return adjustCrewRole('rowers', 1);
  if (isPointInRect(p.x, p.y, crewRects.rowerSub)) return adjustCrewRole('rowers', -1);
  if (isPointInRect(p.x, p.y, crewRects.gunnerAdd)) return adjustCrewRole('gunners', 1);
  if (isPointInRect(p.x, p.y, crewRects.gunnerSub)) return adjustCrewRole('gunners', -1);
  if (isPointInRect(p.x, p.y, crewRects.repairAdd)) return adjustCrewRole('repairCrew', 1);
  if (isPointInRect(p.x, p.y, crewRects.repairSub)) return adjustCrewRole('repairCrew', -1);

  if (sy.editMode === 'weapons') {
    const slot = pickShipyardWeaponSlot(p.x, p.y);
    if (slot) {
      applyWeaponPlacement(slot.side, slot.index, sy.weaponBrush || 'gun');
      return;
    }
  }

  if (sy.launchRect && p.x >= sy.launchRect.x && p.x <= sy.launchRect.x + sy.launchRect.w && p.y >= sy.launchRect.y && p.y <= sy.launchRect.y + sy.launchRect.h) {
    launchFromShipyard();
    return;
  }
  if (sy.resetRect && p.x >= sy.resetRect.x && p.x <= sy.resetRect.x + sy.resetRect.w && p.y >= sy.resetRect.y && p.y <= sy.resetRect.y + sy.resetRect.h) {
    sy.editDesign = { ...sy.baseDesign };
    sy.pendingCost = 0;
    sy.message = sy.freeEdit ? 'Hull reset. Keep placing weapons and crew with your 100 gold.' : 'Refit reset to current hull.';
    return;
  }

  if (sy.editMode === 'shape') {
    const handle = pickShipyardHandle(p.x, p.y);
    if (handle) {
      sy.dragHandle = handle;
      sy.dragStart = p;
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  const p = pointerOnCanvas(e);
  if (state.mode === 'combat') {
    const devtools = ensureDevtoolsState();
    devtools.cursorWorld = screenToWorld(p.x, p.y);
  }

  if (state.mode !== 'shipyard') return;
  if (!state.shipyard.dragHandle) return;
  updateShipyardDrag(p.x, p.y);
});

window.addEventListener('mouseup', () => {
  if (state.mode !== 'shipyard') return;
  state.shipyard.dragHandle = null;
  state.shipyard.dragStart = null;
});

const keys = new Set();
window.addEventListener('keydown', (e) => keys.add(e.key.toLowerCase()));
window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (e.code === 'F3' && !e.repeat) {
    e.preventDefault();
    const devtools = ensureDevtoolsState();
    devtools.visible = !devtools.visible;
  }

  if ((key === ' ' || key === 'spacebar' || e.code === 'Space') && !e.repeat) {
    if (e.code === 'Space' || key === ' ') e.preventDefault();
    player.sailOpen = !player.sailOpen;
  }

  if (key === 'x' && !e.repeat && state.mode === 'combat') {
    player.anchorDropped = !player.anchorDropped;
    if (player.anchorDropped) {
      player.speed = 0;
      state.anchorNoticeText = '⚓ Anchor dropped';
    } else {
      state.anchorNoticeText = '⚓ Anchor raised';
    }
    state.anchorNoticeTimer = 1.6;
  }
});

window.addEventListener('wheel', (e) => {
  e.preventDefault();
  const step = e.deltaY > 0 ? -0.06 : 0.06;
  state.zoomUserOffset = clamp(state.zoomUserOffset + step, -0.26, 0.62);
}, { passive: false });

function getPlayerRanges() {
  const weapon = getPlayerWeaponCounts();
  const gun = 124 + weapon.gunTotal * 3 + player.gunners * 4 + state.level * 0.8;
  const cannon = 236 + weapon.cannonPerSide * 20 + player.cannonPivot * 1.6 + state.level * 1.2;
  return {
    gun,
    cannon: Math.max(gun + 70, cannon)
  };
}

function getPlayerVisionRange() {
  const ranges = getPlayerRanges();
  const base = ranges.cannon + 44;
  const bonus = Number(player.lookoutRangeBonus || 0);
  return clamp(base + bonus, 180, 980);
}

function getPlayerWeaponSlotCount() {
  const caps = getShipWeaponCaps(player, player.cannonCapacityBonus);
  return clamp(Math.max(3, Math.ceil(caps.maxGunners * 0.6) + 2), 3, 12);
}

function ensurePlayerWeaponLayout() {
  const slots = getPlayerWeaponSlotCount();
  if (!player.weaponLayout) {
    player.weaponLayout = { port: [], starboard: [] };
  }
  const normalize = (arr) => {
    const out = Array.isArray(arr) ? [...arr] : [];
    while (out.length < slots) out.push('empty');
    if (out.length > slots) out.length = slots;
    for (let i = 0; i < out.length; i++) {
      if (out[i] !== 'gun' && out[i] !== 'cannon') out[i] = 'empty';
    }
    return out;
  };
  player.weaponLayout.port = normalize(player.weaponLayout.port);
  player.weaponLayout.starboard = normalize(player.weaponLayout.starboard);

  if (!player.cannonMountTimers) {
    player.cannonMountTimers = { port: [], starboard: [] };
  }
  if (!player.cannonVolleyTimers) {
    player.cannonVolleyTimers = { port: 0, starboard: 0 };
  }
  const normalizeTimers = (arr) => {
    const out = Array.isArray(arr) ? [...arr] : [];
    while (out.length < slots) out.push(0);
    if (out.length > slots) out.length = slots;
    for (let i = 0; i < out.length; i++) {
      out[i] = Number.isFinite(out[i]) ? Math.max(0, out[i]) : 0;
    }
    return out;
  };
  player.cannonMountTimers.port = normalizeTimers(player.cannonMountTimers.port);
  player.cannonMountTimers.starboard = normalizeTimers(player.cannonMountTimers.starboard);
  player.cannonVolleyTimers.port = Number.isFinite(player.cannonVolleyTimers.port)
    ? Math.max(0, player.cannonVolleyTimers.port)
    : 0;
  player.cannonVolleyTimers.starboard = Number.isFinite(player.cannonVolleyTimers.starboard)
    ? Math.max(0, player.cannonVolleyTimers.starboard)
    : 0;
}

function getCannonTimerLane(side) {
  ensurePlayerWeaponLayout();
  return side === 'port' ? player.cannonMountTimers.port : player.cannonMountTimers.starboard;
}

function tickPlayerCannonMountTimers(dt) {
  ensurePlayerWeaponLayout();
  const tickLane = (lane) => {
    for (let i = 0; i < lane.length; i++) {
      lane[i] = Math.max(0, lane[i] - dt);
    }
  };
  tickLane(player.cannonMountTimers.port);
  tickLane(player.cannonMountTimers.starboard);
  player.cannonVolleyTimers.port = Math.max(0, (player.cannonVolleyTimers.port || 0) - dt);
  player.cannonVolleyTimers.starboard = Math.max(0, (player.cannonVolleyTimers.starboard || 0) - dt);
}

function getPlayerCannonRemainingRatio(side, index) {
  const lane = getCannonTimerLane(side);
  const remaining = Number(lane[index] || 0);
  const reload = toFinitePositive(getEffectiveReloadTimes().cannon, 2.8);
  return clamp(remaining / reload, 0, 1);
}

function getPlayerCannonHudLoad() {
  ensurePlayerWeaponLayout();
  const reload = toFinitePositive(getEffectiveReloadTimes().cannon, 2.8);
  let sum = 0;
  let count = 0;
  const appendLane = (laneTypes, laneTimers) => {
    for (let i = 0; i < laneTypes.length; i++) {
      if (laneTypes[i] !== 'cannon') continue;
      const remaining = Number(laneTimers[i] || 0);
      sum += clamp(1 - (remaining / reload), 0, 1);
      count += 1;
    }
  };
  appendLane(player.weaponLayout.port, player.cannonMountTimers.port);
  appendLane(player.weaponLayout.starboard, player.cannonMountTimers.starboard);
  if (count <= 0) return 1;
  return clamp(sum / count, 0, 1);
}

function getManualAimTarget() {
  const devtools = ensureDevtoolsState();
  const cursor = devtools.cursorWorld || { x: player.x, y: player.y };
  return {
    x: cursor.x,
    y: cursor.y,
    angle: Math.atan2(cursor.y - player.y, cursor.x - player.x)
  };
}

function firePlayerCannonsAtCursor(sideSign) {
  const right = getRightVector();
  const forward = getForwardVector();
  const shape = getHullShape(player);
  ensurePlayerWeaponLayout();
  const sideKey = sideSign < 0 ? 'port' : 'starboard';
  if ((player.cannonVolleyTimers?.[sideKey] || 0) > 0.001) return;
  const lane = sideSign < 0 ? player.weaponLayout.port : player.weaponLayout.starboard;
  const timerLane = getCannonTimerLane(sideKey);
  const totalSlots = Math.max(1, lane.length);
  const ranges = getPlayerRanges();
  const targetAngle = getManualAimTarget().angle;
  const pivotRad = player.cannonPivot * (Math.PI / 180);
  const reload = toFinitePositive(getEffectiveReloadTimes().cannon, 2.8);

  let fired = 0;
  let dirXAcc = 0;
  let dirYAcc = 0;

  for (let i = 0; i < totalSlots; i++) {
    const slotType = lane[i];
    if (!CANNON_LIKE_TYPES.has(slotType)) continue;
    if ((timerLane[i] || 0) > 0.001) continue;

    const mount = getHullSideMount(shape, i, totalSlots, sideSign, 0.12, 0.88);
    const mountLen = Math.max(8, player.size * 0.48);
    const muzzleLift = mountLen + 0.7;
    const localX = mount.x + mount.nx * muzzleLift;
    const localY = mount.y + mount.ny * muzzleLift;
    const spawnX = player.x + forward.x * localX + right.x * localY;
    const spawnY = player.y + forward.y * localX + right.y * localY;

    const mountWorldAngle = player.heading + Math.atan2(mount.ny, mount.nx);
    const adjust = clamp(angleDiff(targetAngle, mountWorldAngle), -pivotRad, pivotRad);
    const spread = (Math.random() - 0.5) * 0.1;
    const dir = mountWorldAngle + adjust + spread;
    const dirX = Math.cos(dir);
    const dirY = Math.sin(dir);

    // Build bullet based on slot type
    let bulletProps = {};
    if (slotType === 'ghostCannon') {
      bulletProps = { vx: dirX * (player.bulletSpeed + 0.55), vy: dirY * (player.bulletSpeed + 0.55), dmg: player.bulletDamage + 5, maxRange: ranges.cannon, weaponType: 'ghostCannon', piercing: true, hitEnemies: new Set() };
    } else if (slotType === 'fireBomb') {
      bulletProps = { vx: dirX * (player.bulletSpeed * 0.52), vy: dirY * (player.bulletSpeed * 0.52), dmg: player.bulletDamage + 3, maxRange: ranges.cannon * 0.80, weaponType: 'fireBomb', isBomb: true };
    } else if (slotType === 'chainShot') {
      bulletProps = { vx: dirX * (player.bulletSpeed + 0.25), vy: dirY * (player.bulletSpeed + 0.25), dmg: player.bulletDamage + 6, maxRange: ranges.cannon * 0.90, weaponType: 'chainShot', isChain: true };
    } else {
      bulletProps = { vx: dirX * (player.bulletSpeed + 0.45), vy: dirY * (player.bulletSpeed + 0.45), dmg: player.bulletDamage + 4, maxRange: ranges.cannon };
    }

    state.bullets.push({
      x: spawnX, y: spawnY,
      heavy: true, owner: 'player', sourceSize: player.size, travel: 0,
      ...bulletProps
    });

    timerLane[i] = reload;
    fired += 1;
    dirXAcc += dirX;
    dirYAcc += dirY;
    spawnMuzzleBlast(spawnX, spawnY, dirX, dirY, true);
  }

  if (fired > 0) {
    player.cannonVolleyTimers[sideKey] = reload;
    const len = Math.hypot(dirXAcc, dirYAcc) || 1;
    playCannonVolleySfx(player.x, player.y, dirXAcc / len, dirYAcc / len, fired, player.size);
  }
}

function handlePlayerCannonClick(screenX, screenY) {
  if (state.mode !== 'combat' || state.upgradesOffered || state.gameOver) return;
  const world = screenToWorld(screenX, screenY);
  const fwd = getForwardVector();
  const dx = world.x - player.x;
  const dy = world.y - player.y;
  const cross = fwd.x * dy - fwd.y * dx;
  const sideSign = cross >= 0 ? 1 : -1;
  firePlayerCannonsAtCursor(sideSign);
}

function getCursorAimedSideSign() {
  const devtools = ensureDevtoolsState();
  const cursor = devtools.cursorWorld || { x: player.x, y: player.y };
  const fwd = getForwardVector();
  const dx = cursor.x - player.x;
  const dy = cursor.y - player.y;
  const cross = fwd.x * dy - fwd.y * dx;
  return cross >= 0 ? 1 : -1;
}

function drawCursorCannonReloadIndicators(cursorScreenX, cursorScreenY) {
  ensurePlayerWeaponLayout();
  const sideSign = getCursorAimedSideSign();
  const sideKey = sideSign < 0 ? 'port' : 'starboard';
  const lane = sideSign < 0 ? player.weaponLayout.port : player.weaponLayout.starboard;
  const timerLane = getCannonTimerLane(sideKey);
  const sideVolleyRemaining = player.cannonVolleyTimers?.[sideKey] || 0;

  const cannonIndices = [];
  for (let i = 0; i < lane.length; i++) {
    if (CANNON_LIKE_TYPES.has(lane[i])) cannonIndices.push(i);
  }
  if (!cannonIndices.length) return;

  const ringRadius = 22;
  const dotRadius = 4.2;
  const count = cannonIndices.length;

  ctx.save();
  for (let i = 0; i < count; i++) {
    const idx = cannonIndices[i];
    const ready = (timerLane[idx] || 0) <= 0.001 && sideVolleyRemaining <= 0.001;
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / count;
    const x = cursorScreenX + Math.cos(angle) * ringRadius;
    const y = cursorScreenY + Math.sin(angle) * ringRadius;

    ctx.beginPath();
    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
    ctx.fillStyle = ready ? '#ff2d2d' : '#000000';
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  ctx.restore();
}

function drawAimReticle() {
  if (state.mode !== 'combat') return;
  const devtools = ensureDevtoolsState();
  const cursor = devtools.cursorWorld || { x: player.x, y: player.y };
  const p = toScreen(cursor.x, cursor.y);
  const radius = 10;
  ctx.save();
  ctx.strokeStyle = 'rgba(190,140,78,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(212,167,98,0.92)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(p.x - (radius + 5), p.y);
  ctx.lineTo(p.x + (radius + 5), p.y);
  ctx.moveTo(p.x, p.y - (radius + 5));
  ctx.lineTo(p.x, p.y + (radius + 5));
  ctx.stroke();
  drawCursorCannonReloadIndicators(p.x, p.y);
  ctx.restore();
}

function getPlayerWeaponCounts() {
  ensurePlayerWeaponLayout();
  const port = player.weaponLayout.port;
  const star = player.weaponLayout.starboard;
  let gunTotal = 0;
  let cannonTotal = 0;
  let portCannons = 0;
  let starCannons = 0;

  for (let i = 0; i < port.length; i++) {
    if (GUN_LIKE_TYPES.has(port[i])) gunTotal += 1;
    if (CANNON_LIKE_TYPES.has(port[i])) {
      cannonTotal += 1;
      portCannons += 1;
    }
    if (GUN_LIKE_TYPES.has(star[i])) gunTotal += 1;
    if (CANNON_LIKE_TYPES.has(star[i])) {
      cannonTotal += 1;
      starCannons += 1;
    }
  }

  return {
    gunTotal,
    cannonTotal,
    cannonPerSide: Math.max(portCannons, starCannons)
  };
}

function syncArmamentDerivedStats() {
  const weapon = getPlayerWeaponCounts();
  player.cannons = weapon.cannonPerSide;
}

function getWeaponCrewDemand() {
  const weapon = getPlayerWeaponCounts();
  return weapon.gunTotal * 0.55 + weapon.cannonTotal * 1.15;
}

function getWeaponCrewRatio() {
  const demand = Math.max(1, getWeaponCrewDemand());
  return clamp((player.gunners || 0) / demand, 0.25, 1.55);
}

function toFinitePositive(value, fallback) {
  const num = Number(value);
  if (!Number.isFinite(num) || num <= 0) return fallback;
  return num;
}

function getEffectiveReloadTimes() {
  const ratio = toFinitePositive(getWeaponCrewRatio(), 1);
  const factor = clamp(toFinitePositive(1.52 - ratio * 0.58, 1), 0.72, 1.88);
  const gunBase = toFinitePositive(player.gunReload, 1.35);
  const cannonBase = toFinitePositive(player.cannonReload, 3.4);
  return {
    gun: Math.max(0.08, gunBase * factor),
    cannon: Math.max(0.2, cannonBase * (factor * 1.04))
  };
}

function getGoldMagnetRange() {
  return getPlayerRanges().gun * (GOLD_MAGNET_PULL_FACTOR + state.goldMagnetBonus);
}

function isPointOnIsland(x, y) {
  for (const island of state.islands) {
    const centerDist = Math.hypot(x - island.x, y - island.y);
    if (centerDist > island.r + 22) continue;
    for (const patch of island.patches) {
      if (Math.hypot(x - patch.x, y - patch.y) <= patch.size * 0.86) return true;
    }
  }
  return false;
}

function getCollectorHomePosition(index, count) {
  const fwd = { x: Math.cos(player.heading), y: Math.sin(player.heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const lane = Math.floor(index / 2);
  const side = index % 2 === 0 ? -1 : 1;
  const foreAft = (lane - Math.floor((count - 1) / 4)) * 10;
  const sideOffset = player.size * 0.98 + 8 + lane * 0.4;
  return {
    x: player.x + fwd.x * foreAft + right.x * (side * sideOffset),
    y: player.y + fwd.y * foreAft + right.y * (side * sideOffset)
  };
}

function getDesiredCollectorSkiffCount() {
  const crewBased = 1 + Math.floor(Math.max(0, (player.crew || 0) - 2) / 4);
  const bonus = player.salvageSkiffCount || 0;
  return clamp(crewBased + bonus, 1, 8);
}

function ensureCollectorSkiffs() {
  const wanted = getDesiredCollectorSkiffCount();
  if (!Array.isArray(player.collectorSkiffs)) player.collectorSkiffs = [];
  while (player.collectorSkiffs.length < wanted) {
    const idx = player.collectorSkiffs.length;
    const dock = getCollectorHomePosition(idx, wanted);
    player.collectorSkiffs.push({
      x: dock.x,
      y: dock.y,
      vx: 0,
      vy: 0,
      carrying: 0,
      target: null,
      runner: null,
      docked: true
    });
  }
  if (player.collectorSkiffs.length > wanted) {
    player.collectorSkiffs.length = wanted;
  }
}

function updateCollectorSkiffs(dt) {
  ensureCollectorSkiffs();
  if (!player.collectorSkiffs.length) return;

  const magnetRange = getGoldMagnetRange();
  const skiffCollectionRange = Math.max(120, getPlayerRanges().cannon * 0.92);
  const isDropAssignable = (drop) => {
    const dPlayer = Math.hypot(drop.x - player.x, drop.y - player.y);
    if (dPlayer < magnetRange * 0.9) return false;
    if (dPlayer > skiffCollectionRange) return false;
    return true;
  };
  const taken = new Set();
  for (const skiff of player.collectorSkiffs) {
    if (skiff.target && state.drops.includes(skiff.target)) taken.add(skiff.target);
  }

  for (let i = 0; i < player.collectorSkiffs.length; i++) {
    const skiff = player.collectorSkiffs[i];
    const dock = getCollectorHomePosition(i, player.collectorSkiffs.length);
    if (skiff.docked == null) skiff.docked = true;
    if (skiff.stuckTimer == null) skiff.stuckTimer = 0;

    if (skiff.docked && !skiff.target && !skiff.carrying && !skiff.runner) {
      skiff.x = dock.x;
      skiff.y = dock.y;
      skiff.vx = 0;
      skiff.vy = 0;
    }

    if (skiff.runner) {
      const runner = skiff.runner;
      const targetPos = runner.returning ? { x: skiff.x, y: skiff.y } : { x: runner.drop.x, y: runner.drop.y };
      const rdx = targetPos.x - runner.x;
      const rdy = targetPos.y - runner.y;
      const rdist = Math.hypot(rdx, rdy) || 1;
      const rspeed = runner.returning ? 2.75 : 2.4;
      runner.x += (rdx / rdist) * rspeed * dt * 60;
      runner.y += (rdy / rdist) * rspeed * dt * 60;

      if (!runner.returning && rdist < 8) {
        const idx = state.drops.indexOf(runner.drop);
        if (idx >= 0) {
          runner.carrying = runner.drop.v;
          state.drops.splice(idx, 1);
        }
        runner.returning = true;
      }

      if (runner.returning && rdist < 9) {
        skiff.carrying += runner.carrying;
        skiff.runner = null;
      }

      if (skiff.runner) {
        skiff.target = null;
        skiff.vx = 0;
        skiff.vy = 0;
        continue;
      }
    }

    if (skiff.target && !state.drops.includes(skiff.target)) skiff.target = null;

    if (!skiff.carrying && !skiff.target && !skiff.runner) {
      let best = null;
      let bestScore = Infinity;
      for (const drop of state.drops) {
        if (taken.has(drop)) continue;
        if (!isDropAssignable(drop)) continue;
        const dSkiff = Math.hypot(drop.x - skiff.x, drop.y - skiff.y);
        if (dSkiff < bestScore) {
          best = drop;
          bestScore = dSkiff;
        }
      }
      if (best) {
        skiff.docked = false;
        skiff.target = best;
        taken.add(best);
      } else {
        skiff.target = null;
        if (!skiff.runner) {
          skiff.carrying = 0;
        }
      }
    }

    if (skiff.docked) continue;

    const target = skiff.carrying ? dock : (skiff.target || dock);
    const dx = target.x - skiff.x;
    const dy = target.y - skiff.y;
    const dist = Math.hypot(dx, dy) || 1;

    if (!skiff.target && !skiff.runner && dist < 18) {
      skiff.x = dock.x;
      skiff.y = dock.y;
      if (skiff.carrying > 0) addGold(skiff.carrying);
      skiff.carrying = 0;
      skiff.target = null;
      skiff.runner = null;
      skiff.vx = 0;
      skiff.vy = 0;
      skiff.docked = true;
      continue;
    }

    const dirX = dx / dist;
    const dirY = dy / dist;
    const avoid = getShoreAvoidanceVector({ x: skiff.x, y: skiff.y, size: 5 }, 120);
    const avoidWeight = dist < 22 ? 0.45 : 1.8;
    const moveX = dirX + avoid.x * avoidWeight;
    const moveY = dirY + avoid.y * avoidWeight;
    const moveLen = Math.hypot(moveX, moveY) || 1;
    const speed = skiff.carrying ? 1.6 : 1.9;
    skiff.vx = (moveX / moveLen) * speed;
    skiff.vy = (moveY / moveLen) * speed;
    skiff.x += skiff.vx * dt * 60;
    skiff.y += skiff.vy * dt * 60;
    skiff.x = clamp(skiff.x, 20, state.world.width - 20);
    skiff.y = clamp(skiff.y, 20, state.world.height - 20);

    if (dist > 10 && Math.hypot(skiff.vx, skiff.vy) < 0.22) {
      skiff.stuckTimer += dt;
    } else {
      skiff.stuckTimer = Math.max(0, skiff.stuckTimer - dt * 0.8);
    }

    if (skiff.stuckTimer > 1.25) {
      const push = getShoreAvoidanceVector({ x: skiff.x, y: skiff.y, size: 6 }, 150);
      skiff.x = clamp(skiff.x + push.x * 22 + (Math.random() - 0.5) * 8, 20, state.world.width - 20);
      skiff.y = clamp(skiff.y + push.y * 22 + (Math.random() - 0.5) * 8, 20, state.world.height - 20);
      if (!skiff.carrying) skiff.target = null;
      skiff.stuckTimer = 0;
    }

    const skiffHeading = Math.atan2(skiff.vy || 0, skiff.vx || 1);
    const skiffSpeed = Math.hypot(skiff.vx || 0, skiff.vy || 0);
    spawnVesselWakeParticles(skiff.x, skiff.y, skiffHeading, 6.2, skiffSpeed, 1.9, 1.2);

    if (!skiff.carrying && skiff.target && !skiff.runner && Math.hypot(skiff.target.x - skiff.x, skiff.target.y - skiff.y) < 12) {
      if (isPointOnIsland(skiff.target.x, skiff.target.y)) {
        skiff.runner = {
          x: skiff.x,
          y: skiff.y,
          drop: skiff.target,
          carrying: 0,
          returning: false
        };
      } else {
        skiff.carrying = skiff.target.v;
        const idx = state.drops.indexOf(skiff.target);
        if (idx >= 0) state.drops.splice(idx, 1);
      }
      skiff.target = null;
    }

    if (Math.hypot(dock.x - skiff.x, dock.y - skiff.y) < 16 && !skiff.target && !skiff.runner) {
      skiff.x = dock.x;
      skiff.y = dock.y;
      if (skiff.carrying > 0) addGold(skiff.carrying);
      skiff.carrying = 0;
      skiff.target = null;
      skiff.runner = null;
      skiff.vx = 0;
      skiff.vy = 0;
      skiff.docked = true;
    }
  }
}

function getHullShape(entity) {
  if (entity.hullDesign) {
    const size = entity.size;
    const design = entity.hullDesign;
    const bodyHalfLen = size * clamp(design.bodyHalfLenMul, 0.36, 0.95);
    const bodyHalfBeam = size * clamp(design.bodyHalfBeamMul, 0.38, 1.12);
    const sternBeamMul = clamp(design.sternBeamMul ?? 1, 0.34, 1.08);
    const sternHalfBeam = bodyHalfBeam * sternBeamMul;
    const bowTip = size * clamp(design.bowTipMul, 0.2, 1.25);
    const sternTip = size * clamp(design.sternTipMul, 0.12, 1.15);
    const beam = Math.max(2.2, bodyHalfBeam / 0.62);
    const shoulderX = bodyHalfLen;
    const sternShoulderX = -bodyHalfLen;
    const bowX = shoulderX + bowTip;
    const sternX = sternShoulderX - sternTip;
    return {
      len: (bowX - sternX) * 0.5,
      beam,
      bow: 1,
      stern: 1,
      bowX,
      shoulderX,
      shoulderHalfBeam: bodyHalfBeam,
      sternShoulderX,
      sternHalfBeam,
      sternX
    };
  }

  const size = entity.size;
  const len = size * clamp(entity.hullLength ?? 1, 0.78, 1.55);
  const beam = size * clamp(entity.hullBeam ?? 1, 0.7, 1.45);
  const bow = clamp(entity.bowSharpness ?? 1, 0.72, 1.7);
  const stern = clamp(entity.sternTaper ?? 1, 0.6, 1.5);

  return {
    len,
    beam,
    bow,
    stern,
    bowX: len * (1.05 + bow * 0.14),
    shoulderX: len * 0.34,
    shoulderHalfBeam: beam * 0.62,
    sternShoulderX: -len * (0.7 + stern * 0.2),
    sternHalfBeam: beam * 0.46,
    sternX: -len * (0.95 + stern * 0.24)
  };
}

function getShipDesignCost(design, baseDesign) {
  if (!design || !baseDesign) return 0;
  const sternBeamA = design.sternBeamMul ?? 1;
  const sternBeamB = baseDesign.sternBeamMul ?? 1;
  const body = Math.abs(design.bodyHalfLenMul - baseDesign.bodyHalfLenMul) * 160;
  const beam = Math.abs(design.bodyHalfBeamMul - baseDesign.bodyHalfBeamMul) * 180;
  const sternBeam = Math.abs(sternBeamA - sternBeamB) * 170;
  const bow = Math.abs(design.bowTipMul - baseDesign.bowTipMul) * 140;
  const stern = Math.abs(design.sternTipMul - baseDesign.sternTipMul) * 120;
  return Math.round(body + beam + sternBeam + bow + stern);
}

function getShipValueScore() {
  const d = player.hullDesign || DEFAULT_HULL_DESIGN;
  const sternBeamMul = d.sternBeamMul ?? 1;
  const weapon = getPlayerWeaponCounts();
  const hullValue = d.bodyHalfLenMul * 140 + d.bodyHalfBeamMul * 160 + sternBeamMul * 120 + d.bowTipMul * 120 + d.sternTipMul * 90;
  const crewValue = player.gunners * 18 + player.rowers * 12 + (player.repairCrew || 0) * 14;
  const weaponValue = weapon.cannonTotal * 28 + weapon.gunTotal * 9 + player.bulletDamage * 3;
  const sizeValue = (player.size - 16) * 22 + Math.max(0, player.cannonCapacityBonus) * 30;
  return Math.max(0, hullValue + crewValue + weaponValue + sizeValue);
}

function updateShipValueTier() {
  state.shipValueTier = clamp(Math.floor(getShipValueScore() / 120), 0, 14);
}

function setShipyardMode(freeEdit) {
  ensurePlayerWeaponLayout();
  state.mode = 'shipyard';
  state.shipyard.active = true;
  state.shipyard.freeEdit = !!freeEdit;
  state.shipyard.starterPresetChosen = !freeEdit;
  state.shipyard.starterPresetId = null;
  state.shipyard.starterPresetRects = [];
  state.shipyard.editMode = 'shape';
  state.shipyard.baseDesign = { ...(player.hullDesign || DEFAULT_HULL_DESIGN) };
  state.shipyard.editDesign = { ...state.shipyard.baseDesign };
  state.shipyard.pendingCost = 0;
  state.shipyard.dragHandle = null;
  state.shipyard.dragStart = null;
  state.shipyard.slotRects = [];
  state.shipyard.weaponBrush = 'gun';
  state.shipyard.message = freeEdit
    ? 'Choose a starter ship preset, then tune guns/crew and launch.'
    : 'Boss defeated. Spend gold to refit, re-arm, and assign crew before launch.';
}

function applyShipyardDesign() {
  const sy = state.shipyard;
  if (!sy.editDesign) return false;
  const cost = sy.freeEdit ? 0 : getShipDesignCost(sy.editDesign, sy.baseDesign);
  if (!sy.freeEdit && state.gold < cost) {
    sy.message = `Not enough gold (${Math.round(state.gold)}/${cost}).`;
    return false;
  }
  if (!sy.freeEdit) state.gold -= cost;
  player.hullDesign = { ...sy.editDesign };
  sy.baseDesign = { ...player.hullDesign };
  sy.pendingCost = 0;
  syncArmamentDerivedStats();
  sy.message = '';
  updateShipValueTier();
  return true;
}

function adjustCrewRole(role, delta) {
  const sy = state.shipyard;
  const capEntity = getShipyardCapacityEntity();
  const deckCap = getDeckCrewCapacity(capEntity);
  if (delta > 0) {
    const spare = getSpareCrewCapacity({
      ...capEntity,
      crew: player.crew,
      rowers: player.rowers,
      gunners: player.gunners,
      repairCrew: player.repairCrew
    });
    if (spare <= 0) {
      if (player.crew < deckCap && state.gold >= SHIPYARD_COST.crew) {
        state.gold -= SHIPYARD_COST.crew;
        player.crew += 1;
      } else {
        sy.message = `No free crew. Hire costs ${SHIPYARD_COST.crew} gold.`;
        return;
      }
    }
    player[role] += 1;
    sy.message = '';
    return;
  }

  if ((player[role] || 0) <= 0) return;
  player[role] -= 1;
  sy.message = '';
}

function adjustTotalCrew(delta) {
  const sy = state.shipyard;
  const deckCap = getDeckCrewCapacity(getShipyardCapacityEntity());
  if (delta > 0) {
    if (player.crew >= deckCap) {
      sy.message = `Deck crew cap reached (${player.crew}/${deckCap}).`;
      return;
    }
    if (state.gold < SHIPYARD_COST.crew) {
      sy.message = `Need ${SHIPYARD_COST.crew} gold to hire crew.`;
      return;
    }
    state.gold -= SHIPYARD_COST.crew;
    player.crew += 1;
    sy.message = '';
    return;
  }

  const committed = (player.rowers || 0) + (player.gunners || 0) + (player.repairCrew || 0);
  if (player.crew <= committed || player.crew <= 1) {
    sy.message = 'Unassign roles before reducing total crew.';
    return;
  }
  player.crew -= 1;
  state.gold += Math.round(SHIPYARD_COST.crew * 0.7);
  sy.message = '';
}

function applyWeaponPlacement(side, index, nextType) {
  ensurePlayerWeaponLayout();
  const sy = state.shipyard;
  const lane = player.weaponLayout[side];
  const prev = lane[index] || 'empty';
  if (prev === nextType) return;

  const deltaCost = (type) => type === 'cannon' ? SHIPYARD_COST.cannon : type === 'gun' ? SHIPYARD_COST.gun : 0;
  const cost = deltaCost(nextType) - deltaCost(prev);
  if (cost > 0 && state.gold < cost) {
    sy.message = `Need ${cost} gold for that placement.`;
    return;
  }

  if (nextType === 'cannon') {
    const caps = getShipWeaponCaps(player, player.cannonCapacityBonus);
    const sideCannons = lane.filter((t) => t === 'cannon').length;
    if (sideCannons >= caps.maxCannonsPerSide && prev !== 'cannon') {
      sy.message = `Cannon cap reached for this hull (${caps.maxCannonsPerSide}/side).`;
      return;
    }
  }

  lane[index] = nextType;
  state.gold -= Math.max(0, cost);
  if (cost < 0) state.gold += Math.round(Math.abs(cost) * 0.8);
  syncArmamentDerivedStats();
  sy.message = '';
}

function launchFromShipyard() {
  if (state.shipyard.freeEdit && !state.shipyard.starterPresetChosen) {
    state.shipyard.message = 'Choose a starter ship preset first.';
    return;
  }
  if (!applyShipyardDesign()) return;
  clampPlayerCrewToDeck();
  clampPlayerSupportCrewToDeck();
  clampPlayerArmamentToHull();
  state.mode = 'combat';
  state.shipyard.active = false;
  state.shipyard.dragHandle = null;
  state.shipyard.dragStart = null;
  state.stageTimer = 0;
  state.bossTimer = 0;
  state.bossSpawnedThisStage = false;
  state.swarmPhase = 'calm';
  state.swarmTimer = 0;
  state.swarmCycle = 0;
  state.enemies = [];
  state.bullets = [];
  state.particles = [];
}

function onBossDefeated() {
  state.difficultyTier += 1;
  state.bossesDefeated += 1;
  state.stageIndex += 1;
  setShipyardMode(false);
}

function getHullDims(entity) {
  const shape = getHullShape(entity);
  return { len: shape.len, beam: shape.beam };
}

function getDeckCrewCapacity(entity) {
  const shape = getHullShape(entity);
  const deckLength = shape.shoulderX - shape.sternShoulderX;
  const deckBeam = shape.shoulderHalfBeam + shape.sternHalfBeam;
  const area = deckLength * deckBeam;
  return clamp(Math.floor(area / 56) + 2, 2, 48);
}

function getShipyardCapacityEntity() {
  const sy = state.shipyard;
  if (state.mode === 'shipyard' && sy && sy.editDesign) {
    return {
      ...player,
      hullDesign: sy.editDesign
    };
  }
  return player;
}

function clampCrewToShipyardEditCapacity() {
  const capEntity = getShipyardCapacityEntity();
  const deckCap = getDeckCrewCapacity(capEntity);
  player.crew = clamp(player.crew, 1, deckCap);

  const reduceRole = (role, amount) => {
    const next = Math.max(0, (player[role] || 0) - amount);
    const reducedBy = (player[role] || 0) - next;
    player[role] = next;
    return reducedBy;
  };

  let committed = (player.rowers || 0) + (player.gunners || 0) + (player.repairCrew || 0);
  if (committed > player.crew) {
    let overflow = committed - player.crew;
    overflow -= reduceRole('repairCrew', overflow);
    overflow -= reduceRole('gunners', overflow);
    overflow -= reduceRole('rowers', overflow);
    committed = (player.rowers || 0) + (player.gunners || 0) + (player.repairCrew || 0);
    if (committed > player.crew) {
      player.crew = committed;
    }
  }
}

function getShipTier(entity) {
  const shape = getHullShape(entity);
  const deckLength = shape.shoulderX - shape.sternShoulderX;
  if (deckLength < 24) return 1;
  if (deckLength < 36) return 2;
  if (deckLength < 50) return 3;
  return 4;
}

function getShipWeaponCaps(entity, cannonCapacityBonus = 0) {
  const shape = getHullShape(entity);
  const tier = getShipTier(entity);
  const deckLength = shape.shoulderX - shape.sternShoulderX;
  const deckBeam = shape.beam * 1.16;
  const deckArea = deckLength * deckBeam;

  const baseCannonsPerSide = 2 + (tier - 1) * 2;
  const areaCannons = Math.max(0, Math.floor((deckArea - 28) / 72));
  const maxCannonsPerSide = clamp(baseCannonsPerSide + areaCannons + cannonCapacityBonus, 2, 16);

  const baseGuns = 3 + tier * 2;
  const areaGuns = Math.max(0, Math.floor((deckArea - 28) / 44));
  const maxGunners = clamp(baseGuns + areaGuns, 3, 24);

  return { tier, maxCannonsPerSide, maxGunners };
}

function clampPlayerCrewToDeck() {
  player.crew = clamp(player.crew, 1, getDeckCrewCapacity(player));
}

function getSpareCrewCapacity(entity = player) {
  const totalCrew = clamp(entity.crew || 0, 0, getDeckCrewCapacity(entity));
  const committed = Math.max(0, (entity.rowers || 0) + (entity.gunners || 0) + (entity.repairCrew || 0));
  return Math.max(0, totalCrew - committed);
}

function clampPlayerSupportCrewToDeck() {
  const maxByDeck = getDeckCrewCapacity(player);
  player.repairCrew = clamp(player.repairCrew || 0, 0, maxByDeck);
  const maxSupport = Math.max(0, player.crew - (player.rowers + player.gunners));
  player.repairCrew = Math.min(player.repairCrew, maxSupport);
}

function clampPlayerArmamentToHull() {
  ensurePlayerWeaponLayout();
  const caps = getShipWeaponCaps(player, player.cannonCapacityBonus);
  player.gunners = clamp(player.gunners, 0, caps.maxGunners);

  const trimCannons = (lane) => {
    let cannons = 0;
    for (let i = 0; i < lane.length; i++) {
      if (lane[i] !== 'cannon') continue;
      cannons += 1;
      if (cannons > caps.maxCannonsPerSide) lane[i] = 'gun';
    }
  };

  trimCannons(player.weaponLayout.port);
  trimCannons(player.weaponLayout.starboard);
  syncArmamentDerivedStats();
}

function damagePlayer(amount) {
  if (amount <= 0) return;
  player.hp -= amount;
  player.repairSuppressed = Math.max(player.repairSuppressed || 0, 2.4);
}

function getHullUpperEdge(shape) {
  return [
    { x: shape.sternX, y: 0 },
    { x: shape.sternShoulderX, y: -shape.sternHalfBeam },
    { x: shape.shoulderX, y: -shape.shoulderHalfBeam },
    { x: shape.bowX, y: 0 }
  ];
}

function hullHalfWidthAt(shape, x) {
  const topA = { x: shape.bowX, y: 0 };
  const topB = { x: shape.shoulderX, y: -shape.shoulderHalfBeam };
  const topC = { x: shape.sternShoulderX, y: -shape.sternHalfBeam };
  const topD = { x: shape.sternX, y: 0 };

  const px = clamp(x, shape.sternX, shape.bowX);
  if (px >= topB.x) {
    const t = (px - topB.x) / Math.max(0.001, topA.x - topB.x);
    return Math.abs(topB.y + (topA.y - topB.y) * t);
  }
  if (px >= topC.x) {
    const t = (px - topC.x) / Math.max(0.001, topB.x - topC.x);
    return Math.abs(topC.y + (topB.y - topC.y) * t);
  }
  const t = (px - topD.x) / Math.max(0.001, topC.x - topD.x);
  return Math.abs(topD.y + (topC.y - topD.y) * t);
}

function samplePolyline(points, tNorm) {
  const lengths = [];
  let total = 0;
  for (let i = 0; i < points.length - 1; i++) {
    const dx = points[i + 1].x - points[i].x;
    const dy = points[i + 1].y - points[i].y;
    const seg = Math.hypot(dx, dy);
    lengths.push(seg);
    total += seg;
  }

  const clampedT = clamp(tNorm, 0, 1);
  let target = clampedT * total;
  for (let i = 0; i < lengths.length; i++) {
    const seg = lengths[i];
    if (target <= seg || i === lengths.length - 1) {
      const localT = seg <= 0.0001 ? 0 : target / seg;
      const a = points[i];
      const b = points[i + 1];
      const x = a.x + (b.x - a.x) * localT;
      const y = a.y + (b.y - a.y) * localT;
      const txRaw = b.x - a.x;
      const tyRaw = b.y - a.y;
      const tLen = Math.hypot(txRaw, tyRaw) || 1;
      return {
        x,
        y,
        tx: txRaw / tLen,
        ty: tyRaw / tLen
      };
    }
    target -= seg;
  }

  const last = points[points.length - 1];
  return { x: last.x, y: last.y, tx: 1, ty: 0 };
}

function getHullSideMount(shape, index, total, sideSign, trimStart = 0.1, trimEnd = 0.9) {
  const upperEdge = getHullUpperEdge(shape);
  const baseT = total <= 1 ? 0.5 : index / (total - 1);
  const pathT = trimStart + (trimEnd - trimStart) * baseT;
  const upper = samplePolyline(upperEdge, pathT);

  let px = upper.x;
  let py = upper.y;
  let tx = upper.tx;
  let ty = upper.ty;

  if (sideSign >= 0) {
    py = -py;
    ty = -ty;
  }

  let nx = -ty;
  let ny = tx;
  const nLen = Math.hypot(nx, ny) || 1;
  nx /= nLen;
  ny /= nLen;

  const desiredY = sideSign >= 0 ? 1 : -1;
  if (ny * desiredY < 0) {
    nx = -nx;
    ny = -ny;
  }

  return { x: px, y: py, nx, ny };
}

function drawPerimeterMount(mount, length, thickness, color) {
  ctx.save();
  ctx.translate(mount.x, mount.y);
  ctx.rotate(Math.atan2(mount.ny, mount.nx));
  ctx.fillStyle = color;
  ctx.fillRect(0, -thickness * 0.5, length, thickness);
  ctx.restore();
}

function drawPerimeterMountWithAim(mount, length, thickness, color, aimOffset = 0) {
  ctx.save();
  ctx.translate(mount.x, mount.y);
  ctx.rotate(Math.atan2(mount.ny, mount.nx) + aimOffset);
  ctx.fillStyle = color;
  ctx.fillRect(0, -thickness * 0.5, length, thickness);
  ctx.restore();
}

function drawCannonReloadOverlay(mount, length, thickness, aimOffset = 0, remainingRatio = 0) {
  if (remainingRatio <= 0.001) return;
  const fillLen = Math.max(0, length * clamp(remainingRatio, 0, 1));
  ctx.save();
  ctx.translate(mount.x, mount.y);
  ctx.rotate(Math.atan2(mount.ny, mount.nx) + aimOffset);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, -thickness * 0.5, fillLen, thickness);
  ctx.restore();
}

function getDistributedCannonMask(totalPorts, cannonPorts) {
  const total = Math.max(0, totalPorts);
  const cannons = clamp(cannonPorts, 0, total);
  const mask = new Array(total).fill(false);
  if (cannons <= 0 || total <= 0) return mask;

  for (let i = 0; i < cannons; i++) {
    let idx = Math.round(((i + 0.5) * total) / cannons - 0.5);
    idx = clamp(idx, 0, total - 1);
    while (mask[idx]) idx = (idx + 1) % total;
    mask[idx] = true;
  }
  return mask;
}

function getPlayerAutoTarget() {
  let target = null;
  let best = Infinity;

  for (const enemy of state.enemies) {
    const dx = enemy.x - player.x;
    const dy = enemy.y - player.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < best) {
      best = d2;
      target = enemy;
    }
  }

  for (const island of state.islands) {
    for (const building of island.buildings) {
      const dx = building.x - player.x;
      const dy = building.y - player.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < best) {
        best = d2;
        target = building;
      }
    }
  }

  if (!target) return null;

  const dx = target.x - player.x;
  const dy = target.y - player.y;
  const dist = Math.hypot(dx, dy);
  const forward = getForwardVector();
  const cross = forward.x * dy - forward.y * dx;
  return {
    target,
    dist,
    sideSign: cross >= 0 ? 1 : -1,
    targetAngle: Math.atan2(dy, dx)
  };
}

function getTargetHitRadius(target) {
  if (!target) return 0;
  if (typeof target.size === 'number') {
    return Math.max(5, target.size * 0.78 + 4);
  }
  return 10;
}

function mountHasLineHit(spawnX, spawnY, dirX, dirY, maxRange, target, hitRadius) {
  if (!target) return false;
  const toX = target.x - spawnX;
  const toY = target.y - spawnY;
  const along = toX * dirX + toY * dirY;
  if (along < 0 || along > maxRange) return false;
  const perp = Math.abs(toX * dirY - toY * dirX);
  return perp <= hitRadius;
}

function spawnPlayerShipBreakup() {
  const shape = getHullShape(player);
  const fwdX = Math.cos(player.heading || 0);
  const fwdY = Math.sin(player.heading || 0);
  const rightX = -fwdY;
  const rightY = fwdX;

  const toWorld = (localX, localY) => ({
    x: player.x + fwdX * localX + rightX * localY,
    y: player.y + fwdY * localX + rightY * localY
  });

  const hullSamples = 40;
  const sailSamples = 20;
  const pieces = hullSamples + sailSamples;
  const colors = [
    player.hullColor || '#5f4630',
    player.trimColor || '#d9b78d',
    player.sailColor || '#f0f7ff',
    '#6e523b',
    '#493829'
  ];

  for (let i = 0; i < pieces; i++) {
    const fromSail = i >= hullSamples;
    let localX;
    let localY;

    if (fromSail) {
      const mast = Math.max(8, player.size * 1.2 * (player.mastScale || 1));
      localX = (Math.random() - 0.5) * player.size * 2.4;
      localY = -mast * (0.25 + Math.random() * 0.55);
    } else {
      localX = shape.sternX + Math.random() * (shape.bowX - shape.sternX);
      const halfW = hullHalfWidthAt(shape, localX) * 0.9;
      localY = (Math.random() * 2 - 1) * halfW;
    }

    const world = toWorld(localX, localY);
    const localLen = Math.hypot(localX, localY) || 1;
    let outLocalX = localX / localLen;
    let outLocalY = localY / localLen;
    outLocalX += (Math.random() - 0.5) * 0.55;
    outLocalY += (Math.random() - 0.5) * 0.55;
    const outLen = Math.hypot(outLocalX, outLocalY) || 1;
    outLocalX /= outLen;
    outLocalY /= outLen;

    const outWorldX = fwdX * outLocalX + rightX * outLocalY;
    const outWorldY = fwdY * outLocalX + rightY * outLocalY;
    const speed = (fromSail ? 1.2 : 1.6) + Math.random() * (fromSail ? 1.6 : 2.2);
    const airTime = 0.9 + Math.random() * (fromSail ? 0.7 : 1.0);
    const baseSize = (fromSail ? 1.4 : 1.9) + Math.random() * (fromSail ? 1.9 : 2.7);

    const settleSize = baseSize * (0.52 + Math.random() * 0.22);

    state.particles.push({
      x: world.x,
      y: world.y,
      vx: outWorldX * speed,
      vy: outWorldY * speed,
      size: baseSize,
      rot: Math.random() * Math.PI * 2,

      peakSize,
      settleSize

function spawnVesselWakeParticles(x, y, heading, size, speed, baseSpeed = 2.2, agility = 1) {
  const movement = clamp(speed / Math.max(0.2, baseSpeed), 0, 2.2);
  if (movement < 0.2) return;

  const fwd = { x: Math.cos(heading), y: Math.sin(heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const wakeStrength = clamp(movement * (0.56 + agility * 0.2), 0.1, 1.4);
  const beam = Math.max(3, size * 0.72);
  const bandCount = 1 + Math.floor(wakeStrength * 1.4 + Math.random() * 0.7);
  const bandSpacing = 2.4 + Math.random() * 1.8;
  const baseTrail = size * 0.62;

  for (let i = 0; i < bandCount; i++) {
    const trail = baseTrail + i * bandSpacing + Math.random() * 1.4;
    const centerX = x - fwd.x * trail;
    const centerY = y - fwd.y * trail;
    const segments = 1 + Math.floor(wakeStrength * 1.15 + Math.random() * 0.6);

    for (let j = 0; j < segments; j++) {
      const lateral = (segments === 1 ? 0 : (j / (segments - 1) - 0.5)) * beam;
      const jitter = (Math.random() - 0.5) * Math.max(1.2, size * 0.11);
      const sx = centerX + right.x * (lateral + jitter);
      const sy = centerY + right.y * (lateral + jitter);
      const lineAngle = heading + Math.PI * 0.5 + (Math.random() - 0.5) * 0.2;
      const backDrift = 0.02 + Math.random() * 0.1;
      const sideDrift = (Math.random() - 0.5) * 0.04;
      const life = 0.26 + Math.random() * (0.2 + wakeStrength * 0.22);
      state.particles.push({
        x: sx,
        y: sy,
        vx: -fwd.x * backDrift + right.x * sideDrift,
        vy: -fwd.y * backDrift + right.y * sideDrift,
        size: 1,
        rot: lineAngle,
        spin: (Math.random() - 0.5) * 0.012,
        life,
        maxLife: life,
        color: Math.random() < 0.55 ? 'rgba(243,251,255,0.82)' : 'rgba(206,232,246,0.8)',
        sides: 4,
        drift: 0.012 + Math.random() * 0.018,
        drag: 0.975,
        wakeLine: true,
        lineLen: Math.max(3.8, beam * (0.26 + Math.random() * 0.16) * (0.62 + wakeStrength * 0.24)),
        lineW: 0.72 + Math.random() * 0.45,
        currentX: state.wind.x * 0.11,
        currentY: state.wind.y * 0.11,
        wake: true
      });
    }
  }

  const splashCount = Math.floor(wakeStrength * 0.9);
  for (let i = 0; i < splashCount; i++) {
    const stern = i % 2 === 0;
    const offset = stern ? -(size * (0.56 + Math.random() * 0.2)) : (size * (0.66 + Math.random() * 0.14));
    const spread = (Math.random() - 0.5) * beam * 0.5;
    const px = x + fwd.x * offset + right.x * spread;
    const py = y + fwd.y * offset + right.y * spread;
    const splashDir = stern ? (heading + Math.PI + (Math.random() - 0.5) * 0.45) : (heading + Math.PI + (Math.random() - 0.5) * 0.25);
    const splashSpeed = (0.03 + Math.random() * 0.16) * wakeStrength;
    const splashLife = 0.12 + Math.random() * 0.12;
    state.particles.push({
      x: px,
      y: py,
      vx: Math.cos(splashDir) * splashSpeed,
      vy: Math.sin(splashDir) * splashSpeed,
      size: 0.7 + Math.random() * 1.1,
      rot: 0,
      spin: 0,
      life: splashLife,
      maxLife: splashLife,
      color: Math.random() < 0.5 ? 'rgba(240,251,255,0.72)' : 'rgba(193,224,241,0.68)',
      sides: 8,
      drift: 0.015 + Math.random() * 0.03,
      drag: 0.94,
      circle: true,
      currentX: state.wind.x * 0.08,
      currentY: state.wind.y * 0.08,
      wake: true
    });
  }
}

function getBroadsideFirePlan(enemy, target) {
  const dx = target.x - enemy.x;
  const dy = target.y - enemy.y;
  const dist = Math.hypot(dx, dy);
  const targetAngle = Math.atan2(dy, dx);
  const fwd = { x: Math.cos(enemy.heading), y: Math.sin(enemy.heading) };
  const cross = fwd.x * dy - fwd.y * dx;
  const sideSign = cross >= 0 ? 1 : -1;
  const broadside = enemy.heading + sideSign * Math.PI / 2;
  const broadsideOffset = Math.abs(angleDiff(targetAngle, broadside));
  const cannonWindow = (enemy.cannonPivot + 12) * (Math.PI / 180);

  return {
    dist,
    targetAngle,
    sideSign,
    canLikelyHitGun: broadsideOffset <= (GUN_PIVOT_RAD + 0.08),
    canLikelyHitCannon: broadsideOffset <= cannonWindow
  };
}

function pickBossTarget(enemy, playerPlan) {
  if (playerPlan.dist <= enemy.cannonRange * 1.08 && (playerPlan.canLikelyHitGun || playerPlan.canLikelyHitCannon)) {
    return { target: player, plan: playerPlan };
  }

  let fallback = null;
  let bestScore = Infinity;
  for (const other of state.enemies) {
    if (other === enemy || other.kind === 'boss') continue;
    const plan = getBroadsideFirePlan(enemy, other);
    if (plan.dist > enemy.cannonRange * 0.95) continue;
    if (!plan.canLikelyHitGun && !plan.canLikelyHitCannon) continue;
    const score = plan.dist + (plan.canLikelyHitCannon ? 0 : 45);
    if (score < bestScore) {
      bestScore = score;
      fallback = { target: other, plan };
    }
  }

  return fallback || { target: player, plan: playerPlan };
}
