function evaluateEnemySideSolution(enemy, target, sideSign) {
  const out = {
    sideSign,
    dist: Infinity,
    gunHits: 0,
    cannonHits: 0,
    score: 0
  };
  if (!target) return out;

  const fwd = { x: Math.cos(enemy.heading), y: Math.sin(enemy.heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const shape = getHullShape(enemy);
  const targetAngle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
  const dist = Math.hypot(target.x - enemy.x, target.y - enemy.y);
  const targetRadius = getTargetHitRadius(target);
  out.dist = dist;

  const baseDir = enemy.heading + sideSign * Math.PI / 2;
  const gunPorts = Math.max(1, enemy.gunners);
  const cannonPorts = Math.max(0, enemy.cannons);

  if (dist <= enemy.gunRange * 1.05) {
    for (let i = 0; i < gunPorts; i++) {
      const mount = getHullSideMount(shape, i, gunPorts, sideSign, 0.12, 0.88);
      const mountLen = Math.max(4, enemy.size * 0.28);
      const localX = mount.x + mount.nx * (mountLen + 0.3);
      const localY = mount.y + mount.ny * (mountLen + 0.3);
      const spawnX = enemy.x + fwd.x * localX + right.x * localY;
      const spawnY = enemy.y + fwd.y * localX + right.y * localY;
      const gunAdjust = clamp(angleDiff(targetAngle, baseDir), -GUN_PIVOT_RAD, GUN_PIVOT_RAD);
      const dir = baseDir + gunAdjust;
      const dirX = Math.cos(dir);
      const dirY = Math.sin(dir);
      if (Math.hypot(target.x - spawnX, target.y - spawnY) > enemy.gunRange) continue;
      if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, enemy.gunRange, target, targetRadius)) continue;
      out.gunHits += 1;
    }
  }

  if (dist <= enemy.cannonRange * 1.05) {
    const clamped = clamp(angleDiff(targetAngle, baseDir), -enemy.cannonPivot * (Math.PI / 180), enemy.cannonPivot * (Math.PI / 180));
    for (let i = 0; i < cannonPorts; i++) {
      const mount = getHullSideMount(shape, i, cannonPorts, sideSign, 0.16, 0.84);
      const mountLen = Math.max(7, enemy.size * 0.42);
      const localX = mount.x + mount.nx * (mountLen + 0.45);
      const localY = mount.y + mount.ny * (mountLen + 0.45);
      const spawnX = enemy.x + fwd.x * localX + right.x * localY;
      const spawnY = enemy.y + fwd.y * localX + right.y * localY;
      const dir = baseDir + clamped;
      const dirX = Math.cos(dir);
      const dirY = Math.sin(dir);
      if (Math.hypot(target.x - spawnX, target.y - spawnY) > enemy.cannonRange) continue;
      if (!mountHasLineHit(spawnX, spawnY, dirX, dirY, enemy.cannonRange, target, targetRadius)) continue;
      out.cannonHits += 1;
    }
  }

  out.score = out.gunHits + out.cannonHits * 1.35;
  return out;
}

function chooseEnemySideForTarget(enemy, target, preferredSideSign = 1) {
  const port = evaluateEnemySideSolution(enemy, target, -1);
  const starboard = evaluateEnemySideSolution(enemy, target, 1);
  const preferred = preferredSideSign < 0 ? port : starboard;
  const other = preferredSideSign < 0 ? starboard : port;
  if (preferred.score > 0 && preferred.score >= other.score - 0.65) return preferred;
  return starboard.score >= port.score ? starboard : port;
}

function autoInstallCannons(perSideCount = 1) {
  ensurePlayerWeaponLayout();
  const caps = getShipWeaponCaps(player, player.cannonCapacityBonus);

  const centerOutIndices = (length) => {
    const out = [];
    if (length <= 0) return out;
    const center = (length - 1) / 2;
    for (let i = 0; i < length; i++) out.push(i);
    out.sort((a, b) => {
      const da = Math.abs(a - center);
      const db = Math.abs(b - center);
      if (da !== db) return da - db;
      return a - b;
    });
    return out;
  };

  const installOnSide = (lane) => {
    let installed = 0;
    const indices = centerOutIndices(lane.length);
    while (installed < perSideCount) {
      const sideCannons = lane.filter((t) => t === 'cannon').length;
      if (sideCannons >= caps.maxCannonsPerSide) break;
      const emptyIdx = indices.find((idx) => lane[idx] === 'empty');
      if (emptyIdx == null) break;
      lane[emptyIdx] = 'cannon';
      installed += 1;
    }
  };

  installOnSide(player.weaponLayout.port);
  installOnSide(player.weaponLayout.starboard);
  syncArmamentDerivedStats();
}

function autoInstallGuns(perSideCount = 1) {
  ensurePlayerWeaponLayout();

  const centerOutIndices = (length) => {
    const out = [];
    if (length <= 0) return out;
    const center = (length - 1) / 2;
    for (let i = 0; i < length; i++) out.push(i);
    out.sort((a, b) => {
      const da = Math.abs(a - center);
      const db = Math.abs(b - center);
      if (da !== db) return da - db;
      return a - b;
    });
    return out;
  };

  const installOnSide = (lane) => {
    let installed = 0;
    const indices = centerOutIndices(lane.length);
    while (installed < perSideCount) {
      const emptyIdx = indices.find((idx) => lane[idx] === 'empty');
      if (emptyIdx == null) break;
      lane[emptyIdx] = 'gun';
      installed += 1;
    }
  };

  installOnSide(player.weaponLayout.port);
  installOnSide(player.weaponLayout.starboard);
  syncArmamentDerivedStats();
}

function ensureRepairCrewFromRule() {
  const deckCap = getDeckCrewCapacity(player);
  let spare = getSpareCrewCapacity(player);
  if (spare <= 0 && player.crew < deckCap) {
    player.crew += 1;
    spare = getSpareCrewCapacity(player);
  }
  if (spare > 0) {
    player.repairCrew += 1;
    clampPlayerSupportCrewToDeck();
  }
}

function applyHullArmorVisualTier() {
  const tier = clamp(Number(player.hullArmorTier || 0), 0, 4);
  const palette = [
    { hullColor: '#5f4630', trimColor: '#d9b78d' },
    { hullColor: '#6a4a2f', trimColor: '#c8833f' },
    { hullColor: '#5a4634', trimColor: '#b27c45' },
    { hullColor: '#4a4747', trimColor: '#8f979f' },
    { hullColor: '#55616e', trimColor: '#d7e1ea' }
  ];
  const style = palette[tier] || palette[0];
  player.hullColor = style.hullColor;
  player.trimColor = style.trimColor;
}

function applyRuntimeUpgradeDefinition(definition) {
  const trace = applyUpgradeRuleSet(
    { player, state },
    definition.rules || [],
    {
      env: {
        autoInstallCannons: (_player, perSide) => autoInstallCannons(perSide),
        autoInstallGuns: (_player, perSide) => autoInstallGuns(perSide),
        ensureRepairCrew: () => ensureRepairCrewFromRule(),
        clampArmament: () => clampPlayerArmamentToHull(),
        ensureCollectorSkiffs: () => ensureCollectorSkiffs(),
        applyHullArmorVisualTier: () => applyHullArmorVisualTier(),
        clampHpToMax: () => {
          player.hp = Math.min(player.maxHp, player.hp);
        },
        postApply: () => {
          player.gunReload = Math.max(0.75, toFinitePositive(player.gunReload, 1.35));
          player.cannonReload = Math.max(1.5, toFinitePositive(player.cannonReload, 3.4));
          player.baseSpeed = Math.max(1.6, player.baseSpeed);
          player.cannonPivot = clamp(player.cannonPivot, 0, 30);
          player.hp = Math.min(player.maxHp, player.hp);
          clampPlayerCrewToDeck();
          clampPlayerSupportCrewToDeck();
          clampPlayerArmamentToHull();
          syncArmamentDerivedStats();
        }
      }
    }
  );

  state.lastUpgradeRuleTrace = trace;
}

function toRuntimeUpgradeOption(definition) {
  return {
    id: definition.id,
    name: definition.name,
    desc: definition.desc,
    apply() {
      applyRuntimeUpgradeDefinition(definition);
    }
  };
}

const upgradePool = (runtimeUpgradeCatalog.standard || []).map(toRuntimeUpgradeOption);
const majorUpgradePool = (runtimeUpgradeCatalog.major || []).map(toRuntimeUpgradeOption);

function addAbility(label) {
  if (player.slots.length < 4 && !player.slots.includes(label)) {
    player.slots.push(label);
  }
}

function initWorld() {
  const islandCount = 24;
  for (let i = 0; i < islandCount; i++) {
    const x = 200 + Math.random() * (state.world.width - 400);
    const y = 200 + Math.random() * (state.world.height - 400);
    const roll = Math.random();
    const isSmall = roll < 0.22;
    const isLong = roll >= 0.22 && roll < 0.5;
    const isLarge = roll > 0.84;
    const r = isSmall ? (28 + Math.random() * 36) : isLarge ? (96 + Math.random() * 82) : (50 + Math.random() * 76);
    const island = { x, y, r, patches: [], buildings: [], docks: [], foliage: [], defenseLevel: 0 };

    const patchCount = isSmall ? (5 + Math.floor(Math.random() * 4)) : isLarge ? (18 + Math.floor(Math.random() * 12)) : (9 + Math.floor(Math.random() * 10));
    const spineDir = Math.random() * Math.PI * 2;
    const spineLength = isLong ? (r * (1.6 + Math.random() * 1.4)) : (r * (0.4 + Math.random() * 0.5));
    const thickness = isLong ? (0.22 + Math.random() * 0.18) : (0.45 + Math.random() * 0.28);
    let maxExtent = r;

    for (let p = 0; p < patchCount; p++) {
      const t = patchCount <= 1 ? 0.5 : (p / (patchCount - 1));
      const along = (t - 0.5) * spineLength;
      const lateral = (Math.random() - 0.5) * r * thickness;
      const px = x + Math.cos(spineDir) * along - Math.sin(spineDir) * lateral + (Math.random() - 0.5) * r * 0.22;
      const py = y + Math.sin(spineDir) * along + Math.cos(spineDir) * lateral + (Math.random() - 0.5) * r * 0.22;
      const size = (isSmall ? 8 : isLarge ? 14 : 10) + Math.random() * (isLarge ? 22 : 16);
      const sides = Math.random() < 0.58 ? 6 : 3;
      const rot = Math.random() * Math.PI * 2;
      island.patches.push({ x: px, y: py, size, sides, rot });
      maxExtent = Math.max(maxExtent, Math.hypot(px - x, py - y) + size * 1.2);

      if (Math.random() < 0.35) {
        const offAng = Math.random() * Math.PI * 2;
        const offDist = size * (0.4 + Math.random() * 0.7);
        const sx = px + Math.cos(offAng) * offDist;
        const sy = py + Math.sin(offAng) * offDist;
        const ssize = size * (0.45 + Math.random() * 0.4);
        const ssides = Math.random() < 0.5 ? 6 : 3;
        island.patches.push({ x: sx, y: sy, size: ssize, sides: ssides, rot: rot + Math.random() * 0.6 });
        maxExtent = Math.max(maxExtent, Math.hypot(sx - x, sy - y) + ssize * 1.2);
      }
    }

    if (isLarge && Math.random() < 0.55) {
      const subCount = 5 + Math.floor(Math.random() * 5);
      for (let s = 0; s < subCount; s++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = r * (0.65 + Math.random() * 0.35);
        const px = x + Math.cos(ang) * dist;
        const py = y + Math.sin(ang) * dist;
        const size = 12 + Math.random() * 18;
        const sides = Math.random() < 0.5 ? 6 : 3;
        const rot = Math.random() * Math.PI * 2;
        island.patches.push({ x: px, y: py, size, sides, rot });
        maxExtent = Math.max(maxExtent, Math.hypot(px - x, py - y) + size * 1.2);
      }
    }

    island.r = maxExtent;

    const bCount = Math.max(2, Math.floor(island.r / 24));
    for (let b = 0; b < bCount; b++) {
      const patch = island.patches[Math.floor(Math.random() * island.patches.length)];
      const bx = patch.x + (Math.random() - 0.5) * patch.size * 0.6;
      const by = patch.y + (Math.random() - 0.5) * patch.size * 0.6;
      const size = 8 + Math.random() * 18;
      island.buildings.push({
        x: bx,
        y: by,
        size,
        hp: 18 + size * 1.6,
        maxHp: 18 + size * 1.6,
        tower: false,
        fireTimer: Math.random(),
        fxTimer: Math.random() * 0.5,
        damageMarks: [],
        fireLevel: 0
      });
    }

    if (island.buildings.length) {
      const dockCount = 1 + Math.floor(Math.random() * (isLarge ? 3 : 2));
      for (let d = 0; d < dockCount; d++) {
        const ang = Math.random() * Math.PI * 2;
        const baseDist = island.r * (0.78 + Math.random() * 0.15);
        const length = 18 + Math.random() * 34;
        const width = 6 + Math.random() * 5;
        island.docks.push({
          x: island.x + Math.cos(ang) * baseDist,
          y: island.y + Math.sin(ang) * baseDist,
          rot: ang,
          length,
          width
        });
      }
    }

    const foliageCount = Math.max(5, Math.floor(island.r / 10));
    for (let f = 0; f < foliageCount; f++) {
      const patch = island.patches[Math.floor(Math.random() * island.patches.length)];
      const ang = Math.random() * Math.PI * 2;
      const off = patch.size * (0.1 + Math.random() * 0.7);
      const fx = patch.x + Math.cos(ang) * off;
      const fy = patch.y + Math.sin(ang) * off;
      if (Math.random() < 0.55) {
        const crown = 5 + Math.random() * 6;
        const clusterCount = 5 + Math.floor(Math.random() * 4);
        const canopy = [];
        for (let c = 0; c < clusterCount; c++) {
          const cAng = Math.random() * Math.PI * 2;
          const cDist = crown * (0.08 + Math.random() * 0.62);
          canopy.push({
            ox: Math.cos(cAng) * cDist,
            oy: Math.sin(cAng) * cDist * 0.9,
            r: crown * (0.38 + Math.random() * 0.62),
            tone: Math.floor(Math.random() * 4)
          });
        }
        island.foliage.push({ kind: 'tree', x: fx, y: fy, trunk: 4 + Math.random() * 4, crown, canopy });
      } else {
        island.foliage.push({ kind: 'shrub', x: fx, y: fy, width: 6 + Math.random() * 10, height: 4 + Math.random() * 6 });
      }
    }

    buildIslandPolygons(island);

    state.islands.push(island);
  }

  for (let i = 0; i < 11; i++) {
    state.clouds.push({
      x: Math.random() * state.world.width,
      y: Math.random() * state.world.height,
      w: 130 + Math.random() * 180,
      h: 45 + Math.random() * 60,
      drift: 0.2 + Math.random() * 0.35
    });
  }

  setShipyardMode(true);
}

function buildIslandPolygons(island) {
  const points = [];
  for (const patch of island.patches) {
    const sides = patch.sides === 3 ? 3 : 6;
    for (let i = 0; i < sides; i++) {
      const a = patch.rot + (i / sides) * Math.PI * 2;
      points.push({
        x: patch.x - island.x + Math.cos(a) * patch.size * 0.92,
        y: patch.y - island.y + Math.sin(a) * patch.size * 0.92
      });
    }
  }

  let outer = convexHull(points);
  if (!outer.length) {
    outer = [];
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      outer.push({ x: Math.cos(a) * island.r, y: Math.sin(a) * island.r });
    }
  }

  const inner = outer.map((pt) => {
    const ang = Math.atan2(pt.y, pt.x);
    const inset = 0.68 + Math.sin(ang * 2.4 + island.x * 0.007 + island.y * 0.003) * 0.06;
    return { x: pt.x * inset, y: pt.y * inset };
  });

  island.outerPoly = outer;
  island.innerPoly = inner;
}

function updateCamera() {
  const viewW = canvas.width / state.zoom;
  const viewH = canvas.height / state.zoom;
  state.camera.x = clamp(player.x - viewW / 2, 0, Math.max(0, state.world.width - viewW));
  state.camera.y = clamp(player.y - viewH / 2, 0, Math.max(0, state.world.height - viewH));
}

function toScreen(wx, wy) {
  return {
    x: (wx - state.camera.x) * state.zoom,
    y: (wy - state.camera.y) * state.zoom
  };
}

function ensureIslandDefenses() {
  const targetTier = Math.floor((state.difficultyTier + state.difficultyFromSize) / 2);
  if (targetTier <= state.defenseTier) return;
  state.defenseTier = targetTier;

  for (const island of state.islands) {
    const towerChance = clamp(0.18 + targetTier * 0.08, 0.18, 0.85);
    island.defenseLevel = targetTier;
    for (const b of island.buildings) {
      if (!b.tower && Math.random() < towerChance) {
        b.tower = true;
        b.hp += 14 + targetTier * 4;
        b.maxHp = b.hp;
      }
    }
  }
}

function simulateVessel(entity, dt, input) {
  const turnInput = Number.isFinite(input.turn)
    ? clamp(input.turn, -1, 1)
    : ((input.turnRight ? 1 : 0) - (input.turnLeft ? 1 : 0));
  stepShipPhysics(entity, {
    forward: !!input.rowing,
    brake: !!input.brake,
    turn: turnInput,
    sailOpen: entity.sailOpen,
    anchored: false
  }, state.wind, state.world, dt);
}

function resolveIslandCollisions(entity, dt, playerCollision = false) {
  for (const island of state.islands) {
    const centerDist = Math.hypot(entity.x - island.x, entity.y - island.y);
    if (centerDist > island.r + entity.size + 20) continue;

    for (const patch of island.patches) {
      const dx = entity.x - patch.x;
      const dy = entity.y - patch.y;
      const d = Math.hypot(dx, dy) || 1;
      const minDist = patch.size * 0.82 + entity.size * 0.62;
      if (d < minDist) {
        const nx = dx / d;
        const ny = dy / d;
        const push = minDist - d + 0.1;
        entity.x += nx * push;
        entity.y += ny * push;
        entity.speed *= 0.25;

        if (playerCollision) {
          const impact = 3.5 + entity.mass * 0.03;
          damagePlayer(impact * dt * 0.5);
        }
      }
    }
  }
}

function getShoreAvoidanceVector(entity, influence = 180) {
  let ax = 0;
  let ay = 0;
  for (const island of state.islands) {
    const dx = entity.x - island.x;
    const dy = entity.y - island.y;
    const d = Math.hypot(dx, dy) || 1;
    const safe = island.r + influence + entity.size * 0.6;
    if (d >= safe) continue;
    const t = clamp((safe - d) / safe, 0, 1);
    const push = t * t * 2.2;
    ax += (dx / d) * push;
    ay += (dy / d) * push;
  }
  return { x: ax, y: ay };
}

function applyShoreRepulsion(entity, dt, strength = 1) {
  const avoid = getShoreAvoidanceVector(entity, 170);
  if (!avoid.x && !avoid.y) return;
  entity.x += avoid.x * dt * 60 * strength;
  entity.y += avoid.y * dt * 60 * strength;
  entity.speed *= 1 - clamp((Math.hypot(avoid.x, avoid.y) * 0.035), 0, 0.16);
}

function getVesselSeparationVector(entity) {
  const ownLen = Math.max(10, getHullDims(entity).len);
  let ax = 0;
  let ay = 0;

  const boats = [player, ...state.enemies];
  for (const other of boats) {
    if (other === entity) continue;

    const dx = entity.x - other.x;
    const dy = entity.y - other.y;
    const d = Math.hypot(dx, dy) || 1;

    const otherLen = Math.max(10, getHullDims(other).len);
    const hardBody = collisionRadius(entity) + collisionRadius(other);
    const desiredGap = Math.max(ownLen * 1.15, hardBody + (ownLen + otherLen) * 0.42, ownLen * 0.8 + otherLen * 0.55);
    if (d >= desiredGap) continue;

    const t = clamp((desiredGap - d) / desiredGap, 0, 1);
    let push = t * t * 3.8;
    if (other === player && entity !== player && entity.kind !== 'rammer') {
      push *= 0.52;
    }
    if (entity.squadId != null && other.squadId != null && entity.squadId === other.squadId) {
      push *= 0.68;
    }
    ax += (dx / d) * push;
    ay += (dy / d) * push;
  }

  return { x: ax, y: ay };
}

function drawDeckDamageMarks(entity, hull, zoomScale = 1) {
  const maxHp = Math.max(1, entity.maxHp || 1);
  const hp = clamp(entity.hp || maxHp, 0, maxHp);
  const damage = 1 - hp / maxHp;
  if (damage <= 0.05) return;

  const marks = Math.max(1, Math.floor(damage * 22));
  const seedBase = entity.damageSeed || entity.id || 101;
  const minX = hull.sternShoulderX * 0.88;
  const maxX = hull.shoulderX * 0.92;

  ctx.fillStyle = '#141516';
  for (let i = 0; i < marks; i++) {
    const r1 = seeded01(seedBase + i * 1.37);
    const r2 = seeded01(seedBase + i * 4.21 + 19.1);
    const r3 = seeded01(seedBase + i * 7.13 + 3.6);
    const r4 = seeded01(seedBase + i * 9.71 + 44.2);
    const x = minX + (maxX - minX) * r1;
    const halfW = hullHalfWidthAt(hull, x) * (0.58 + r2 * 0.14);
    const y = (r3 * 2 - 1) * halfW;
    const size = (1.2 + r4 * 2.5) * zoomScale;
    polygonPath(x, y, size, r1 > 0.5 ? 4 : 3, r2 * Math.PI * 2);
    ctx.fill();
  }
}

function ensureShipDamageState(entity) {
  if (!Array.isArray(entity.fractureMarks)) entity.fractureMarks = [];
  entity.burnTime = Math.max(0, Number(entity.burnTime || 0));
  entity.burnTick = Math.max(0, Number(entity.burnTick || 0));
}

function worldPointToShipLocal(entity, worldX, worldY) {
  const fwdX = Math.cos(entity.heading || 0);
  const fwdY = Math.sin(entity.heading || 0);
  const rightX = -fwdY;
  const rightY = fwdX;
  const dx = worldX - entity.x;
  const dy = worldY - entity.y;
  return {
    x: dx * fwdX + dy * fwdY,
    y: dx * rightX + dy * rightY
  };
}

function addHullFractureMark(entity, worldX, worldY, severity = 1) {
  ensureShipDamageState(entity);
  const local = worldPointToShipLocal(entity, worldX, worldY);
  const shape = getHullShape(entity);
  const halfW = hullHalfWidthAt(shape, local.x) * 0.82;
  const clampedY = clamp(local.y, -halfW, halfW);
  const markCount = 1 + Math.floor(clamp(severity, 0, 2.4) * 1.2);

  for (let i = 0; i < markCount; i++) {
    const life = 4.2 + Math.random() * 4.6;
    const longSide = 2.2 + Math.random() * (2.8 + severity * 2.2);
    const shortSide = 0.7 + Math.random() * (0.9 + severity * 0.7);
    entity.fractureMarks.push({
      x: local.x + (Math.random() - 0.5) * 2.8,
      y: clampedY + (Math.random() - 0.5) * 2.6,
      w: longSide,
      h: shortSide,
      rot: Math.random() * Math.PI * 2,
      life,
      maxLife: life
    });
  }

  if (entity.fractureMarks.length > 38) {
    entity.fractureMarks.splice(0, entity.fractureMarks.length - 38);
  }
}

function drawFractureMarks(entity, hull, zoomScale = 1) {
  const marks = entity.fractureMarks;
  if (!Array.isArray(marks) || !marks.length) return;

  for (const mark of marks) {
    const fade = clamp(mark.life / Math.max(0.001, mark.maxLife), 0, 1);
    const hw = hullHalfWidthAt(hull, mark.x) * 0.8;
    const y = clamp(mark.y, -hw, hw);
    const width = Math.max(1, (Number(mark.w) || Math.max(0.8, Number(mark.size) || 1.6)) * zoomScale);
    const height = Math.max(0.5, (Number(mark.h) || Math.max(0.45, width * 0.3)) * zoomScale);
    ctx.save();
    ctx.globalAlpha = 0.28 + (1 - fade) * 0.5;
    ctx.fillStyle = '#060607';
    ctx.translate(mark.x, y);
    ctx.rotate(mark.rot);
    ctx.fillRect(-width * 0.5, -height * 0.5, width, height);
    ctx.restore();
  }
}

function spawnShipFireFx(entity, intensity = 0.45) {
  const shape = getHullShape(entity);
  const fwdX = Math.cos(entity.heading || 0);
  const fwdY = Math.sin(entity.heading || 0);
  const rightX = -fwdY;
  const rightY = fwdX;
  const count = 1 + Math.floor(intensity * 3 + Math.random() * 2);

  for (let i = 0; i < count; i++) {
    const t = Math.random();
    const minX = shape.sternShoulderX * 0.7;
    const maxX = shape.shoulderX * 0.7;
    const localX = minX + (maxX - minX) * t;
    const laneWidth = hullHalfWidthAt(shape, localX) * 0.5;
    const localY = (Math.random() * 2 - 1) * laneWidth;
    const worldX = entity.x + fwdX * localX + rightX * localY;
    const worldY = entity.y + fwdY * localX + rightY * localY;
    const life = 0.18 + Math.random() * (0.3 + intensity * 0.45);
    const hot = Math.random() < 0.68;
    state.particles.push({
      x: worldX,
      y: worldY,
      vx: (Math.random() - 0.5) * (0.2 + intensity * 0.38),
      vy: -0.1 - Math.random() * (0.35 + intensity * 0.5),
      size: 1.1 + Math.random() * (1.6 + intensity * 1.9),
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.22,
      life,
      maxLife: life,
      color: hot ? (Math.random() < 0.55 ? '#ffb14e' : '#ff7b42') : '#2a2120',
      sides: hot ? 5 : 6,
      drift: hot ? (0.44 + Math.random() * 0.44) : (0.18 + Math.random() * 0.24),
      drag: hot ? 0.92 : 0.95,
      circle: !hot
    });
  }
}

function drawShipBurningOverlay(entity, hull) {
  if (!(entity.burnTime > 0)) return;
  const intensity = clamp(entity.burnTime / 7, 0.2, 1);
  const flames = 2 + Math.floor(intensity * 4);
  const seed = (entity.damageSeed || entity.id || 17) * 0.37;

  for (let i = 0; i < flames; i++) {
    const t = ((i + 1) / (flames + 1));
    const minX = hull.sternShoulderX * 0.62;
    const maxX = hull.shoulderX * 0.72;
    const x = minX + (maxX - minX) * t;
    const hw = hullHalfWidthAt(hull, x) * 0.48;
    const wave = Math.sin(state.time * 7.5 + seed + i * 1.27);
    const y = clamp(wave * hw * 0.55, -hw, hw);
    const h = 2 + intensity * 2.8 + Math.sin(state.time * 10 + i * 2.1) * 0.4;
    ctx.fillStyle = 'rgba(255,178,80,0.8)';
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x + h * 0.52, y + h * 0.1);
    ctx.lineTo(x - h * 0.52, y + h * 0.1);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,114,58,0.72)';
    ctx.beginPath();
    ctx.arc(x, y - h * 0.18, h * 0.34, 0, Math.PI * 2);
    ctx.fill();
  }
}

function tryIgniteShip(entity, bullet, impactBoost = 0, chanceBonus = 0) {
  if (!bullet?.heavy) return;
  ensureShipDamageState(entity);
  const dmg = Math.max(0, Number(bullet.dmg || 0));
  const chance = clamp(0.16 + dmg * 0.008 + impactBoost * 0.06 + chanceBonus, 0.14, 0.78);
  if (Math.random() >= chance) return;
  entity.burnTime = Math.min(12, Math.max(entity.burnTime, 2.6 + Math.random() * 2.4 + impactBoost * 0.9));
  entity.burnTick = Math.min(entity.burnTick || 0.2, 0.12);
}

function updateShipDamageState(entity, dt, isPlayerShip = false) {
  ensureShipDamageState(entity);

  if (entity.fractureMarks.length) {
    for (const mark of entity.fractureMarks) mark.life -= dt;
    entity.fractureMarks = entity.fractureMarks.filter((mark) => mark.life > 0);
  }

  if (entity.burnTime <= 0) return;

  entity.burnTime = Math.max(0, entity.burnTime - dt);
  entity.burnTick -= dt;
  const intensity = clamp(entity.burnTime / 7, 0.2, 1);
  while (entity.burnTick <= 0 && entity.burnTime > 0) {
    entity.burnTick += 0.2;
    const tickDamage = (isPlayerShip ? 0.52 : 0.68) * (0.78 + intensity * 1.15);
    if (isPlayerShip) {
      damagePlayer(tickDamage);
    } else {
      entity.hp -= tickDamage;
    }
  }

  if (Math.random() < dt * (5 + intensity * 8)) {
    spawnShipFireFx(entity, intensity);
  }
}

function spawnEnemyAt(x, y, forcedKind = null) {
  const cfg = getLevelConfig(state.stageIndex);
  const difficultyMult = 1 + state.difficultyTier * 0.22 + state.stageIndex * 0.12 + state.difficultyFromSize * 0.09 + state.shipValueTier * 0.07;

  x = Math.max(20, Math.min(state.world.width - 20, x));
  y = Math.max(20, Math.min(state.world.height - 20, y));

  let kind = forcedKind;
  if (!kind) {
    const t = Math.random();
    kind = 'skiff';
    if (t > 0.45) kind = 'pirate';
    if (t > 0.68) kind = 'raider';
    if (t > 0.9) kind = 'rammer';
  }
  if (!['pirate', 'raider', 'rammer', 'skiff'].includes(kind)) kind = 'pirate';

  const quality = 1 + state.difficultyTier * 0.045 + state.stageIndex * 0.02 + state.shipValueTier * 0.015 + Math.random() * 0.24;
  const profileSeed = Math.random();
  const artilleryBias = profileSeed < 0.33 ? 1.35 : profileSeed < 0.66 ? 1.0 : 0.72;
  const speedBias = profileSeed > 0.6 ? 1.15 : 0.92 + Math.random() * 0.2;
  const hullLength = 0.9 + Math.random() * 0.3;
  const hullBeam = 0.86 + Math.random() * 0.3;
  const bowSharpness = 0.9 + Math.random() * 0.45;
  const sternTaper = 0.78 + Math.random() * 0.42;

  const base = (12 + state.level * 1.2) * difficultyMult;
  const size = ((kind === 'raider' ? 18 : kind === 'rammer' ? 13 : kind === 'skiff' ? 7 : 15) + state.difficultyFromSize * 0.45) * (0.95 + Math.random() * 0.15);
  const hp = base * (kind === 'raider' ? 2.1 : kind === 'rammer' ? 1.4 : kind === 'skiff' ? 0.3 : 1);
  const baseSpeed = (kind === 'rammer' ? 2.3 : kind === 'raider' ? 1.45 : kind === 'skiff' ? 2.8 : 1.75) * (1 + cfg.spawnRate * 0.04) * speedBias;
  const enemyCaps = getShipWeaponCaps({
    size,
    hullLength,
    hullBeam,
    bowSharpness,
    sternTaper
  }, Math.floor(state.difficultyTier / 4));

  const cannons = kind === 'skiff' ? 0 : clamp(
    Math.max(0, Math.floor(state.difficultyTier / 2) + (kind === 'raider' ? 1 : 0) + Math.floor(Math.random() * (0.4 + artilleryBias * 1.6))),
    0,
    enemyCaps.maxCannonsPerSide
  );
  const gunners = kind === 'skiff' ? 0 : clamp(
    Math.max(1, 1 + Math.floor(state.difficultyTier / 2) + (kind === 'raider' ? 2 : 1) + Math.floor(Math.random() * 2)),
    1,
    enemyCaps.maxGunners
  );
  const rowers = 1 + Math.floor(state.stageIndex / 2) + (kind === 'rammer' || kind === 'skiff' ? 2 : 0);
  const cannonPivot = clamp((Math.floor(state.difficultyTier / 3) * 5) + (Math.random() < 0.32 ? 5 : 0) + Math.floor(Math.random() * 6), 0, 26);
  const squadId = (kind === 'pirate' || kind === 'raider') ? squadAnchor() : null;
  const enemyId = enemyIdSeed++;
  const style = getEnemyVisualStyle(enemyId, kind, squadId, state.stageIndex, state.difficultyTier);

  state.enemies.push({
    id: enemyId,
    x,
    y,
    hp,
    maxHp: hp,
    size,
    kind,
    squadId,
    heading: Math.random() * Math.PI * 2,
    speed: 0,
    baseSpeed,
    rowers,
    sailOpen: true,
    gunners,
    cannons,
    ram: kind === 'rammer' || kind === 'skiff',
    ramDamage: kind === 'rammer' ? 62 : kind === 'skiff' ? 28 : 46,
    cannonPivot,
    rudder: kind === 'rammer' ? 2 : kind === 'skiff' ? 3 : 1,
    mass: kind === 'skiff' ? 5 + size * 0.4 : 20 + size * 0.9,
    gunReload: Math.max(0.66, (1.3 - state.difficultyTier * 0.035) * (1.08 - (quality - 1) * 0.18)),
    cannonReload: Math.max(1.25, (2.8 - state.difficultyTier * 0.04) * (1.14 - (quality - 1) * 0.22)),
    gunTimer: Math.random() * 0.8,
    cannonTimer: Math.random() * 1.2,
    gunRange: 102 + size * 3.0 + state.difficultyTier * 7 + Math.random() * 22,
    cannonRange: Math.max(158 + size * 4.5 + cannons * 14 + state.difficultyTier * 9 + Math.random() * 26, 102 + size * 3.0 + state.difficultyTier * 7 + 55),
    bulletDamage: (5 + state.difficultyTier * 1.5 + cannons * 1.2) * quality,
    gunSpeed: 4.35 + Math.random() * 0.65,
    cannonSpeed: 3.95 + Math.random() * 0.55,
    gunSpread: 0.18 + Math.random() * 0.09,
    cannonSpread: 0.07 + Math.random() * 0.06,
    hullLength,
    hullBeam,
    bowSharpness,
    sternTaper,
    impactTimer: 0,
    hullColor: style.hullColor,
    sailColor: style.sailColor,
    flagColor: style.flagColor,
    flagAccent: style.flagAccent,
    flagStripes: style.flagStripes,
    teamHue: style.teamHue
  });
}
