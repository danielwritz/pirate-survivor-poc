// ─── Audio system ───
let audioSys = null;
function initAudio() {
  const btn = document.getElementById('sfxToggle');
  audioSys = createGameAudioSystem({
    getPlayerPosition: () => {
      const me = currState?.players?.[myId];
      return me ? { x: me.x, y: me.y } : { x: 0, y: 0 };
    },
    getForwardVector: () => {
      const me = currState?.players?.[myId];
      if (!me) return { x: 1, y: 0 };
      return { x: Math.cos(me.heading), y: Math.sin(me.heading) };
    },
    getRightVector: () => {
      const me = currState?.players?.[myId];
      if (!me) return { x: 0, y: 1 };
      return { x: -Math.sin(me.heading), y: Math.cos(me.heading) };
    },
    button: btn
  });
}

// ─── Chat ───
function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !ws || ws.readyState !== 1 || myId === null) return;
  ws.send(JSON.stringify({ type: 'chat', text }));
  chatInput.value = '';
  chatInput.blur();
}
chatSend.addEventListener('click', sendChat);

function appendChat(name, text) {
  const div = document.createElement('div');
  div.innerHTML = `<span class="name">${esc(name)}:</span> <span class="text">${esc(text)}</span>`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  while (chatLog.children.length > 80) chatLog.removeChild(chatLog.firstChild);
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.innerHTML = `<span class="text" style="color:#ffd887">⚓ ${esc(text)}</span>`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ─── Kill feed ───
function addKillFeed(killer, victim) {
  const div = document.createElement('div');
  div.innerHTML = `<span style="color:#7fdb8a">${esc(killer)}</span> ☠ <span style="color:#f59b80">${esc(victim)}</span>`;
  killFeedEl.appendChild(div);
  setTimeout(() => div.classList.add('fade'), 4000);
  setTimeout(() => div.remove(), 5000);
  while (killFeedEl.children.length > 8) killFeedEl.removeChild(killFeedEl.firstChild);
}

// ─── Interpolation helper ───
function lerp(a, b, t) { return a + (b - a) * t; }

function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

function interpShip(currColl, prevColl, id) {
  if (!currColl || !currColl[id]) return null;
  const curr = currColl[id];
  if (!prevColl || !prevColl[id]) return curr;
  const prev = prevColl[id];
  const elapsed = performance.now() - stateTime;
  const t = Math.min(1.4, elapsed / SERVER_TICK_MS);
  return {
    ...curr,
    x: lerp(prev.x, curr.x, t),
    y: lerp(prev.y, curr.y, t),
    heading: lerpAngle(prev.heading, curr.heading, t),
    speed: lerp(prev.speed, curr.speed, t)
  };
}
function getInterpolatedPlayer(id) { return interpShip(currState?.players, prevState?.players, id); }
function getInterpolatedNpc(id) { return interpShip(currState?.npcs, prevState?.npcs, id); }

function stableNumericSeed(id) {
  if (typeof id === 'number' && Number.isFinite(id)) return id;
  const raw = String(id ?? '0');
  let hash = 2166136261 >>> 0;
  for (let i = 0; i < raw.length; i++) {
    hash ^= raw.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

// ─── Rendering ───
function toScreen(wx, wy, cam, zoom) {
  return { x: (wx - cam.x) * zoom, y: (wy - cam.y) * zoom };
}

// ─── Island rendering ───
function drawIslands(cam, zoom, buildingState) {
  if (!worldData) return;
  const buildingById = {};
  if (buildingState && buildingState.buildings) {
    for (const b of buildingState.buildings) buildingById[b.id] = b;
  }
  for (const island of worldData.islands) {
    const outline = island.outline;
    if (!outline || outline.length < 3) continue;
    // Screen-space cull
    const ip = toScreen(island.x, island.y, cam, zoom);
    const screenR = island.radius * zoom * 1.3;
    if (ip.x + screenR < 0 || ip.x - screenR > canvas.width || ip.y + screenR < 0 || ip.y - screenR > canvas.height) continue;

    // Land mass polygon
    ctx.beginPath();
    const p0 = toScreen(outline[0].x, outline[0].y, cam, zoom);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < outline.length; i++) {
      const pi = toScreen(outline[i].x, outline[i].y, cam, zoom);
      ctx.lineTo(pi.x, pi.y);
    }
    ctx.closePath();
    ctx.fillStyle = '#3a6b35';
    ctx.fill();
    ctx.strokeStyle = '#c9b988';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Beach glow
    ctx.strokeStyle = 'rgba(214,198,156,0.34)';
    ctx.lineWidth = 9;
    ctx.stroke();
    // Outer sandy fringe
    ctx.strokeStyle = 'rgba(226,210,168,0.18)';
    ctx.lineWidth = 15;
    ctx.stroke();

    // Foliage (multi-blob canopy)
    for (const f of island.foliageSeeds) {
      const fp = toScreen(f.x, f.y, cam, zoom);
      const r = f.size * zoom * 0.45;
      const baseCol = f.type === 'tree' ? '#2d5a27' : '#4a7a42';
      const darkCol = f.type === 'tree' ? '#1e4a1a' : '#3a6a34';
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(fp.x + r * 0.15, fp.y + r * 0.15, r * 1.05, r * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      // Multi-blob canopy
      const seed = (f.x * 7.3 + f.y * 13.1) % 100;
      for (let b = 0; b < 3; b++) {
        const bx = fp.x + Math.cos(seed + b * 2.2) * r * 0.28;
        const by = fp.y + Math.sin(seed + b * 1.8) * r * 0.22;
        const br = r * (0.65 + (((seed + b * 17) % 10) / 10) * 0.35);
        ctx.fillStyle = b === 0 ? darkCol : baseCol;
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Tropical ground clutter (small square patches across island body)
    const tropicalCount = 10 + Math.floor(island.radius * 0.09);
    for (let i = 0; i < tropicalCount; i++) {
      const seed = stableNumericSeed(`${island.x}:${island.y}:trop:${i}`);
      const ang = seeded01(seed + 0.21) * Math.PI * 2;
      const radial = Math.sqrt(seeded01(seed + 0.57)) * island.radius * 0.72;
      const wx = island.x + Math.cos(ang) * radial;
      const wy = island.y + Math.sin(ang) * radial;
      const tp = toScreen(wx, wy, cam, zoom);
      const sq = Math.max(1.2, (0.9 + seeded01(seed + 1.11) * 2.2) * zoom);
      const colorSet = seeded01(seed + 1.83);
      ctx.fillStyle = colorSet < 0.34
        ? 'rgba(45,90,39,0.42)'
        : colorSet < 0.67
          ? 'rgba(74,122,66,0.38)'
          : 'rgba(58,106,52,0.34)';
      ctx.fillRect(tp.x - sq * 0.5, tp.y - sq * 0.5, sq, sq);
      if (seeded01(seed + 2.47) > 0.45) {
        const sq2 = sq * (0.62 + seeded01(seed + 3.01) * 0.33);
        ctx.fillRect(tp.x + sq * 0.22, tp.y - sq * 0.28, sq2, sq2);
      }
      if (seeded01(seed + 3.33) > 0.62) {
        const sq3 = sq * (0.48 + seeded01(seed + 4.21) * 0.28);
        ctx.fillRect(tp.x - sq * 0.52, tp.y + sq * 0.18, sq3, sq3);
      }
    }

    // Docks
    for (const dock of island.docks) {
      const dp = toScreen(dock.x, dock.y, cam, zoom);
      const dLen = dock.length * zoom * 0.6;
      ctx.save();
      ctx.translate(dp.x, dp.y);
      ctx.rotate(dock.angle);
      ctx.fillStyle = '#7a5f3a';
      ctx.fillRect(0, -2.5 * zoom * 0.35, dLen, 5 * zoom * 0.35);
      ctx.strokeStyle = '#5a4a2a';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(0, -2.5 * zoom * 0.35, dLen, 5 * zoom * 0.35);
      ctx.restore();
    }

    // Buildings
    for (const b of island.buildings) {
      const bs = buildingById[b.id];
      const destroyed = bs ? bs.destroyed : false;
      const isTower = bs ? bs.isTower : false;
      const bp = toScreen(b.x, b.y, cam, zoom);
      const villageScale = isTower ? 1 : 0.75;
      const bHalf = isTower
        ? Math.max(6, b.size * zoom * 0.46)
        : Math.max(1.5, b.size * zoom * 0.46 * villageScale);
      const hpRatio = bs ? Math.max(0, (bs.hp || 0) / Math.max(1, bs.maxHp || 1)) : 1;
      const damage = 1 - hpRatio;
      const seedBase = stableNumericSeed(b.id) * 13.17;

      if (destroyed && !isTower && !destroyedVillageFxSeen.has(b.id)) {
        destroyedVillageFxSeen.add(b.id);
        addExplosion(b.x, b.y, Math.max(10, b.size * 0.95));
        spawnVillageDestructionFx(b.x, b.y, b.size * villageScale, island);
      }

      if (destroyed) {
        if (isTower) {
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = '#4f3f2b';
          ctx.fillRect(bp.x - bHalf * 1.05, bp.y - bHalf * 0.95, bHalf * 2.1, bHalf * 1.9);
          for (let i = 0; i < 5; i++) {
            const ox = (seeded01(seedBase + i * 2.1) - 0.5) * bHalf * 1.4;
            const oy = (seeded01(seedBase + i * 3.3 + 1.2) - 0.5) * bHalf * 1.1;
            const rw = Math.max(1.2, bHalf * (0.18 + seeded01(seedBase + i * 5.4) * 0.25));
            const rh = Math.max(1.2, bHalf * (0.14 + seeded01(seedBase + i * 7.1) * 0.2));
            ctx.fillStyle = i % 2 === 0 ? '#2f261b' : '#6a553a';
            ctx.fillRect(bp.x + ox - rw / 2, bp.y + oy - rh / 2, rw, rh);
          }
          ctx.globalAlpha = 1;
        }
      } else {
        if (isTower) {
          // Tower base: simple large wooden rectangle
          const baseW = bHalf * 2.6;
          const baseH = bHalf * 2.05;
          ctx.fillStyle = '#7d623f';
          ctx.fillRect(bp.x - baseW * 0.5, bp.y - baseH * 0.5, baseW, baseH);
          ctx.strokeStyle = '#463422';
          ctx.lineWidth = 1.1;
          ctx.strokeRect(bp.x - baseW * 0.5, bp.y - baseH * 0.5, baseW, baseH);
          // Plank seam hint
          ctx.strokeStyle = 'rgba(62,44,29,0.45)';
          ctx.lineWidth = 0.9;
          ctx.beginPath();
          ctx.moveTo(bp.x - baseW * 0.2, bp.y - baseH * 0.45);
          ctx.lineTo(bp.x - baseW * 0.2, bp.y + baseH * 0.45);
          ctx.moveTo(bp.x + baseW * 0.18, bp.y - baseH * 0.45);
          ctx.lineTo(bp.x + baseW * 0.18, bp.y + baseH * 0.45);
          ctx.stroke();

          // Cannon barrel (faces nearest player visually)
          const players = currState?.players ? Object.values(currState.players).filter(p => p && p.alive) : [];
          let aim = -Math.PI / 2;
          if (players.length > 0) {
            let nearest = players[0];
            let nearestD = Math.hypot(nearest.x - b.x, nearest.y - b.y);
            for (const pl of players) {
              const d = Math.hypot(pl.x - b.x, pl.y - b.y);
              if (d < nearestD) { nearestD = d; nearest = pl; }
            }
            aim = Math.atan2(nearest.y - b.y, nearest.x - b.x);
          }
          ctx.save();
          ctx.translate(bp.x, bp.y - baseH * 0.12);
          // Fat breech block
          ctx.fillStyle = '#666666';
          ctx.fillRect(-bHalf * 0.52, -bHalf * 0.32, bHalf * 1.04, bHalf * 0.64);
          ctx.strokeStyle = '#3f3f3f';
          ctx.strokeRect(-bHalf * 0.52, -bHalf * 0.32, bHalf * 1.04, bHalf * 0.64);
          ctx.rotate(aim);
          // Fat cannon tube
          ctx.fillStyle = '#4a4a4a';
          ctx.fillRect(0, -bHalf * 0.2, bHalf * 1.55, bHalf * 0.4);
          ctx.strokeStyle = '#9a9a9a';
          ctx.lineWidth = 1;
          ctx.strokeRect(0, -bHalf * 0.2, bHalf * 1.55, bHalf * 0.4);
          ctx.restore();
        } else {
          // Village houses: a couple of spaced single rectangles
          const houseCount = 2 + Math.floor(seeded01(seedBase + 2.7) * 2); // 2-3 houses
          const brownPalette = ['#5f452d', '#745338', '#8a6242', '#9a6f4c', '#6b4d33'];

          ctx.fillStyle = 'rgba(74,52,34,0.2)';
          ctx.beginPath();
          ctx.ellipse(bp.x, bp.y, bHalf * 0.95, bHalf * 0.68, 0, 0, Math.PI * 2);
          ctx.fill();

          const ringR = bHalf * 0.58;
          const baseRot = seeded01(seedBase + 8.1) * Math.PI * 2;
          const houses = [];
          const maxAttempts = houseCount * 14;
          const pad = bHalf * 0.1;

          for (let attempt = 0; attempt < maxAttempts && houses.length < houseCount; attempt++) {
            const t = (attempt + 0.31) / Math.max(1, houseCount);
            const ang = baseRot + t * Math.PI * 2 + (seeded01(seedBase + attempt * 5.3 + 3.9) - 0.5) * 0.38;
            const radiusJitter = ringR * (0.78 + seeded01(seedBase + attempt * 7.7 + 1.8) * 0.34);
            const ox = Math.cos(ang) * radiusJitter;
            const oy = Math.sin(ang) * radiusJitter * 0.78;
            const rw = Math.max(4.6, bHalf * (0.68 + seeded01(seedBase + attempt * 4.1 + 6.6) * 0.34));
            const rh = Math.max(3.4, bHalf * (0.52 + seeded01(seedBase + attempt * 6.2 + 9.9) * 0.28));

            let overlap = false;
            for (const h of houses) {
              const overlapX = Math.abs(ox - h.ox) < (rw + h.rw) * 0.5 + pad;
              const overlapY = Math.abs(oy - h.oy) < (rh + h.rh) * 0.5 + pad;
              if (overlapX && overlapY) { overlap = true; break; }
            }
            if (overlap) continue;

            const colorIndex = Math.floor(seeded01(seedBase + 90 + attempt * 1.97) * brownPalette.length) % brownPalette.length;
            houses.push({ ox, oy, rw, rh, colorIndex });
          }

          for (const h of houses) {
            ctx.fillStyle = brownPalette[h.colorIndex];
            ctx.fillRect(bp.x + h.ox - h.rw / 2, bp.y + h.oy - h.rh / 2, h.rw, h.rh);
          }

          if (villageDebugEnabled) {
            ctx.strokeStyle = 'rgba(106,229,255,0.88)';
            ctx.lineWidth = 1.2;
            ctx.strokeRect(bp.x - bHalf, bp.y - bHalf * 0.8, bHalf * 2, bHalf * 1.6);
            ctx.fillStyle = 'rgba(106,229,255,0.95)';
            ctx.font = `${Math.max(10, Math.floor(10 * zoom))}px system-ui, sans-serif`;
            ctx.fillText(`v:${b.id} c:${houses.length}`, bp.x - bHalf, bp.y - bHalf - 4);
          }
        }

        // Damage marks: more black marks as HP drops
        if (damage > 0.06) {
          const markCount = 1 + Math.floor(damage * 8);
          for (let i = 0; i < markCount; i++) {
            const r1 = seeded01(seedBase + 31 + i * 2.8);
            const r2 = seeded01(seedBase + 42 + i * 4.4);
            const r3 = seeded01(seedBase + 53 + i * 6.6);
            const mx = bp.x + (r1 * 2 - 1) * bHalf * 0.7;
            const my = bp.y + (r2 * 2 - 1) * bHalf * 0.6;
            const ms = Math.max(1.1, bHalf * (0.12 + r3 * 0.2));
            ctx.fillStyle = 'rgba(10,10,10,0.58)';
            if (i % 3 === 0) {
              ctx.beginPath();
              ctx.moveTo(mx, my - ms * 0.7);
              ctx.lineTo(mx + ms * 0.7, my + ms * 0.55);
              ctx.lineTo(mx - ms * 0.7, my + ms * 0.55);
              ctx.closePath();
              ctx.fill();
            } else {
              ctx.fillRect(mx - ms * 0.5, my - ms * 0.5, ms, ms);
            }
          }
        }

        // Sporadic village fire at higher damage
        if (damage > 0.35) {
          const fireCount = 1 + Math.floor(damage * 4);
          const t = performance.now() * 0.008;
          for (let i = 0; i < fireCount; i++) {
            const r1 = seeded01(seedBase + 71 + i * 3.3);
            const r2 = seeded01(seedBase + 83 + i * 5.2);
            const fx = bp.x + (r1 * 2 - 1) * bHalf * 0.62;
            const fy = bp.y + (r2 * 2 - 1) * bHalf * 0.45;
            const fh = Math.max(1.4, bHalf * (0.16 + 0.08 * Math.sin(t + i)));
            if ((i + Math.floor(t * 3)) % 2 === 0) {
              ctx.fillStyle = 'rgba(255,170,80,0.78)';
              ctx.beginPath();
              ctx.moveTo(fx, fy - fh);
              ctx.lineTo(fx + fh * 0.5, fy + fh * 0.15);
              ctx.lineTo(fx - fh * 0.5, fy + fh * 0.15);
              ctx.closePath();
              ctx.fill();
              ctx.fillStyle = 'rgba(255,90,40,0.65)';
              ctx.beginPath();
              ctx.arc(fx, fy - fh * 0.2, fh * 0.3, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        if (isTower && bs && bs.hp < bs.maxHp) {
          const hpR = hpRatio;
          const bw = bHalf * 2.4;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(bp.x - bw / 2, bp.y + bHalf + 2, bw, 3);
          ctx.fillStyle = hpR > 0.5 ? '#4caf50' : '#ff9800';
          ctx.fillRect(bp.x - bw / 2, bp.y + bHalf + 2, bw * hpR, 3);
        }

        if (villageDebugEnabled && (destroyed || isTower)) {
          ctx.strokeStyle = destroyed ? 'rgba(255,110,110,0.85)' : 'rgba(255,208,120,0.9)';
          ctx.lineWidth = 1.2;
          ctx.strokeRect(bp.x - bHalf * 1.15, bp.y - bHalf * 0.95, bHalf * 2.3, bHalf * 1.9);
          ctx.fillStyle = destroyed ? 'rgba(255,110,110,0.95)' : 'rgba(255,208,120,0.95)';
          ctx.font = `${Math.max(10, Math.floor(10 * zoom))}px system-ui, sans-serif`;
          const kind = destroyed ? 'destroyed' : 'tower';
          ctx.fillText(`${kind}:${b.id}`, bp.x - bHalf, bp.y - bHalf - 4);
        }
      }
    }
  }
}

// ─── Explosion rendering ───
function drawExplosions(cam, zoom, dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.t += dt;
    if (ex.t > 0.7) { explosions.splice(i, 1); continue; }
    const sp = toScreen(ex.x, ex.y, cam, zoom);
    const progress = ex.t / 0.7;
    // Core fireball
    const r = ex.size * zoom * (0.4 + progress * 1.2);
    ctx.globalAlpha = Math.max(0, 1 - progress * 1.3);
    ctx.fillStyle = progress < 0.2 ? '#fff8cc' : progress < 0.4 ? '#ffcc00' : '#ff6600';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
    ctx.fill();
    // Shockwave ring
    if (progress > 0.1 && progress < 0.6) {
      const ringR = ex.size * zoom * (0.6 + progress * 2.2);
      ctx.globalAlpha = Math.max(0, 0.4 - progress * 0.7);
      ctx.strokeStyle = '#ffaa33';
      ctx.lineWidth = Math.max(1, zoom * 1.5 * (1 - progress));
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, ringR, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!currState || myId === null) return;

  const st = currState;
  const me = getInterpolatedPlayer(myId);
  if (!me) return;

  const dt = 1 / 60;
  const time = performance.now() / 1000;

  // Dynamic zoom (zoom out as lookout range increases)
  const baseZoom = 2.4;
  const bonusZoom = (me.lookoutRangeBonus || 0) * -0.003;
  const zoom = Math.max(1.3, Math.min(3.0, baseZoom + bonusZoom));
  const cam = {
    x: me.x - canvas.width / (2 * zoom),
    y: me.y - canvas.height / (2 * zoom)
  };

  // Tick particles
  tickParticles(dt);

  // Spawn wake + fire particles for all visible ships
  const allShips = [];
  for (const id of Object.keys(st.players)) {
    const p = getInterpolatedPlayer(parseInt(id));
    if (p && p.alive) { allShips.push(p); if (Math.random() < (p.speed || 0) * dt * 8) spawnWakeParticles(p); if (p.onFire && Math.random() < dt * 18) spawnFireParticles(p); }
  }
  if (st.npcs) {
    for (const id of Object.keys(st.npcs)) {
      const p = getInterpolatedNpc(parseInt(id));
      if (p && p.alive) { allShips.push(p); if (Math.random() < (p.speed || 0) * dt * 8) spawnWakeParticles(p); if (p.onFire && Math.random() < dt * 18) spawnFireParticles(p); }
    }
  }

  // Cap particles
  while (particles.length > 600) particles.shift();

  // Water grid
  drawWaterGrid(cam, zoom);

  // Wake particles (below ships)
  drawParticles(cam, zoom, 'below');

  // World boundary
  const tl = toScreen(0, 0, cam, zoom);
  const br = toScreen(st.world.width, st.world.height, cam, zoom);
  ctx.strokeStyle = 'rgba(80,140,180,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

  // Islands
  drawIslands(cam, zoom, st.worldBuildings);

  // Doubloon drops
  if (st.drops) {
    for (const d of st.drops) {
      const dp = toScreen(d.x, d.y, cam, zoom);
      const spin = Math.cos(st.time * 7 + d.x * 0.03 + d.y * 0.04);
      const rx = Math.max(1.5, 4 * Math.abs(spin) * zoom);
      const ry = 4 * zoom;
      ctx.fillStyle = '#ffd44f';
      ctx.beginPath();
      ctx.ellipse(dp.x, dp.y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#c9a030';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  }

  // Player ships
  for (const id of Object.keys(st.players)) {
    const nid = parseInt(id);
    const p = getInterpolatedPlayer(nid);
    if (!p || !p.alive) continue;
    const isMe = (nid === myId);
    const sp = toScreen(p.x, p.y, cam, zoom);
    drawShipAt(sp.x, sp.y, p, zoom, isMe);
  }

  // NPC ships
  if (st.npcs) {
    for (const id of Object.keys(st.npcs)) {
      const p = getInterpolatedNpc(parseInt(id));
      if (!p || !p.alive) continue;
      const sp = toScreen(p.x, p.y, cam, zoom);
      drawShipAt(sp.x, sp.y, p, zoom, false);
    }
  }

  // Bullets
  if (st.bullets) {
    for (const b of st.bullets) {
      const bp = toScreen(b.x, b.y, cam, zoom);
      const r = 4;
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#c8ccd0';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bp.x - 1.2, bp.y - 1.2, 1.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fill();
    }
  }

  // Non-wake particles (above ships)
  drawParticles(cam, zoom, 'above');

  // Explosions
  drawExplosions(cam, zoom, dt);

  // Fog of war + procedural cloud mask
  drawFogLayer(me, cam, zoom, time);

  // Range rings (own ship)
  if (me && me.alive) {
    const sp = toScreen(me.x, me.y, cam, zoom);
    const gunR = getGunRange(me) * zoom;
    const cannonR = getCannonRange(me) * zoom;

    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(136,204,255,0.14)';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, gunR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,170,68,0.14)';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, cannonR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Wind compass
  drawWindCompass(st.wind);

  // HUD
  updateHud(st);

  // Aim line + crosshair
  if (me && me.alive) {
    const sp = toScreen(me.x, me.y, cam, zoom);
    ctx.strokeStyle = 'rgba(255,216,135,0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y);
    ctx.lineTo(mouseX, mouseY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,216,135,0.45)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mouseX - 10, mouseY); ctx.lineTo(mouseX + 10, mouseY);
    ctx.moveTo(mouseX, mouseY - 10); ctx.lineTo(mouseX, mouseY + 10);
    ctx.stroke();
  }

  // Auto-fire tick
  if (autoFireEnabled && me.alive && ws && ws.readyState === 1) {
    autoFireTimer += dt;
    const autoReload = 3.5;
    if (autoFireTimer >= autoReload) {
      let bestDist = Infinity, bestAngle = 0, gotTarget = false;
      const checkTarget = (p) => {
        if (!p || !p.alive || p.id === myId) return;
        const dx = p.x - me.x, dy = p.y - me.y;
        const d = Math.hypot(dx, dy);
        if (d < bestDist) { bestDist = d; bestAngle = Math.atan2(dy, dx); gotTarget = true; }
      };
      for (const id of Object.keys(st.players)) checkTarget(st.players[id]);
      if (st.npcs) for (const id of Object.keys(st.npcs)) checkTarget(st.npcs[id]);
      if (gotTarget) {
        ws.send(JSON.stringify({ type: 'cannonFire', angle: bestAngle }));
        autoFireTimer = 0;
      }
    }
  }

  // FPS counter + auto-fire badge
  ctx.save();
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(6, 6, 104, 36);
  ctx.fillStyle = '#a8d8a8';
  ctx.fillText(`${_fps} FPS`, 10, 20);
  ctx.fillStyle = autoFireEnabled ? '#ffcc44' : '#6a8898';
  ctx.fillText(`[F] ${autoFireEnabled ? 'AUTO FIRE ●' : 'manual fire'}`, 10, 34);
  ctx.restore();

  // Scoreboard
  if (tabHeld) {
    scoreboardEl.classList.add('visible');
    updateScoreboard(st);
  } else {
    scoreboardEl.classList.remove('visible');
  }
}

function drawWaterGrid(cam, zoom) {
  const tileSize = 32;
  const startTX = Math.floor(cam.x / tileSize);
  const startTY = Math.floor(cam.y / tileSize);
  const endTX = Math.ceil((cam.x + canvas.width / zoom) / tileSize);
  const endTY = Math.ceil((cam.y + canvas.height / zoom) / tileSize);
  const time = performance.now() / 1000;
  const wind = currState?.wind || { x: 0.7, y: 0.2 };
  const windMag = Math.hypot(wind.x, wind.y) || 1;
  const windNX = wind.x / windMag;
  const windNY = wind.y / windMag;
  const oppNX = -windNX;
  const oppNY = -windNY;
  const wrap01 = (v) => ((v % 1) + 1) % 1;

  for (let tx = startTX; tx <= endTX; tx++) {
    for (let ty = startTY; ty <= endTY; ty++) {
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const sx = (wx - cam.x) * zoom;
      const sy = (wy - cam.y) * zoom;
      const sw = tileSize * zoom + 1;
      const sh = tileSize * zoom + 1;
      const even = (tx + ty) % 2 === 0;
      ctx.fillStyle = even ? '#164c70' : '#1a5880';
      ctx.fillRect(sx, sy, sw, sh);
      const wavePh = Math.sin(time * 1.1 + tx * 0.7 + ty * 0.5);
      if (wavePh > 0.35) {
        ctx.globalAlpha = (wavePh - 0.35) * 0.07;
        ctx.fillStyle = '#5090c0';
        ctx.fillRect(sx, sy, sw, sh);
        ctx.globalAlpha = 1;
      }

      // Wind-reactive tile shimmer: one layer drifts against wind, one with wind.
      const projOpp = (wx * oppNX + wy * oppNY) * 0.045;
      const projWind = (wx * windNX + wy * windNY) * 0.04;
      const driftA = wrap01(projOpp + time * 0.92 + ((tx + ty) & 1) * 0.31);
      const driftB = wrap01(projWind - time * 0.78 + ((tx - ty) & 1) * 0.27);

      const ax = sx + (0.15 + driftA * 0.7) * sw;
      const ay = sy + (0.18 + driftA * 0.55) * sh;
      const bx = sx + (0.15 + driftB * 0.7) * sw;
      const by = sy + (0.2 + driftB * 0.5) * sh;

      ctx.globalAlpha = 0.08;
      ctx.fillStyle = 'rgba(120,185,225,1)';
      ctx.fillRect(ax - sw * 0.2, ay - sh * 0.09, sw * 0.4, sh * 0.18);
      ctx.globalAlpha = 0.05;
      ctx.fillStyle = 'rgba(95,165,210,1)';
      ctx.fillRect(bx - sw * 0.18, by - sh * 0.08, sw * 0.36, sh * 0.16);
      ctx.globalAlpha = 1;
    }
  }

  ctx.strokeStyle = 'rgba(40,90,130,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let tx = startTX; tx <= endTX + 1; tx++) {
    const sx = (tx * tileSize - cam.x) * zoom;
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, canvas.height);
  }
  for (let ty = startTY; ty <= endTY + 1; ty++) {
    const sy = (ty * tileSize - cam.y) * zoom;
    ctx.moveTo(0, sy);
    ctx.lineTo(canvas.width, sy);
  }
  ctx.stroke();
}

function drawHullPolygon(shape, z) {
  ctx.beginPath();
  ctx.moveTo(shape.bowX * z, 0);
  ctx.lineTo(shape.shoulderX * z, -shape.shoulderHalfBeam * z);
  ctx.lineTo(shape.sternShoulderX * z, -shape.sternHalfBeam * z);
  ctx.lineTo(shape.sternX * z, 0);
  ctx.lineTo(shape.sternShoulderX * z, shape.sternHalfBeam * z);
  ctx.lineTo(shape.shoulderX * z, shape.shoulderHalfBeam * z);
  ctx.closePath();
}

function getNpcDeckColor(p) {
  const palette = ['#6c4e35', '#5a3f2b', '#4f5b38', '#4a4158', '#385562', '#6a5838'];
  const idx = Math.abs(((p.id || 0) * 37 + (p.level || 1) * 11) % palette.length);
  return palette[idx];
}

function drawDeckDamageMarks(p, shape, z) {
  const shipId = p.id ?? p.name;
  if (shipId === undefined || shipId === null) return;

  const nowMs = performance.now();
  const maxHp = Math.max(1, p.maxHp || 1);
  const hp = clamp(p.hp || maxHp, 0, maxHp);
  const damage = 1 - hp / maxHp;

  const sizeScale = clamp((p.size || 16) / 16, 1, 2.8);
  const targetBlackMarks = damage <= 0.05
    ? 0
    : Math.max(2, Math.floor(damage * (20 + sizeScale * 22)));

  const minX = shape.sternShoulderX * 0.88;
  const maxX = shape.shoulderX * 0.92;

  const state = shipDamageMarkState.get(shipId) || { marks: [] };
  state.marks = state.marks.filter((mark) => mark.state !== 'brown' || nowMs < mark.fadeEndMs);

  const activeBlack = state.marks.filter((mark) => mark.state === 'black');

  if (activeBlack.length > targetBlackMarks) {
    const toBrown = activeBlack.length - targetBlackMarks;
    let converted = 0;
    for (let i = state.marks.length - 1; i >= 0 && converted < toBrown; i--) {
      const mark = state.marks[i];
      if (mark.state !== 'black') continue;
      mark.state = 'brown';
      mark.fadeEndMs = nowMs + SHIP_DAMAGE_PATCH_LINGER_MS;
      converted++;
    }
  } else if (activeBlack.length < targetBlackMarks) {
    const toAdd = targetBlackMarks - activeBlack.length;
    for (let i = 0; i < toAdd; i++) {
      const r1 = Math.random();
      const r2 = Math.random();
      const r3 = Math.random();
      const r4 = Math.random();
      const x = minX + (maxX - minX) * r1;
      const halfW = hullHalfWidthAt(shape, x) * (0.62 + r2 * 0.2);
      const y = (r3 * 2 - 1) * halfW;
      const size = (0.95 + r4 * 2.0) * z;
      state.marks.push({
        x,
        y,
        size,
        rot: r2 * Math.PI * 2,
        sides: r1 > 0.5 ? 4 : 3,
        state: 'black',
        fadeEndMs: 0
      });

      if (Math.random() < 0.58) {
        const mini = size * (0.45 + Math.random() * 0.42);
        state.marks.push({
          x: x + (Math.random() - 0.5) * size * 1.05 / z,
          y: y + (Math.random() - 0.5) * size * 0.95 / z,
          size: mini,
          rot: (Math.random() - 0.5) * 0.9,
          sides: Math.random() > 0.5 ? 4 : 3,
          state: 'black',
          fadeEndMs: 0
        });
      }
    }
  }

  shipDamageMarkState.set(shipId, state);

  for (const mark of state.marks) {
    if (mark.state === 'black') {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#141516';
    } else {
      const remain = clamp((mark.fadeEndMs - nowMs) / SHIP_DAMAGE_PATCH_LINGER_MS, 0, 1);
      ctx.globalAlpha = 0.2 + remain * 0.55;
      ctx.fillStyle = '#6c4d2d';
    }
    ctx.save();
    ctx.translate(mark.x * z, mark.y * z);
    ctx.rotate(mark.rot);
    polygonPath(mark.sides, mark.size);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawDeckGoldPiles(p, shape, z) {
  const chunks = Math.floor(Math.max(0, p.doubloons || 0) / 20);
  if (chunks <= 0) return;

  const deckLen = shape.shoulderX - shape.sternShoulderX;
  const sternX = shape.sternShoulderX;
  const zoneLen = Math.max(1.6, deckLen * 0.52); // back half-ish zone

  const capacity = 56;
  const drawCount = Math.min(chunks, capacity);

  const goldShades = ['#c88f2a', '#d7a43a', '#e6bf55', '#b77a1e', '#f0d27a'];
  const brownShades = ['#7d5a34', '#8e6840', '#6c4d2d'];

  for (let i = 0; i < drawCount; i++) {
    const seed = (p.id || 1) * 97.13 + i * 11.71;
    const tx = Math.pow(seeded01(seed + 0.83), 1.6); // stronger stern bias (back of ship)
    const x = sternX + tx * zoneLen;
    const halfW = hullHalfWidthAt(shape, x) * 0.7;
    const y = (seeded01(seed + 2.1) * 2 - 1) * halfW * 0.42; // crowd toward centerline
    const layer = Math.floor(seeded01(seed + 2.9) * 3);
    const jitterX = (seeded01(seed + 3.5) - 0.5) * zoneLen * 0.08;
    const jitterY = (seeded01(seed + 4.2) - 0.5) * halfW * 0.16;
    const sizeLocal = Math.max(2.8 / Math.max(0.01, z), 2.8 + seeded01(seed + 5.6) * 2.6);
    const size = sizeLocal * z;

    const localX = x + jitterX;
    const deckHalfW = hullHalfWidthAt(shape, localX) * 0.88;
    const edgePad = sizeLocal * 0.62;
    const maxY = Math.max(0, deckHalfW - edgePad);
    const localY = clamp(y + jitterY, -maxY, maxY);

    const px = localX * z;
    const py = (localY - layer * (sizeLocal * 0.5)) * z;

    const chestLike = seeded01(seed + 5.8) < 0.35;
    if (chestLike) {
      const bw = size * 1.18;
      const bh = size * 0.86;
      const brownIdx = Math.floor(seeded01(seed + 6.4) * brownShades.length) % brownShades.length;
      const goldIdx = Math.floor(seeded01(seed + 7.1) * goldShades.length) % goldShades.length;
      ctx.fillStyle = brownShades[brownIdx];
      ctx.fillRect(px - bw * 0.5, py - bh * 0.45, bw, bh);
      ctx.fillStyle = goldShades[goldIdx];
      ctx.fillRect(px - bw * 0.38, py - bh * 0.26, bw * 0.76, bh * 0.38);
      ctx.fillStyle = 'rgba(70, 45, 24, 0.75)';
      ctx.fillRect(px - bw * 0.42, py - bh * 0.5, bw * 0.84, bh * 0.2);
    } else {
      const shadeIdx = Math.floor(seeded01(seed + 4.7) * goldShades.length) % goldShades.length;
      ctx.fillStyle = goldShades[shadeIdx];
      ctx.fillRect(px - size * 0.5, py - size * 0.5, size, size);
    }
  }
}

function drawShipBurningOverlay(p, shape, z) {
  if (!p.onFire) return;
  const burn = Math.max(0.6, Number(p.burnTime || 0));
  const intensity = clamp(burn / 7, 0.2, 1);
  const flames = 2 + Math.floor(intensity * 4);
  const seed = (p.damageSeed || p.id || 17) * 0.37;
  const t = performance.now() * 0.001;

  for (let i = 0; i < flames; i++) {
    const lane = (i + 1) / (flames + 1);
    const minX = shape.sternShoulderX * 0.62;
    const maxX = shape.shoulderX * 0.72;
    const x = minX + (maxX - minX) * lane;
    const hw = hullHalfWidthAt(shape, x) * 0.48;
    const wave = Math.sin(t * 7.5 + seed + i * 1.27);
    const y = clamp(wave * hw * 0.55, -hw, hw);
    const h = (2 + intensity * 2.8 + Math.sin(t * 10 + i * 2.1) * 0.4) * z;
    const sx = x * z;
    const sy = y * z;

    ctx.fillStyle = 'rgba(255,178,80,0.8)';
    ctx.beginPath();
    ctx.moveTo(sx, sy - h);
    ctx.lineTo(sx + h * 0.52, sy + h * 0.1);
    ctx.lineTo(sx - h * 0.52, sy + h * 0.1);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,114,58,0.72)';
    ctx.beginPath();
    ctx.arc(sx, sy - h * 0.18, h * 0.34, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawShipAt(sx, sy, p, zoom, isMe) {
  const size = p.size || 16;
  const heading = p.heading || 0;
  const shape = getHullShape(p);
  const z = zoom;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(heading);

  // Invulnerability glow
  if (p.invuln) {
    ctx.globalAlpha = 0.3 + Math.sin(performance.now() * 0.008) * 0.15;
    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.arc(0, 0, shape.len * z * 1.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Ram bow — dark steel triangle, drawn BEFORE hull so the base is buried inside (only tip protrudes)
  // ~20% of total ship visual length, tip sticks past the bow, body embedded in hull
  if (p.ram) {
    const rLen = shape.len * 0.45 * z;   // ~20% of total visual ship length
    const halfW = rLen * 0.36;            // width of base
    const tipX   =  shape.bowX * z + rLen * 0.35;  // tip: protrudes forward of bow
    const baseX  =  shape.bowX * z - rLen * 0.65;  // base: inside hull, will be covered
    ctx.fillStyle = '#38383f';
    ctx.beginPath();
    ctx.moveTo(tipX, 0);
    ctx.lineTo(baseX, -halfW);
    ctx.lineTo(baseX,  halfW);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#888896';
    ctx.lineWidth = Math.max(0.5, z * 0.5);
    ctx.stroke();
  }

  // Hull fill
  drawHullPolygon(shape, z);
  ctx.fillStyle = p.hullColor || '#5f4630';
  ctx.fill();

  // Deck tint layer (adds visual variety, especially for NPC ships)
  drawHullPolygon(shape, z);
  ctx.save();
  ctx.clip();
  const deckColor = p.isNpc ? getNpcDeckColor(p) : (p.trimColor || '#d9b78d');
  const minDeckX = shape.sternShoulderX * z;
  const maxDeckX = shape.shoulderX * z;
  const beam = shape.shoulderHalfBeam * z * 0.76;
  ctx.fillStyle = deckColor;
  ctx.globalAlpha = p.isNpc ? 0.34 : 0.22;
  ctx.fillRect(minDeckX, -beam, Math.max(1, maxDeckX - minDeckX), beam * 2);
  ctx.restore();
  ctx.globalAlpha = 1;

  // Trim stroke
  ctx.strokeStyle = p.trimColor || '#d9b78d';
  ctx.lineWidth = Math.max(2, z * 1.8);
  ctx.stroke();

  // Armor plate lines
  if ((p.hullArmorTier || 0) > 0) {
    const plateCount = 3 + p.hullArmorTier;
    const deckLen = shape.shoulderX - shape.sternShoulderX;
    ctx.strokeStyle = 'rgba(160,150,130,0.35)';
    ctx.lineWidth = Math.max(0.5, z * 0.4);
    for (let i = 0; i < plateCount; i++) {
      const t = (i + 0.5) / plateCount;
      const lx = shape.sternShoulderX + deckLen * t;
      const hw = hullHalfWidthAt(shape, lx);
      ctx.beginPath();
      ctx.moveTo(lx * z, -hw * z);
      ctx.lineTo(lx * z, hw * z);
      ctx.stroke();
    }
  }

  // Ram bow — lighter top cap drawn over hull, only the protruding tip portion
  if (p.ram) {
    const rLen = shape.len * 0.45 * z;
    const halfW = rLen * 0.22;
    const tipX   = shape.bowX * z + rLen * 0.35;
    const baseX  = shape.bowX * z;            // exposed part starts at bow edge
    ctx.fillStyle = '#7a7a86';
    ctx.beginPath();
    ctx.moveTo(tipX, 0);
    ctx.lineTo(baseX, -halfW);
    ctx.lineTo(baseX,  halfW);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#aaaabc';
    ctx.lineWidth = Math.max(0.5, z * 0.6);
    ctx.stroke();
  }

  // Weapon mounts
  const layout = p.weaponLayout || { port: [], starboard: [] };
  for (const [side, slots] of [['port', layout.port], ['starboard', layout.starboard]]) {
    if (!slots || !slots.length) continue;
    const sideSign = side === 'starboard' ? 1 : -1;
    for (let i = 0; i < slots.length; i++) {
      const type = slots[i];
      if (type === 'empty') continue;
      const mount = getHullSideMount(shape, i, slots.length, sideSign);
      const mx = mount.x * z;
      const my = mount.y * z;
      const angle = Math.atan2(mount.ny, mount.nx);
      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(angle);
      if (type === 'cannon') {
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(0, -1.2 * z, 11.0 * z, 2.4 * z);
        ctx.strokeStyle = '#4a4a4a';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(0, -1.2 * z, 11.0 * z, 2.4 * z);
      } else if (type === 'gun') {
        ctx.fillStyle = '#b8c0c8';
        ctx.fillRect(0, -0.8 * z, 7.2 * z, 1.6 * z);
        ctx.strokeStyle = '#8898a8';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(0, -0.8 * z, 7.2 * z, 1.6 * z);
      }
      ctx.restore();
    }
  }

  // Mast
  const mastX = ((shape.sternShoulderX + shape.shoulderX) * 0.5) * z;
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.arc(mastX, 0, Math.max(1.5, z * 1.2), 0, Math.PI * 2);
  ctx.fill();

  drawDeckDamageMarks(p, shape, z);
  drawDeckGoldPiles(p, shape, z);
  drawShipBurningOverlay(p, shape, z);

  // Square sail — draw above damage overlays
  if (p.sailOpen && currState && currState.wind) {
    const wind = currState.wind;
    const mastPosX = ((shape.sternShoulderX + shape.shoulderX) * 0.5) * z;
    const windAngle = Math.atan2(wind.y, wind.x);
    const yardAngle = windAngle - p.heading + Math.PI / 2;
    const sailW = size * 2.0 * z;
    const sailH = Math.max(3.2, z * 3.1);
    const swayTime = performance.now() * 0.003 + (p.id || 0) * 0.73;
    const backSwayOffset = Math.sin(swayTime) * Math.max(0.35, size * z * 0.05);
    const backSwayRot = Math.sin(swayTime * 0.82) * 0.014;
    const sailSwayOffset = Math.sin(swayTime + 1.1) * Math.max(0.28, size * z * 0.038);
    const sailSwayRot = Math.sin(swayTime * 0.97 + 0.55) * 0.011;

    // Translucent backing panel (subtle sway)
    ctx.save();
    ctx.translate(mastPosX + backSwayOffset, 0);
    ctx.rotate(yardAngle + backSwayRot);
    const backW = sailW * 1.24;
    const backH = sailH * 2.25;
    ctx.fillStyle = 'rgba(195, 215, 230, 0.22)';
    ctx.fillRect(-backW / 2, -backH / 2, backW, backH);
    ctx.restore();

    // Main sail (slightly different sway; not in sync with backing)
    ctx.save();
    ctx.translate(mastPosX + sailSwayOffset, 0);
    ctx.rotate(yardAngle + sailSwayRot);
    ctx.fillStyle = p.sailColor || '#f0f7ff';
    ctx.globalAlpha = 0.88;
    ctx.fillRect(-sailW / 2, -sailH / 2, sailW, sailH);
    ctx.strokeStyle = 'rgba(130,150,170,0.5)';
    ctx.lineWidth = Math.max(0.7, z * 0.52);
    ctx.strokeRect(-sailW / 2, -sailH / 2, sailW, sailH);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // NPC flag / pennant
  if (p.isNpc && p.flagColor) {
    const fmx = mastX;
    const fH = size * 0.6 * z;
    const fW = size * 0.4 * z;
    ctx.fillStyle = p.flagColor;
    ctx.beginPath();
    ctx.moveTo(fmx, -fH * 0.15);
    ctx.lineTo(fmx + fW, -fH * 0.3);
    ctx.lineTo(fmx + fW * 0.7, -fH * 0.15);
    ctx.lineTo(fmx + fW, 0);
    ctx.closePath();
    ctx.fill();
    if (p.flagAccent) {
      ctx.strokeStyle = p.flagAccent;
      ctx.lineWidth = Math.max(0.5, z * 0.4);
      ctx.stroke();
    }
    if ((p.flagStripes || 0) >= 1) {
      ctx.strokeStyle = p.flagAccent || '#fff';
      ctx.lineWidth = Math.max(0.4, z * 0.3);
      ctx.beginPath();
      ctx.moveTo(fmx + fW * 0.15, -fH * 0.15);
      ctx.lineTo(fmx + fW * 0.85, -fH * 0.15);
      ctx.stroke();
    }
  }

  ctx.restore();

  // HP bar (above ship)
  const hpRatio = Math.max(0, (p.hp || 0) / (p.maxHp || 20));
  const barWidth = shape.len * z * 2;
  const barHeight = 4 * (z / 2);
  const barX = sx - barWidth / 2;
  const barY = sy - shape.len * z - 16;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX, barY, barWidth, barHeight);
  ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';
  ctx.fillRect(barX, barY, barWidth * hpRatio, barHeight);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(barX, barY, barWidth, barHeight);

  // Reload bars (own ship only)
  if (isMe) {
    const reloadY = barY + barHeight + 2;
    const halfW = barWidth / 2 - 1;
    const gunProg = 1 - Math.max(0, Math.min(1, (p.gunTimer || 0) / (p.gunReload || 1)));
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX, reloadY, halfW, 2);
    ctx.fillStyle = gunProg >= 1 ? '#88ccff' : '#4488aa';
    ctx.fillRect(barX, reloadY, halfW * gunProg, 2);
    const canProg = 1 - Math.max(0, Math.min(1, (p.cannonTimer || 0) / (p.cannonReload || 1)));
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX + halfW + 2, reloadY, halfW, 2);
    ctx.fillStyle = canProg >= 1 ? '#ffaa44' : '#aa7733';
    ctx.fillRect(barX + halfW + 2, reloadY, halfW * canProg, 2);
  }

  // Name + doubloons
  ctx.fillStyle = isMe ? '#ffd887' : '#a8d0e6';
  ctx.font = `${Math.max(11, 12 * (z / 2))}px system-ui`;
  ctx.textAlign = 'center';
  const label = (p.name || '???') + (p.doubloons > 0 ? ` 🪙${p.doubloons}` : '');
  ctx.fillText(label, sx, barY - 3);

  // Own ship indicator ring
  if (isMe) {
    ctx.strokeStyle = 'rgba(255,216,135,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(sx, sy, shape.len * z + 4, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawWindCompass(wind) {
  const cx = canvas.width - 56;
  const cy = 60;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = 'rgba(160,200,230,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.stroke();

  const mag = Math.hypot(wind.x, wind.y) || 1;
  const ax = (wind.x / mag) * 16;
  const ay = (wind.y / mag) * 16;
  ctx.strokeStyle = '#d6ecff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(ax, ay);
  ctx.stroke();
  ctx.fillStyle = '#d6ecff';
  ctx.fillRect(ax - 2, ay - 2, 4, 4);
  ctx.restore();
}

function updateHud(st) {
  const secs = Math.max(0, Math.ceil(st.roundTimer));
  const mm = String(Math.floor(secs / 60)).padStart(2, '0');
  const ss = String(secs % 60).padStart(2, '0');
  timerEl.textContent = `${mm}:${ss}`;

  const count = Object.keys(st.players).length;
  playerCountEl.textContent = `${count} player${count !== 1 ? 's' : ''}`;

  const me = st.players[myId];
  if (me) {
    myLevelEl.textContent = `⚓ Lv ${me.level || 1}`;
    myDoubloonsEl.textContent = `🪙 ${me.doubloons}`;
    myKillsEl.textContent = `☠ ${me.kills}`;
    myDeathsEl.textContent = `💀 ${me.deaths}`;
    const xpNow = Math.max(0, Math.floor(me.xp || 0));
    const xpNeed = Math.max(1, Math.floor(me.xpToNext || 10));
    const xpPct = clamp(xpNow / xpNeed, 0, 1);
    xpFillEl.style.width = `${Math.round(xpPct * 1000) / 10}%`;
    xpTextEl.textContent = `${xpNow}/${xpNeed}`;
  } else {
    xpFillEl.style.width = '0%';
    xpTextEl.textContent = '0/10';
  }

  // ── Leaderboard: top 3 players by doubloons ──
  const rows = Object.entries(st.players)
    .sort(([, a], [, b]) => b.doubloons - a.doubloons)
    .slice(0, 3);
  const rankSymbol = ['🥇', '🥈', '🥉'];
  leaderboardEl.innerHTML = `<div class="leaderboard-title">Top Captains</div>` +
    rows.map(([id, p], i) => {
      const isMe = parseInt(id) === myId;
      return `<div class="leaderboard-row${isMe ? ' lb-me' : ''}">
        <span class="lb-rank">${rankSymbol[i]}</span>
        <span class="leaderboard-name">${esc(p.name)}</span>
        <span class="lb-k">☠${p.kills}</span>
        <span class="lb-d">💀${p.deaths}</span>
        <span class="lb-coins">🪙${p.doubloons}</span>
      </div>`;
    }).join('');
}

function updateScoreboard(st) {
  const rows = Object.entries(st.players)
    .sort(([, a], [, b]) => b.doubloons - a.doubloons);

  scoreBodyEl.innerHTML = rows.map(([id, p]) => {
    const isMe = parseInt(id) === myId;
    return `<tr class="${isMe ? 'me' : ''}">
      <td>${esc(p.name)}${p.invuln ? ' 🛡' : ''}${!p.alive ? ' 💀' : ''}</td>
      <td>${p.level || 1}</td>
      <td>${p.kills}</td>
      <td>${p.deaths}</td>
      <td>${p.doubloons}</td>
      <td>${Math.round(p.hp)}/${Math.round(p.maxHp)}</td>
    </tr>`;
  }).join('');
}

// ─── Loop ───
function loop() {
  _fpsFrames++;
  const now = performance.now();
  if (now >= _fpsNext) { _fps = _fpsFrames; _fpsFrames = 0; _fpsNext = now + 1000; }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── Boot ───
initAudio();
connect();
</script>
</body>
</html>
