<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pirate Survivor — Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e2a42; color: #e8f5ff; font-family: system-ui, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; background: radial-gradient(circle at 30% 30%, #14547e, #0e2a42 70%); }

    .hud { position: fixed; top: 0; left: 0; right: 0; z-index: 10; pointer-events: none; }
    .hud-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 16px; }
    .hud-left { display: flex; flex-direction: column; gap: 2px; }
    .timer { font-size: 22px; font-weight: bold; color: #ffd887; text-shadow: 0 1px 4px rgba(0,0,0,0.7); position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 10; pointer-events: none; background: rgba(6,16,24,0.55); padding: 4px 18px; border-radius: 20px; border: 1px solid rgba(255,216,135,0.18); }
    .player-count { font-size: 13px; color: #9fc2d9; }
    .my-stats { font-size: 13px; color: #c8dce8; margin-top: 4px; }
    .my-stats span { margin-right: 12px; }
    .doubloons { color: #ffd887; }
    .kills { color: #7fdb8a; }
    .deaths { color: #f59b80; }

    .kill-feed { position: fixed; top: 10px; right: 16px; z-index: 10; pointer-events: none; font-size: 13px; text-align: right; }
    .kill-feed div { color: #d6ecff; margin-bottom: 3px; opacity: 1; transition: opacity 0.5s; }
    .kill-feed .fade { opacity: 0; }

    .chat-panel { position: fixed; bottom: 10px; left: 10px; width: 340px; z-index: 20; }
    .chat-log { max-height: 140px; overflow-y: auto; font-size: 13px; line-height: 1.5; padding: 6px 8px; background: rgba(6,16,24,0.72); border-radius: 6px 6px 0 0; }
    .chat-log:empty { display: none; }
    .chat-log div { word-break: break-word; }
    .chat-log .name { color: #ffd887; }
    .chat-log .text { color: #d6ecff; }
    .chat-input-row { display: flex; pointer-events: auto; }
    .chat-input-row input {
      flex: 1; padding: 6px 8px; font-size: 13px; border: 1px solid #2a4a62;
      background: #0c2233; color: #e8f5ff; border-radius: 0 0 0 6px; outline: none;
    }
    .chat-input-row input:focus { border-color: #4f9cc8; }
    .chat-input-row button {
      padding: 6px 12px; font-size: 13px; border: 1px solid #2a4a62; border-left: 0;
      background: #163a52; color: #e8f5ff; border-radius: 0 0 6px 0; cursor: pointer;
    }

    .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; background: rgba(6,16,24,0.92); }
    .overlay.hidden { display: none; }
    .join-box { text-align: center; }
    .join-box h1 { font-size: 28px; margin-bottom: 16px; color: #ffd887; }
    .join-box input { padding: 10px 14px; font-size: 16px; border: 1px solid #2a4a62; background: #0c2233; color: #e8f5ff; border-radius: 6px; width: 220px; text-align: center; }
    .join-box button { display: block; margin: 14px auto 0; padding: 10px 28px; font-size: 16px; background: #1a5a3a; color: #e8f5ff; border: 1px solid #2a8a5a; border-radius: 6px; cursor: pointer; }
    .join-box button:hover { background: #237a4a; }
    .join-box .status { margin-top: 12px; font-size: 14px; color: #9fc2d9; }

    .hint { position: fixed; right: 14px; bottom: 12px; z-index: 10; color: #5a8aa6; font-size: 12px; text-align: right; pointer-events: none; }

    /* Scoreboard (Tab) */
    .scoreboard { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; background: rgba(6,16,24,0.82); pointer-events: none; }
    .scoreboard.visible { display: flex; }
    .scoreboard table { border-collapse: collapse; font-size: 14px; min-width: 420px; }
    .scoreboard th { color: #9fc2d9; padding: 4px 12px; text-align: left; border-bottom: 1px solid #2a4a62; }
    .scoreboard td { padding: 4px 12px; color: #d6ecff; }
    .scoreboard tr.me td { color: #ffd887; font-weight: bold; }

    /* Upgrade offer cards */
    .upgrade-bar { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 14px; pointer-events: auto; }
    .upgrade-bar.hidden { display: none; }
    .upgrade-bar-cards { display: flex; gap: 10px; }
    .upgrade-bar-title { font-size: 11px; color: #ffd887; letter-spacing: 1px; text-transform: uppercase; text-align: center; opacity: 0.85; }
    .upgrade-bar-title.hidden { display: none; }
    .upgrade-card { width: 170px; padding: 10px 8px; background: rgba(12,34,51,0.94); border: 2px solid #2a6a8a; border-radius: 8px; cursor: pointer; text-align: center; transition: border-color 0.15s, transform 0.15s; }
    .upgrade-card:hover { border-color: #ffd887; transform: translateY(-3px); }
    .upgrade-card .key { display: inline-block; width: 22px; height: 22px; line-height: 22px; background: #1a3a52; border: 1px solid #4a7a9a; border-radius: 4px; font-size: 12px; font-weight: bold; color: #ffd887; }
    .upgrade-card .uname { font-size: 13px; font-weight: bold; color: #e8f5ff; margin: 6px 0 3px; }
    .upgrade-card .udesc { font-size: 11px; color: #9fc2d9; line-height: 1.3; }
    .level-badge { color: #88ccff; }

    /* Leaderboard — right side, vertically centered */
    .leaderboard { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); z-index: 10; pointer-events: none; min-width: 190px; }
    .leaderboard-title { font-size: 10px; color: #7aa8c2; letter-spacing: 1px; text-transform: uppercase; text-align: right; margin-bottom: 5px; }
    .leaderboard-row { display: flex; align-items: center; justify-content: flex-end; gap: 7px; margin-bottom: 3px; padding: 4px 7px; background: rgba(6,16,24,0.62); border-radius: 5px; border: 1px solid rgba(42,74,98,0.5); }
    .leaderboard-row.lb-me { background: rgba(20,50,76,0.80); border-color: rgba(79,156,200,0.45); }
    .leaderboard-name { color: #d6ecff; font-size: 13px; font-weight: bold; max-width: 88px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-rank { font-size: 11px; color: #7aa8c2; min-width: 14px; text-align: right; }
    .lb-coins { color: #ffd887; font-size: 12px; }
    .lb-k { color: #7fdb8a; font-size: 12px; }
    .lb-d { color: #f59b80; font-size: 12px; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<!-- HUD -->
<div class="hud">
  <div class="hud-top">
    <div class="hud-left">
      <div class="player-count" id="playerCount">0 players</div>
      <div class="my-stats" id="myStats">
        <span class="level-badge" id="myLevel">⚓ Lv 1</span>
        <span class="doubloons" id="myDoubloons">🪙 0</span>
        <span class="kills" id="myKills">☠ 0</span>
        <span class="deaths" id="myDeaths">💀 0</span>
      </div>
    </div>
  </div>
</div>

<!-- Timer (bottom center) -->
<div class="timer" id="timer">10:00</div>
<div class="kill-feed" id="killFeed"></div>

<!-- Leaderboard (top 3, right side, mid-screen) -->
<div class="leaderboard" id="leaderboard"></div>

<!-- Scoreboard -->
<div class="scoreboard" id="scoreboard">
  <table><thead><tr>
    <th>Player</th><th>Lv</th><th>K</th><th>D</th><th>🪙</th><th>HP</th>
  </tr></thead><tbody id="scoreBody"></tbody></table>
</div>

<!-- Upgrade offer bar -->
<div class="upgrade-bar hidden" id="upgradeBar">
  <div class="upgrade-bar-title hidden" id="upgradeBarTitle"></div>
  <div class="upgrade-bar-cards">
    <div class="upgrade-card" data-idx="0"><span class="key">1</span><div class="uname" id="ug0Name"></div><div class="udesc" id="ug0Desc"></div></div>
    <div class="upgrade-card" data-idx="1"><span class="key">2</span><div class="uname" id="ug1Name"></div><div class="udesc" id="ug1Desc"></div></div>
    <div class="upgrade-card" data-idx="2"><span class="key">3</span><div class="uname" id="ug2Name"></div><div class="udesc" id="ug2Desc"></div></div>
  </div>
</div>

<!-- Chat -->
<div class="chat-panel">
  <div class="chat-log" id="chatLog"></div>
  <div class="chat-input-row">
    <input id="chatInput" type="text" placeholder="Press Enter to chat…" maxlength="200" autocomplete="off" />
    <button id="chatSend">Send</button>
  </div>
</div>

<!-- Join overlay -->
<div class="overlay" id="joinOverlay">
  <div class="join-box">
    <h1>⚓ Pirate Survivor</h1>
    <input id="nameInput" type="text" placeholder="Your name" maxlength="20" autofocus />
    <button id="joinBtn">Set Sail</button>
    <div class="status" id="connStatus">Connecting…</div>
  </div>
</div>

<div class="hint">
  <button id="sfxToggle" style="pointer-events:auto;padding:3px 8px;font-size:11px;background:#163a52;color:#e8f5ff;border:1px solid #2a4a62;border-radius:4px;cursor:pointer;margin-bottom:4px;display:block;margin-left:auto;">SFX: ON</button>
  Steer: A/D · Row: W · Brake: S · Sail: Space · Anchor: X · Click: fire cannons · 1/2/3: pick upgrade · Tab: scoreboard · Enter: chat
</div>

<script type="module">
import { generateWorld } from '/shared/world.js';
import { getHullShape, getHullSideMount, hullHalfWidthAt, getHullUpperEdge } from '/src/core/shipMath.js';
import { createMuzzleBlastParticles, createImpactDebrisParticles, createDeckBurstParticles } from '/src/systems/particleEffects.js';
import { createGameAudioSystem, normalizeOr } from '/src/systems/audioSystem.js';
import { getGunRange, getCannonRange, getVisionRange } from '/shared/shipState.js';
import { seeded01, clamp } from '/src/core/math.js';

// ─── Config ───
const WS_URL = `ws://${location.host}`;
const INTERP_BUFFER = 3; // Number of frames to buffer for interpolation

// ─── DOM ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const playerCountEl = document.getElementById('playerCount');
const myDoubloonsEl = document.getElementById('myDoubloons');
const myKillsEl = document.getElementById('myKills');
const myDeathsEl = document.getElementById('myDeaths');
const leaderboardEl = document.getElementById('leaderboard');
const killFeedEl = document.getElementById('killFeed');
const scoreboardEl = document.getElementById('scoreboard');
const scoreBodyEl = document.getElementById('scoreBody');
const chatLog = document.getElementById('chatLog');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');
const joinOverlay = document.getElementById('joinOverlay');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const connStatus = document.getElementById('connStatus');
const upgradeBar = document.getElementById('upgradeBar');
const upgradeBarTitle = document.getElementById('upgradeBarTitle');
const ugNames = [document.getElementById('ug0Name'), document.getElementById('ug1Name'), document.getElementById('ug2Name')];
const ugDescs = [document.getElementById('ug0Desc'), document.getElementById('ug1Desc'), document.getElementById('ug2Desc')];
const myLevelEl = document.getElementById('myLevel');

// ─── State ───
let ws = null;
let myId = null;
let connected = false;

// Double-buffer for interpolation
let prevState = null;
let currState = null;
let knownHeavyBullets = new Map(); // id → {x, y} — used to detect cannonball water splashes
let stateTime = 0;
const SERVER_TICK_MS = 50;
let worldData = null;       // Client-side generated world (islands from seed)
let currentSeed = null;
let pendingOffer = null;       // Active upgrade offer or null
let startingPicksRemaining = 0; // Countdown for the 3-pick starting bonus sequence

// Input
const input = { forward: false, brake: false, turnLeft: false, turnRight: false, sailOpen: true, anchored: false };
const keys = new Set();
let tabHeld = false;

// ─── Canvas ───
function resize() {
  canvas.width = Math.max(900, window.innerWidth);
  canvas.height = Math.max(540, window.innerHeight);
}
resize();
window.addEventListener('resize', resize);

// ─── WebSocket ───
function connect() {
  connStatus.textContent = 'Connecting…';
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    connected = true;
    connStatus.textContent = 'Connected! Enter your name and join.';
    joinBtn.disabled = false;
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    switch (msg.type) {
      case 'joined':
        myId = msg.id;
        if (msg.roundSeed && msg.roundSeed !== currentSeed) {
          currentSeed = msg.roundSeed;
          worldData = generateWorld(currentSeed);
          initClouds(worldData.width || 4000, worldData.height || 4000);
        }
        joinOverlay.classList.add('hidden');
        // Show starting bonus upgrade picks if the server sent them
        if (msg.startingOffer && msg.startingPicksRemaining > 0) {
          startingPicksRemaining = msg.startingPicksRemaining;
          const pickNum = 4 - startingPicksRemaining; // 1
          showUpgradeOffer(msg.startingOffer, `Starting Bonus — Pick ${pickNum} of 3`);
        }
        break;

      case 'state':
        prevState = currState;
        currState = msg;
        stateTime = performance.now();
        // ── Cannonball water-splash: detect heavy bullets that just vanished ──
        if (msg.bullets) {
          const newHeavyIds = new Set(msg.bullets.filter(b => b.heavy).map(b => b.id));
          for (const [id, pos] of knownHeavyBullets) {
            if (!newHeavyIds.has(id)) {
              // Cannonball disappeared — spawn water splash at last position
              const cnt = 10 + Math.floor(Math.random() * 6);
              for (let i = 0; i < cnt; i++) {
                const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.1;
                const spd = 0.6 + Math.random() * 2.2;
                const life = 0.5 + Math.random() * 0.7;
                particles.push({
                  x: pos.x, y: pos.y,
                  vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
                  size: 1.0 + Math.random() * 2.0,
                  rot: 0, spin: 0,
                  life, maxLife: life,
                  color: `rgba(${100 + Math.floor(Math.random()*60)},${170 + Math.floor(Math.random()*40)},${210 + Math.floor(Math.random()*45)},0.8)`,
                  sides: 4, drag: 0.94, circle: true
                });
              }
            }
          }
          knownHeavyBullets.clear();
          for (const b of msg.bullets) {
            if (b.heavy) knownHeavyBullets.set(b.id, { x: b.x, y: b.y });
          }
        }
        if (msg.roundSeed && msg.roundSeed !== currentSeed) {
          currentSeed = msg.roundSeed;
          worldData = generateWorld(currentSeed);
          initClouds(worldData.width || 4000, worldData.height || 4000);
        }
        if (msg.events) {
          for (const ev of msg.events) {
            if (ev.type === 'kill') addKillFeed(ev.killerName, ev.victimName);
            if (ev.type === 'roundReset') { addSystemMessage('New round started!'); hideUpgradeOffer(); }
            if (ev.type === 'upgradeOffer' && ev.playerId === myId) showUpgradeOffer(ev.offer);
            if (ev.type === 'explosion') {
              addExplosion(ev.x, ev.y, ev.size);
              if (audioSys) audioSys.playCannonVolleySfx(ev.x, ev.y, 0, 0, 3, ev.size || 16);
              // Full SP shard system — hull-palette debris with wind drift
              const wind = currState?.wind || { x: 0, y: 0 };
              const isBoss = (ev.size || 16) >= 28;
              const debrisPalette = [
                ev.hullColor || '#5f4630', ev.trimColor || '#d9b78d',
                '#ffcc7d', '#f38a53', '#de513f'
              ];
              const shards = isBoss ? 34 : 20;
              for (let i = 0; i < shards; i++) {
                const ang = Math.random() * Math.PI * 2;
                const spd = (0.85 + Math.random() * (isBoss ? 4.6 : 3.2)) * 0.62;
                const life = 1.6 + Math.random() * (isBoss ? 2.2 : 1.5);
                const push = 0.16 + Math.random() * 0.34;
                particles.push({
                  x: ev.x, y: ev.y,
                  vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
                  size: (1.6 + Math.random() * 4.8) * (isBoss ? 1.2 : 1),
                  rot: Math.random() * Math.PI * 2,
                  spin: (Math.random() - 0.5) * (isBoss ? 0.65 : 0.48),
                  life, maxLife: life,
                  color: debrisPalette[Math.floor(Math.random() * debrisPalette.length)],
                  sides: Math.random() < 0.55 ? 3 : 4,
                  drag: 0.982 + Math.random() * 0.01,
                  currentX: wind.x * push, currentY: wind.y * push
                });
              }
            }
            if (ev.type === 'cannonFire') {
              if (audioSys) audioSys.playCannonVolleySfx(ev.x, ev.y, ev.dx || 0, ev.dy || 0, ev.count || 1, ev.size || 16);
              particles.push(...createMuzzleBlastParticles(ev.x, ev.y, ev.dx || 0, ev.dy || 0, true));
            }
            if (ev.type === 'gunFire') {
              if (audioSys) audioSys.playGunVolleySfx(ev.x, ev.y, ev.dx || 0, ev.dy || 0, ev.count || 1, ev.size || 16);
              particles.push(...createMuzzleBlastParticles(ev.x, ev.y, ev.dx || 0, ev.dy || 0, false));
            }
            if (ev.type === 'hit') {
              const heavy = !!ev.heavy;
              particles.push(...createImpactDebrisParticles(ev.x, ev.y, ev.dx || 0, ev.dy || 0, heavy));
              particles.push(...createDeckBurstParticles(ev.x, ev.y, ev.dx || 0, ev.dy || 0, heavy));
              if (audioSys) {
                if (heavy) audioSys.playCannonImpactSfx(ev.x, ev.y, ev.dx || 0, ev.dy || 0, ev.size || 16);
                else audioSys.playGunImpactSfx(ev.x, ev.y, ev.dx || 0, ev.dy || 0, ev.size || 16);
              }
            }
            if (ev.type === 'buildingHit') {
              // Wood + stone dust puff
              const dustColors = ['#a89070', '#c4a878', '#8a7055', '#d4bc94'];
              const cnt = 8 + Math.floor(Math.random() * 6);
              for (let i = 0; i < cnt; i++) {
                const ang = Math.random() * Math.PI * 2;
                const spd = 0.4 + Math.random() * 1.4;
                const life = 0.8 + Math.random() * 0.9;
                particles.push({
                  x: ev.x + (Math.random() - 0.5) * 6,
                  y: ev.y + (Math.random() - 0.5) * 6,
                  vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
                  size: 1.2 + Math.random() * 2.4,
                  rot: Math.random() * Math.PI * 2,
                  spin: (Math.random() - 0.5) * 0.4,
                  life, maxLife: life,
                  color: dustColors[Math.floor(Math.random() * dustColors.length)],
                  sides: 4, drag: 0.975,
                  circle: Math.random() < 0.4
                });
              }
            }
          }
        }
        break;

      case 'upgradeApplied':
        if (msg.startingPicksRemaining > 0 && msg.nextOffer) {
          // Still in starting bonus sequence — show the next offer
          startingPicksRemaining = msg.startingPicksRemaining;
          const pickNum = 4 - startingPicksRemaining;
          showUpgradeOffer(msg.nextOffer, `Starting Bonus — Pick ${pickNum} of 3`);
        } else {
          hideUpgradeOffer();
        }
        break;

      case 'chat':
        appendChat(msg.name, msg.text);
        break;
    }
  };

  ws.onclose = () => {
    connected = false;
    myId = null;
    prevState = null;
    currState = null;
    connStatus.textContent = 'Disconnected. Reconnecting…';
    joinOverlay.classList.remove('hidden');
    setTimeout(connect, 2000);
  };

  ws.onerror = () => {};
}

// ─── Join ───
function doJoin() {
  if (!connected) return;
  const name = nameInput.value.trim().slice(0, 20) || 'Pirate';
  ws.send(JSON.stringify({ type: 'join', name }));
}
joinBtn.addEventListener('click', doJoin);
nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

// ─── Input ───
const KEY_MAP = {
  'w': 'forward', 'arrowup': 'forward',
  's': 'brake', 'arrowdown': 'brake',
  'a': 'turnLeft', 'arrowleft': 'turnLeft',
  'd': 'turnRight', 'arrowright': 'turnRight'
};

let chatFocused = false;
chatInput.addEventListener('focus', () => { chatFocused = true; });
chatInput.addEventListener('blur', () => { chatFocused = false; });

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();

  if (k === 'tab') { e.preventDefault(); tabHeld = true; return; }
  if (k === 'enter' && myId !== null) {
    if (chatFocused) sendChat(); else chatInput.focus();
    return;
  }
  if (chatFocused) return;
  if ((k === '1' || k === '2' || k === '3') && pendingOffer) { selectUpgrade(parseInt(k) - 1); return; }
  if (k === ' ') { e.preventDefault(); input.sailOpen = !input.sailOpen; sendInput(); return; }
  if (k === 'x') { input.anchored = !input.anchored; sendInput(); return; }
  if (KEY_MAP[k]) { keys.add(k); input[KEY_MAP[k]] = true; sendInput(); }
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'tab') { tabHeld = false; return; }
  keys.delete(k);
  if (KEY_MAP[k]) {
    const action = KEY_MAP[k];
    const still = [...keys].some(hk => KEY_MAP[hk] === action);
    if (!still) { input[action] = false; sendInput(); }
  }
});

function sendInput() {
  if (!ws || ws.readyState !== 1 || myId === null) return;
  ws.send(JSON.stringify({ type: 'input', ...input }));
}

// ─── Cannon fire (click to aim) ───
let mouseX = 0, mouseY = 0;
let autoFireEnabled = false, autoFireTimer = 0;
// ─── FPS counter ───
let _fps = 0, _fpsFrames = 0, _fpsNext = 0;
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});
canvas.addEventListener('mousedown', (e) => {
  if (!ws || ws.readyState !== 1 || myId === null || !currState) return;
  const me = currState.players[myId];
  if (!me || !me.alive) return;
  const baseZoom = 2.4;
  const bonusZoom = (me.lookoutRangeBonus || 0) * -0.003;
  const zoom = Math.max(1.3, Math.min(3.0, baseZoom + bonusZoom));
  const cam = { x: me.x - canvas.width / (2 * zoom), y: me.y - canvas.height / (2 * zoom) };
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
  const wx = sx / zoom + cam.x;
  const wy = sy / zoom + cam.y;
  const angle = Math.atan2(wy - me.y, wx - me.x);
  ws.send(JSON.stringify({ type: 'cannonFire', angle }));
});

// ─── Particle system ───
const particles = [];

function tickParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.settled) {
      p.lingerLife -= dt * 60;
      if (p.lingerLife <= 0) { particles.splice(i, 1); continue; }
      p.x += (p.currentX || 0) * 60 * dt;
      p.y += (p.currentY || 0) * 60 * dt;
      p.vx *= Math.pow(p.lingerDrag || 0.998, dt * 60);
      p.vy *= Math.pow(p.lingerDrag || 0.998, dt * 60);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      continue;
    }
    if (p.life <= 0) {
      if (p.settleToWater && !p.settled) {
        p.settled = true;
        p.vx *= 0.3;
        p.vy *= 0.3;
        p.size = p.settleSize || p.size * 0.6;
        continue;
      }
      particles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vx *= Math.pow(p.drag || 0.99, dt * 60);
    p.vy *= Math.pow(p.drag || 0.99, dt * 60);
    p.rot = (p.rot || 0) + (p.spin || 0) * dt * 60;
    if (p.currentX !== undefined) {
      p.vx += (p.currentX || 0) * dt * 60;
      p.vy += (p.currentY || 0) * dt * 60;
    }
    if (p.peakSize !== undefined) {
      const lifeT = 1 - p.life / p.maxLife;
      if (lifeT < 0.15) p.size = p.baseSize + (p.peakSize - p.baseSize) * (lifeT / 0.15);
      else p.size = p.peakSize + ((p.settleSize || p.baseSize * 0.6) - p.peakSize) * ((lifeT - 0.15) / 0.85);
    }
  }
}

function polygonPath(sides, r) {
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
}

function drawParticles(cam, zoom, pass) {
  for (const p of particles) {
    const isWake = !!p.wake;
    if (pass === 'below' && !isWake) continue;
    if (pass === 'above' && isWake) continue;
    const sx = (p.x - cam.x) * zoom;
    const sy = (p.y - cam.y) * zoom;
    if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) continue;
    const lifeT = p.settled ? 1 : Math.max(0, p.life / (p.maxLife || 1));
    const fade = p.settled ? Math.min(1, (p.lingerLife || 0) / 30) : lifeT;
    const r = Math.max(0.5, (p.size || 2) * zoom);
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(p.rot || 0);
    ctx.globalAlpha = fade * (p.wake ? 0.2 : 0.65);
    ctx.fillStyle = p.color || '#888';
    if (p.circle || p.wake) {
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      polygonPath(p.sides || 4, r);
      ctx.fill();
    }
    ctx.restore();
  }
}

function spawnWakeParticles(ship) {
  if (!ship.alive || (ship.speed || 0) < 0.2) return;
  const shape = getHullShape(ship);
  const fwd = { x: Math.cos(ship.heading), y: Math.sin(ship.heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const spread = (Math.random() - 0.5) * shape.sternHalfBeam * 0.8;
  const sx = ship.x + fwd.x * shape.sternX + right.x * spread;
  const sy = ship.y + fwd.y * shape.sternX + right.y * spread;
  particles.push({
    x: sx, y: sy,
    vx: -fwd.x * ship.speed * 0.25 + (Math.random() - 0.5) * 0.12,
    vy: -fwd.y * ship.speed * 0.25 + (Math.random() - 0.5) * 0.12,
    size: 1.2 + Math.random() * 1.8, life: 1.5 + Math.random() * 1.5, maxLife: 3,
    color: '#4a8aaf', circle: true, wake: true, drag: 0.97, rot: 0, spin: 0
  });
}

function spawnFireParticles(ship) {
  if (!ship.alive || !ship.onFire) return;
  const shape = getHullShape(ship);
  const fwd = { x: Math.cos(ship.heading), y: Math.sin(ship.heading) };
  const right = { x: -fwd.y, y: fwd.x };
  const deckLen = shape.shoulderX - shape.sternShoulderX;
  const rx = shape.sternShoulderX + Math.random() * deckLen;
  const hw = hullHalfWidthAt(shape, rx);
  const ry = (Math.random() - 0.5) * hw * 1.4;
  const wx = ship.x + fwd.x * rx + right.x * ry;
  const wy = ship.y + fwd.y * rx + right.y * ry;
  const colors = ['#ffcc00', '#ff9933', '#ff5500', '#cc3300'];
  particles.push({
    x: wx, y: wy,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    size: 0.8 + Math.random() * 1.2, life: 0.25 + Math.random() * 0.35, maxLife: 0.6,
    color: colors[Math.floor(Math.random() * colors.length)],
    circle: true, drag: 0.96, rot: 0, spin: 0
  });
}

// ─── Fog of war + procedural cloud mask ───
// Ported from SP drawVisionCloudMask. Uses evenodd fill so game pixels are
// never erased — only the fog overlay itself is shaped.
function drawFogLayer(me, cam, zoom, time) {
  const visionPx = getVisionRange(me) * zoom;
  const sp = toScreen(me.x, me.y, cam, zoom);

  // ── Hard fog ring — evenodd punch-out (never touches drawn game content) ──
  const baseRadius = Math.max(140, visionPx * 0.98);
  const dissolveOuter = baseRadius * 1.18;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, canvas.height);
  ctx.arc(sp.x, sp.y, dissolveOuter, 0, Math.PI * 2, true); // CCW = hole
  ctx.fillStyle = 'rgba(4,12,20,0.82)';
  ctx.fill('evenodd');

  // Soft gradient at vision edge
  const edgeGrad = ctx.createRadialGradient(sp.x, sp.y, baseRadius * 0.85, sp.x, sp.y, dissolveOuter);
  edgeGrad.addColorStop(0, 'rgba(4,12,20,0)');
  edgeGrad.addColorStop(1, 'rgba(4,12,20,0.82)');
  ctx.beginPath();
  ctx.arc(sp.x, sp.y, dissolveOuter, 0, Math.PI * 2);
  ctx.fillStyle = edgeGrad;
  ctx.fill();
  ctx.restore();

  // ── Procedural tiled cloud blobs — dissolve at vision edge ──
  const dissolveBand = Math.max(90, visionPx * 0.28);

  const fieldRadiusAt = (angle) => {
    const wobbleA = Math.sin(angle * 3 + time * 0.19) * 0.08;
    const wobbleB = Math.sin(angle * 5 - time * 0.27) * 0.05;
    const wobbleC = Math.sin(angle * 8 + time * 0.11) * 0.03;
    return baseRadius * (1 + wobbleA + wobbleB + wobbleC);
  };

  const cloudOutsideFactor = (px, py) => {
    const dx = px - sp.x;
    const dy = py - sp.y;
    const dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx);
    const edge = fieldRadiusAt(angle);
    return clamp((dist - edge) / dissolveBand, 0, 1);
  };

  const drawFogCloudBlob = (x, y, scale, alphaBase) => {
    const w = 154 * scale;
    const h = 52 * scale;
    ctx.fillStyle = `rgba(198,216,231,${(alphaBase * 0.78).toFixed(3)})`;
    ctx.fillRect(x, y, w, h);
    ctx.fillRect(x + w * 0.18, y - h * 0.34, w * 0.64, h * 0.46);
    ctx.fillRect(x + w * 0.14, y + h * 0.6, w * 0.52, h * 0.32);
    ctx.fillStyle = `rgba(156,178,197,${(alphaBase * 0.68).toFixed(3)})`;
    ctx.fillRect(x + w * 0.06, y + h * 0.18, w * 0.88, h * 0.52);
    ctx.fillStyle = `rgba(108,132,154,${(alphaBase * 0.58).toFixed(3)})`;
    ctx.fillRect(x + w * 0.24, y - h * 0.06, w * 0.46, h * 0.72);
  };

  const layers = [
    { sx: 154, sy: 104, ox: 0,  oy: 0,  scale: 1.22, driftMul: 1,    alphaMul: 1    },
    { sx: 148, sy: 98,  ox: 58, oy: 30, scale: 1.14, driftMul: 0.8,  alphaMul: 0.92 },
    { sx: 142, sy: 94,  ox: 28, oy: 58, scale: 1.08, driftMul: 1.24, alphaMul: 0.86 },
    { sx: 136, sy: 90,  ox: 74, oy: 14, scale: 1.02, driftMul: 0.66, alphaMul: 0.82 }
  ];

  const wind = currState?.wind || { x: 0, y: 0 };
  for (let l = 0; l < layers.length; l++) {
    const layer = layers[l];
    const driftX = (time * (11 + l * 1.6) + wind.x * 110 * layer.driftMul) % layer.sx;
    const driftY = (time * (7  + l * 1.2) + wind.y * 90  * layer.driftMul) % layer.sy;

    for (let y = -220; y < canvas.height + 220; y += layer.sy) {
      for (let x = -280; x < canvas.width + 280; x += layer.sx) {
        const cellX = Math.floor((x + 5000) / layer.sx);
        const cellY = Math.floor((y + 5000) / layer.sy);
        const seed  = cellX * 17.13 + cellY * 31.79 + l * 91.37;
        const r1 = seeded01(seed + 0.11);
        const r2 = seeded01(seed + 0.29);
        const r3 = seeded01(seed + 0.47);
        const r4 = seeded01(seed + 0.63);
        const r5 = seeded01(seed + 0.83);

        const jitterX     = (r1 * 2 - 1) * 26;
        const jitterY     = (r2 * 2 - 1) * 20;
        const scaleJitter = 0.86 + r3 * 0.42;
        const alphaJitter = 0.7  + r4 * 0.56;

        const baseX = x + driftX + layer.ox + jitterX;
        const baseY = y + driftY + layer.oy + jitterY;

        // probe center of blob to decide visibility
        const probeX = baseX + 94 * layer.scale;
        const probeY = baseY + 32 * layer.scale;
        const outside = cloudOutsideFactor(probeX, probeY);
        if (outside <= 0.01) continue;

        const alpha     = (0.2 + Math.pow(outside, 0.74) * 0.72) * layer.alphaMul * alphaJitter;
        const mainScale = layer.scale * scaleJitter;
        drawFogCloudBlob(baseX, baseY, mainScale, alpha);

        if (r5 > 0.34) {
          const subX = baseX + (r2 * 2 - 1) * 34;
          const subY = baseY + (r1 * 2 - 1) * 26;
          drawFogCloudBlob(subX, subY, mainScale * (0.72 + r4 * 0.28), alpha * 0.78);
        }
      }
    }
  }

  // Subtle ambient dark tint over whole screen
  ctx.fillStyle = 'rgba(9,15,22,0.22)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ─── Interpolation helper ───
function lerp(a, b, t) { return a + (b - a) * t; }

function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

function interpShip(currColl, prevColl, id) {
  if (!currColl || !currColl[id]) return null;
  const curr = currColl[id];
  if (!prevColl || !prevColl[id]) return curr;
  const prev = prevColl[id];
  const elapsed = performance.now() - stateTime;
  const t = Math.min(1.4, elapsed / SERVER_TICK_MS);
  return {
    ...curr,
    x: lerp(prev.x, curr.x, t),
    y: lerp(prev.y, curr.y, t),
    heading: lerpAngle(prev.heading, curr.heading, t),
    speed: lerp(prev.speed, curr.speed, t)
  };
}
function getInterpolatedPlayer(id) { return interpShip(currState?.players, prevState?.players, id); }
function getInterpolatedNpc(id) { return interpShip(currState?.npcs, prevState?.npcs, id); }

// ─── Rendering ───
function toScreen(wx, wy, cam, zoom) {
  return { x: (wx - cam.x) * zoom, y: (wy - cam.y) * zoom };
}

// ─── Island rendering ───
function drawIslands(cam, zoom, buildingState) {
  if (!worldData) return;
  const buildingById = {};
  if (buildingState && buildingState.buildings) {
    for (const b of buildingState.buildings) buildingById[b.id] = b;
  }
  for (const island of worldData.islands) {
    const outline = island.outline;
    if (!outline || outline.length < 3) continue;
    // Screen-space cull
    const ip = toScreen(island.x, island.y, cam, zoom);
    const screenR = island.radius * zoom * 1.3;
    if (ip.x + screenR < 0 || ip.x - screenR > canvas.width || ip.y + screenR < 0 || ip.y - screenR > canvas.height) continue;

    // Land mass polygon
    ctx.beginPath();
    const p0 = toScreen(outline[0].x, outline[0].y, cam, zoom);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < outline.length; i++) {
      const pi = toScreen(outline[i].x, outline[i].y, cam, zoom);
      ctx.lineTo(pi.x, pi.y);
    }
    ctx.closePath();
    ctx.fillStyle = '#3a6b35';
    ctx.fill();
    ctx.strokeStyle = '#c9b988';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Beach glow
    ctx.strokeStyle = 'rgba(210,195,150,0.25)';
    ctx.lineWidth = 5;
    ctx.stroke();

    // Foliage (multi-blob canopy)
    for (const f of island.foliageSeeds) {
      const fp = toScreen(f.x, f.y, cam, zoom);
      const r = f.size * zoom * 0.45;
      const baseCol = f.type === 'tree' ? '#2d5a27' : '#4a7a42';
      const darkCol = f.type === 'tree' ? '#1e4a1a' : '#3a6a34';
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(fp.x + r * 0.15, fp.y + r * 0.15, r * 1.05, r * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      // Multi-blob canopy
      const seed = (f.x * 7.3 + f.y * 13.1) % 100;
      for (let b = 0; b < 3; b++) {
        const bx = fp.x + Math.cos(seed + b * 2.2) * r * 0.28;
        const by = fp.y + Math.sin(seed + b * 1.8) * r * 0.22;
        const br = r * (0.65 + (((seed + b * 17) % 10) / 10) * 0.35);
        ctx.fillStyle = b === 0 ? darkCol : baseCol;
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Docks
    for (const dock of island.docks) {
      const dp = toScreen(dock.x, dock.y, cam, zoom);
      const dLen = dock.length * zoom * 0.6;
      ctx.save();
      ctx.translate(dp.x, dp.y);
      ctx.rotate(dock.angle);
      ctx.fillStyle = '#7a5f3a';
      ctx.fillRect(0, -2.5 * zoom * 0.35, dLen, 5 * zoom * 0.35);
      ctx.strokeStyle = '#5a4a2a';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(0, -2.5 * zoom * 0.35, dLen, 5 * zoom * 0.35);
      ctx.restore();
    }

    // Buildings
    for (const b of island.buildings) {
      const bs = buildingById[b.id];
      const destroyed = bs ? bs.destroyed : false;
      const isTower = bs ? bs.isTower : false;
      const bp = toScreen(b.x, b.y, cam, zoom);
      const bHalf = b.size * zoom * 0.3;
      if (destroyed) {
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = '#5a4a30';
        ctx.fillRect(bp.x - bHalf, bp.y - bHalf, bHalf * 2, bHalf * 2);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = isTower ? '#8a4a3a' : '#6a5a4a';
        ctx.fillRect(bp.x - bHalf, bp.y - bHalf, bHalf * 2, bHalf * 2);
        ctx.strokeStyle = isTower ? '#cc6644' : '#9a8a72';
        ctx.lineWidth = 1;
        ctx.strokeRect(bp.x - bHalf, bp.y - bHalf, bHalf * 2, bHalf * 2);
        // Roof
        ctx.fillStyle = isTower ? '#aa5a4a' : '#8a7a6a';
        ctx.beginPath();
        ctx.moveTo(bp.x - bHalf - 1, bp.y - bHalf);
        ctx.lineTo(bp.x, bp.y - bHalf - bHalf * 0.55);
        ctx.lineTo(bp.x + bHalf + 1, bp.y - bHalf);
        ctx.closePath();
        ctx.fill();
        // Windows
        if (bHalf > 3.5) {
          ctx.fillStyle = 'rgba(180,200,220,0.3)';
          const wS = Math.max(1, bHalf * 0.22);
          ctx.fillRect(bp.x - bHalf * 0.45 - wS/2, bp.y - wS/2, wS, wS);
          ctx.fillRect(bp.x + bHalf * 0.45 - wS/2, bp.y - wS/2, wS, wS);
        }
        // Door
        ctx.fillStyle = 'rgba(50,35,20,0.45)';
        const dW = bHalf * 0.28;
        const dH = bHalf * 0.45;
        ctx.fillRect(bp.x - dW/2, bp.y + bHalf - dH, dW, dH);
        if (isTower) {
          ctx.fillStyle = '#ff6644';
          ctx.beginPath();
          ctx.arc(bp.x, bp.y - bHalf - 4, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
        if (bs && bs.hp < bs.maxHp) {
          const hpR = Math.max(0, bs.hp / bs.maxHp);
          const bw = bHalf * 2.4;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(bp.x - bw / 2, bp.y + bHalf + 2, bw, 3);
          ctx.fillStyle = hpR > 0.5 ? '#4caf50' : '#ff9800';
          ctx.fillRect(bp.x - bw / 2, bp.y + bHalf + 2, bw * hpR, 3);
        }
      }
    }
  }
}

// ─── Explosion rendering ───
function drawExplosions(cam, zoom, dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.t += dt;
    if (ex.t > 0.7) { explosions.splice(i, 1); continue; }
    const sp = toScreen(ex.x, ex.y, cam, zoom);
    const progress = ex.t / 0.7;
    // Core fireball
    const r = ex.size * zoom * (0.4 + progress * 1.2);
    ctx.globalAlpha = Math.max(0, 1 - progress * 1.3);
    ctx.fillStyle = progress < 0.2 ? '#fff8cc' : progress < 0.4 ? '#ffcc00' : '#ff6600';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
    ctx.fill();
    // Shockwave ring
    if (progress > 0.1 && progress < 0.6) {
      const ringR = ex.size * zoom * (0.6 + progress * 2.2);
      ctx.globalAlpha = Math.max(0, 0.4 - progress * 0.7);
      ctx.strokeStyle = '#ffaa33';
      ctx.lineWidth = Math.max(1, zoom * 1.5 * (1 - progress));
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, ringR, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!currState || myId === null) return;

  const st = currState;
  const me = getInterpolatedPlayer(myId);
  if (!me) return;

  const dt = 1 / 60;
  const time = performance.now() / 1000;

  // Dynamic zoom (zoom out as lookout range increases)
  const baseZoom = 2.4;
  const bonusZoom = (me.lookoutRangeBonus || 0) * -0.003;
  const zoom = Math.max(1.3, Math.min(3.0, baseZoom + bonusZoom));
  const cam = {
    x: me.x - canvas.width / (2 * zoom),
    y: me.y - canvas.height / (2 * zoom)
  };

  // Tick particles
  tickParticles(dt);

  // Spawn wake + fire particles for all visible ships
  const allShips = [];
  for (const id of Object.keys(st.players)) {
    const p = getInterpolatedPlayer(parseInt(id));
    if (p && p.alive) { allShips.push(p); if (Math.random() < (p.speed || 0) * dt * 8) spawnWakeParticles(p); if (p.onFire && Math.random() < dt * 18) spawnFireParticles(p); }
  }
  if (st.npcs) {
    for (const id of Object.keys(st.npcs)) {
      const p = getInterpolatedNpc(parseInt(id));
      if (p && p.alive) { allShips.push(p); if (Math.random() < (p.speed || 0) * dt * 8) spawnWakeParticles(p); if (p.onFire && Math.random() < dt * 18) spawnFireParticles(p); }
    }
  }

  // Cap particles
  while (particles.length > 600) particles.shift();

  // Water grid
  drawWaterGrid(cam, zoom);

  // Wake particles (below ships)
  drawParticles(cam, zoom, 'below');

  // World boundary
  const tl = toScreen(0, 0, cam, zoom);
  const br = toScreen(st.world.width, st.world.height, cam, zoom);
  ctx.strokeStyle = 'rgba(80,140,180,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

  // Islands
  drawIslands(cam, zoom, st.worldBuildings);

  // Doubloon drops
  if (st.drops) {
    for (const d of st.drops) {
      const dp = toScreen(d.x, d.y, cam, zoom);
      const spin = Math.cos(st.time * 7 + d.x * 0.03 + d.y * 0.04);
      const rx = Math.max(1.5, 4 * Math.abs(spin) * zoom);
      const ry = 4 * zoom;
      ctx.fillStyle = '#ffd44f';
      ctx.beginPath();
      ctx.ellipse(dp.x, dp.y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#c9a030';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  }

  // Player ships
  for (const id of Object.keys(st.players)) {
    const nid = parseInt(id);
    const p = getInterpolatedPlayer(nid);
    if (!p || !p.alive) continue;
    const isMe = (nid === myId);
    const sp = toScreen(p.x, p.y, cam, zoom);
    drawShipAt(sp.x, sp.y, p, zoom, isMe);
  }

  // NPC ships
  if (st.npcs) {
    for (const id of Object.keys(st.npcs)) {
      const p = getInterpolatedNpc(parseInt(id));
      if (!p || !p.alive) continue;
      const sp = toScreen(p.x, p.y, cam, zoom);
      drawShipAt(sp.x, sp.y, p, zoom, false);
    }
  }

  // Bullets
  if (st.bullets) {
    for (const b of st.bullets) {
      const bp = toScreen(b.x, b.y, cam, zoom);
      if (b.heavy) {
        // Cannonball — black circle with slight sheen
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, 3.4 * zoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.beginPath();
        ctx.arc(bp.x - 0.8 * zoom, bp.y - 0.8 * zoom, 1.1 * zoom, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Musket ball — tiny silver circle, 10% the radius of a cannonball
        const r = Math.max(1, 0.34 * zoom);
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
        ctx.fillStyle = '#c8ccd0';
        ctx.fill();
        if (r > 1.2) {
          ctx.beginPath();
          ctx.arc(bp.x - r * 0.3, bp.y - r * 0.3, r * 0.35, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.fill();
        }
      }
    }
  }

  // Non-wake particles (above ships)
  drawParticles(cam, zoom, 'above');

  // Explosions
  drawExplosions(cam, zoom, dt);

  // Fog of war + procedural cloud mask
  drawFogLayer(me, cam, zoom, time);

  // Range rings (own ship)
  if (me && me.alive) {
    const sp = toScreen(me.x, me.y, cam, zoom);
    const gunR = getGunRange(me) * zoom;
    const cannonR = getCannonRange(me) * zoom;

    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(136,204,255,0.14)';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, gunR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,170,68,0.14)';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, cannonR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Wind compass
  drawWindCompass(st.wind);

  // HUD
  updateHud(st);

  // Aim line + crosshair
  if (me && me.alive) {
    const sp = toScreen(me.x, me.y, cam, zoom);
    ctx.strokeStyle = 'rgba(255,216,135,0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y);
    ctx.lineTo(mouseX, mouseY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,216,135,0.45)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mouseX - 10, mouseY); ctx.lineTo(mouseX + 10, mouseY);
    ctx.moveTo(mouseX, mouseY - 10); ctx.lineTo(mouseX, mouseY + 10);
    ctx.stroke();
  }

  // Auto-fire tick
  if (autoFireEnabled && me.alive && ws && ws.readyState === 1) {
    autoFireTimer += dt;
    const autoReload = 3.5;
    if (autoFireTimer >= autoReload) {
      let bestDist = Infinity, bestAngle = 0, gotTarget = false;
      const checkTarget = (p) => {
        if (!p || !p.alive || p.id === myId) return;
        const dx = p.x - me.x, dy = p.y - me.y;
        const d = Math.hypot(dx, dy);
        if (d < bestDist) { bestDist = d; bestAngle = Math.atan2(dy, dx); gotTarget = true; }
      };
      for (const id of Object.keys(st.players)) checkTarget(st.players[id]);
      if (st.npcs) for (const id of Object.keys(st.npcs)) checkTarget(st.npcs[id]);
      if (gotTarget) {
        ws.send(JSON.stringify({ type: 'cannonFire', angle: bestAngle }));
        autoFireTimer = 0;
      }
    }
  }

  // FPS counter + auto-fire badge
  ctx.save();
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(6, 6, 104, 36);
  ctx.fillStyle = '#a8d8a8';
  ctx.fillText(`${_fps} FPS`, 10, 20);
  ctx.fillStyle = autoFireEnabled ? '#ffcc44' : '#6a8898';
  ctx.fillText(`[F] ${autoFireEnabled ? 'AUTO FIRE ●' : 'manual fire'}`, 10, 34);
  ctx.restore();

  // Scoreboard
  if (tabHeld) {
    scoreboardEl.classList.add('visible');
    updateScoreboard(st);
  } else {
    scoreboardEl.classList.remove('visible');
  }
}

function drawWaterGrid(cam, zoom) {
  const tileSize = 64;
  const startTX = Math.floor(cam.x / tileSize);
  const startTY = Math.floor(cam.y / tileSize);
  const endTX = Math.ceil((cam.x + canvas.width / zoom) / tileSize);
  const endTY = Math.ceil((cam.y + canvas.height / zoom) / tileSize);
  const time = performance.now() / 1000;

  for (let tx = startTX; tx <= endTX; tx++) {
    for (let ty = startTY; ty <= endTY; ty++) {
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const sx = (wx - cam.x) * zoom;
      const sy = (wy - cam.y) * zoom;
      const sw = tileSize * zoom + 1;
      const sh = tileSize * zoom + 1;
      const even = (tx + ty) % 2 === 0;
      ctx.fillStyle = even ? '#164c70' : '#1a5880';
      ctx.fillRect(sx, sy, sw, sh);
      const wavePh = Math.sin(time * 1.1 + tx * 0.7 + ty * 0.5);
      if (wavePh > 0.35) {
        ctx.globalAlpha = (wavePh - 0.35) * 0.07;
        ctx.fillStyle = '#5090c0';
        ctx.fillRect(sx, sy, sw, sh);
        ctx.globalAlpha = 1;
      }
    }
  }

  ctx.strokeStyle = 'rgba(40,90,130,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let tx = startTX; tx <= endTX + 1; tx++) {
    const sx = (tx * tileSize - cam.x) * zoom;
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, canvas.height);
  }
  for (let ty = startTY; ty <= endTY + 1; ty++) {
    const sy = (ty * tileSize - cam.y) * zoom;
    ctx.moveTo(0, sy);
    ctx.lineTo(canvas.width, sy);
  }
  ctx.stroke();
}

function drawHullPolygon(shape, z) {
  ctx.beginPath();
  ctx.moveTo(shape.bowX * z, 0);
  ctx.lineTo(shape.shoulderX * z, -shape.shoulderHalfBeam * z);
  ctx.lineTo(shape.sternShoulderX * z, -shape.sternHalfBeam * z);
  ctx.lineTo(shape.sternX * z, 0);
  ctx.lineTo(shape.sternShoulderX * z, shape.sternHalfBeam * z);
  ctx.lineTo(shape.shoulderX * z, shape.shoulderHalfBeam * z);
  ctx.closePath();
}

function drawShipAt(sx, sy, p, zoom, isMe) {
  const size = p.size || 16;
  const heading = p.heading || 0;
  const shape = getHullShape(p);
  const z = zoom;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(heading);

  // Invulnerability glow
  if (p.invuln) {
    ctx.globalAlpha = 0.3 + Math.sin(performance.now() * 0.008) * 0.15;
    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.arc(0, 0, shape.len * z * 1.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Ram bow — dark steel triangle, drawn BEFORE hull so the base is buried inside (only tip protrudes)
  // ~20% of total ship visual length, tip sticks past the bow, body embedded in hull
  if (p.ram) {
    const rLen = shape.len * 0.45 * z;   // ~20% of total visual ship length
    const halfW = rLen * 0.36;            // width of base
    const tipX   =  shape.bowX * z + rLen * 0.35;  // tip: protrudes forward of bow
    const baseX  =  shape.bowX * z - rLen * 0.65;  // base: inside hull, will be covered
    ctx.fillStyle = '#38383f';
    ctx.beginPath();
    ctx.moveTo(tipX, 0);
    ctx.lineTo(baseX, -halfW);
    ctx.lineTo(baseX,  halfW);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#888896';
    ctx.lineWidth = Math.max(0.5, z * 0.5);
    ctx.stroke();
  }

  // Hull fill
  drawHullPolygon(shape, z);
  ctx.fillStyle = p.hullColor || '#5f4630';
  ctx.fill();

  // Trim stroke
  ctx.strokeStyle = p.trimColor || '#d9b78d';
  ctx.lineWidth = Math.max(2, z * 1.8);
  ctx.stroke();

  // Armor plate lines
  if ((p.hullArmorTier || 0) > 0) {
    const plateCount = 3 + p.hullArmorTier;
    const deckLen = shape.shoulderX - shape.sternShoulderX;
    ctx.strokeStyle = 'rgba(160,150,130,0.35)';
    ctx.lineWidth = Math.max(0.5, z * 0.4);
    for (let i = 0; i < plateCount; i++) {
      const t = (i + 0.5) / plateCount;
      const lx = shape.sternShoulderX + deckLen * t;
      const hw = hullHalfWidthAt(shape, lx);
      ctx.beginPath();
      ctx.moveTo(lx * z, -hw * z);
      ctx.lineTo(lx * z, hw * z);
      ctx.stroke();
    }
  }

  // Ram bow — lighter top cap drawn over hull, only the protruding tip portion
  if (p.ram) {
    const rLen = shape.len * 0.45 * z;
    const halfW = rLen * 0.22;
    const tipX   = shape.bowX * z + rLen * 0.35;
    const baseX  = shape.bowX * z;            // exposed part starts at bow edge
    ctx.fillStyle = '#7a7a86';
    ctx.beginPath();
    ctx.moveTo(tipX, 0);
    ctx.lineTo(baseX, -halfW);
    ctx.lineTo(baseX,  halfW);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#aaaabc';
    ctx.lineWidth = Math.max(0.5, z * 0.6);
    ctx.stroke();
  }

  // Weapon mounts
  const layout = p.weaponLayout || { port: [], starboard: [] };
  for (const [side, slots] of [['port', layout.port], ['starboard', layout.starboard]]) {
    if (!slots || !slots.length) continue;
    const sideSign = side === 'starboard' ? 1 : -1;
    for (let i = 0; i < slots.length; i++) {
      const type = slots[i];
      if (type === 'empty') continue;
      const mount = getHullSideMount(shape, i, slots.length, sideSign);
      const mx = mount.x * z;
      const my = mount.y * z;
      const angle = Math.atan2(mount.ny, mount.nx);
      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(angle);
      if (type === 'cannon') {
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(0, -1.2 * z, 11.0 * z, 2.4 * z);
        ctx.strokeStyle = '#4a4a4a';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(0, -1.2 * z, 11.0 * z, 2.4 * z);
      } else if (type === 'gun') {
        ctx.fillStyle = '#b8c0c8';
        ctx.fillRect(0, -0.8 * z, 7.2 * z, 1.6 * z);
        ctx.strokeStyle = '#8898a8';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(0, -0.8 * z, 7.2 * z, 1.6 * z);
      }
      ctx.restore();
    }
  }

  // Square sail — thin horizontal rectangle, rotates to always face the wind
  if (p.sailOpen && currState && currState.wind) {
    const wind = currState.wind;
    const mastPosX = ((shape.sternShoulderX + shape.shoulderX) * 0.5) * z;
    // Wind direction relative to ship heading → yard angle (perpendicular to wind = broad face catches wind)
    const windAngle = Math.atan2(wind.y, wind.x);
    const yardAngle = windAngle - p.heading + Math.PI / 2;
    const sailW = size * 2.0 * z;   // wider than hull beam
    const sailH = Math.max(2.5, z * 2.5); // thin flat rectangle
    ctx.save();
    ctx.translate(mastPosX, 0);
    ctx.rotate(yardAngle);
    ctx.fillStyle = p.sailColor || '#f0f7ff';
    ctx.globalAlpha = 0.88;
    ctx.fillRect(-sailW / 2, -sailH / 2, sailW, sailH);
    ctx.strokeStyle = 'rgba(130,150,170,0.5)';
    ctx.lineWidth = Math.max(0.5, z * 0.4);
    ctx.strokeRect(-sailW / 2, -sailH / 2, sailW, sailH);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Mast
  const mastX = ((shape.sternShoulderX + shape.shoulderX) * 0.5) * z;
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.arc(mastX, 0, Math.max(1.5, z * 1.2), 0, Math.PI * 2);
  ctx.fill();

  // Fire overlay
  if (p.onFire) {
    drawHullPolygon(shape, z);
    ctx.globalAlpha = 0.28 + Math.sin(performance.now() * 0.012) * 0.1;
    ctx.fillStyle = '#ff6a00';
    ctx.fill();
    ctx.globalAlpha = 1;
    const now = performance.now();
    const deckLen = shape.shoulderX - shape.sternShoulderX;
    for (let f = 0; f < 6; f++) {
      const phase = now * 0.005 + f * 1.3;
      const fxLocal = shape.sternShoulderX + deckLen * (0.15 + Math.abs(Math.sin(phase * 0.7)) * 0.65);
      const hw = hullHalfWidthAt(shape, fxLocal);
      const fy = Math.sin(phase * 1.1) * hw * 0.7;
      const fr = (1.4 + Math.sin(phase * 2.3) * 0.9) * z * 0.5;
      ctx.fillStyle = ['#ffcc00', '#ff9933', '#ff5500'][f % 3];
      ctx.globalAlpha = 0.45 + Math.sin(phase * 3) * 0.2;
      ctx.beginPath();
      ctx.arc(fxLocal * z, fy * z, fr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Deck damage marks
  const hpRatio = Math.max(0, (p.hp || 0) / (p.maxHp || 20));
  if (hpRatio < 0.8) {
    const markCount = Math.ceil((1 - hpRatio) * 5);
    const seed = (p.id || 0) * 137;
    const deckLen = shape.shoulderX - shape.sternShoulderX;
    ctx.fillStyle = 'rgba(30,20,10,0.3)';
    for (let i = 0; i < markCount; i++) {
      const s = ((seed + i * 41) % 997) / 997;
      const s2 = ((seed + i * 73 + 17) % 991) / 991;
      const dx = shape.sternShoulderX + deckLen * (0.15 + s * 0.7);
      const hw = hullHalfWidthAt(shape, dx);
      const dy = (s2 - 0.5) * hw * 1.2;
      const mr = (1.0 + s * 1.4) * z * 0.4;
      ctx.beginPath();
      ctx.arc(dx * z, dy * z, mr, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // NPC flag / pennant
  if (p.isNpc && p.flagColor) {
    const fmx = mastX;
    const fH = size * 0.6 * z;
    const fW = size * 0.4 * z;
    ctx.fillStyle = p.flagColor;
    ctx.beginPath();
    ctx.moveTo(fmx, -fH * 0.15);
    ctx.lineTo(fmx + fW, -fH * 0.3);
    ctx.lineTo(fmx + fW * 0.7, -fH * 0.15);
    ctx.lineTo(fmx + fW, 0);
    ctx.closePath();
    ctx.fill();
    if (p.flagAccent) {
      ctx.strokeStyle = p.flagAccent;
      ctx.lineWidth = Math.max(0.5, z * 0.4);
      ctx.stroke();
    }
    if ((p.flagStripes || 0) >= 1) {
      ctx.strokeStyle = p.flagAccent || '#fff';
      ctx.lineWidth = Math.max(0.4, z * 0.3);
      ctx.beginPath();
      ctx.moveTo(fmx + fW * 0.15, -fH * 0.15);
      ctx.lineTo(fmx + fW * 0.85, -fH * 0.15);
      ctx.stroke();
    }
  }

  ctx.restore();

  // HP bar (above ship)
  const barWidth = shape.len * z * 2;
  const barHeight = 4 * (z / 2);
  const barX = sx - barWidth / 2;
  const barY = sy - shape.len * z - 16;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX, barY, barWidth, barHeight);
  ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';
  ctx.fillRect(barX, barY, barWidth * hpRatio, barHeight);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(barX, barY, barWidth, barHeight);

  // Reload bars (own ship only)
  if (isMe) {
    const reloadY = barY + barHeight + 2;
    const halfW = barWidth / 2 - 1;
    const gunProg = 1 - Math.max(0, Math.min(1, (p.gunTimer || 0) / (p.gunReload || 1)));
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX, reloadY, halfW, 2);
    ctx.fillStyle = gunProg >= 1 ? '#88ccff' : '#4488aa';
    ctx.fillRect(barX, reloadY, halfW * gunProg, 2);
    const canProg = 1 - Math.max(0, Math.min(1, (p.cannonTimer || 0) / (p.cannonReload || 1)));
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX + halfW + 2, reloadY, halfW, 2);
    ctx.fillStyle = canProg >= 1 ? '#ffaa44' : '#aa7733';
    ctx.fillRect(barX + halfW + 2, reloadY, halfW * canProg, 2);
  }

  // Name + doubloons
  ctx.fillStyle = isMe ? '#ffd887' : '#a8d0e6';
  ctx.font = `${Math.max(11, 12 * (z / 2))}px system-ui`;
  ctx.textAlign = 'center';
  const label = (p.name || '???') + (p.doubloons > 0 ? ` 🪙${p.doubloons}` : '');
  ctx.fillText(label, sx, barY - 3);

  // Own ship indicator ring
  if (isMe) {
    ctx.strokeStyle = 'rgba(255,216,135,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(sx, sy, shape.len * z + 4, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawWindCompass(wind) {
  const cx = canvas.width - 56;
  const cy = 60;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = 'rgba(160,200,230,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.stroke();

  const mag = Math.hypot(wind.x, wind.y) || 1;
  const ax = (wind.x / mag) * 16;
  const ay = (wind.y / mag) * 16;
  ctx.strokeStyle = '#d6ecff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(ax, ay);
  ctx.stroke();
  ctx.fillStyle = '#d6ecff';
  ctx.fillRect(ax - 2, ay - 2, 4, 4);
  ctx.restore();
}

function updateHud(st) {
  const secs = Math.max(0, Math.ceil(st.roundTimer));
  const mm = String(Math.floor(secs / 60)).padStart(2, '0');
  const ss = String(secs % 60).padStart(2, '0');
  timerEl.textContent = `${mm}:${ss}`;

  const count = Object.keys(st.players).length;
  playerCountEl.textContent = `${count} player${count !== 1 ? 's' : ''}`;

  const me = st.players[myId];
  if (me) {
    myLevelEl.textContent = `⚓ Lv ${me.level || 1}`;
    myDoubloonsEl.textContent = `🪙 ${me.doubloons}`;
    myKillsEl.textContent = `☠ ${me.kills}`;
    myDeathsEl.textContent = `💀 ${me.deaths}`;
  }

  // ── Leaderboard: top 3 players by doubloons ──
  const rows = Object.entries(st.players)
    .sort(([, a], [, b]) => b.doubloons - a.doubloons)
    .slice(0, 3);
  const rankSymbol = ['🥇', '🥈', '🥉'];
  leaderboardEl.innerHTML = `<div class="leaderboard-title">Top Captains</div>` +
    rows.map(([id, p], i) => {
      const isMe = parseInt(id) === myId;
      return `<div class="leaderboard-row${isMe ? ' lb-me' : ''}">
        <span class="lb-rank">${rankSymbol[i]}</span>
        <span class="leaderboard-name">${esc(p.name)}</span>
        <span class="lb-k">☠${p.kills}</span>
        <span class="lb-d">💀${p.deaths}</span>
        <span class="lb-coins">🪙${p.doubloons}</span>
      </div>`;
    }).join('');
}

function updateScoreboard(st) {
  const rows = Object.entries(st.players)
    .sort(([, a], [, b]) => b.doubloons - a.doubloons);

  scoreBodyEl.innerHTML = rows.map(([id, p]) => {
    const isMe = parseInt(id) === myId;
    return `<tr class="${isMe ? 'me' : ''}">
      <td>${esc(p.name)}${p.invuln ? ' 🛡' : ''}${!p.alive ? ' 💀' : ''}</td>
      <td>${p.level || 1}</td>
      <td>${p.kills}</td>
      <td>${p.deaths}</td>
      <td>${p.doubloons}</td>
      <td>${Math.round(p.hp)}/${Math.round(p.maxHp)}</td>
    </tr>`;
  }).join('');
}

// ─── Loop ───
function loop() {
  _fpsFrames++;
  const now = performance.now();
  if (now >= _fpsNext) { _fps = _fpsFrames; _fpsFrames = 0; _fpsNext = now + 1000; }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── Boot ───
initAudio();
connect();
</script>
</body>
</html>
