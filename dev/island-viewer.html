<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Island Viewer - Pirate Survivor Dev Museum</title>
  <style>
    html, body { margin: 0; background: #071521; color: #e8f5ff; font-family: system-ui, sans-serif; }
    .wrap { max-width: 1260px; margin: 0 auto; padding: 20px; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    a { color: #9fc2d9; text-decoration: none; }
    a:hover { color: #d6ecff; }
    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
    .panel { border: 1px solid #30516b; border-radius: 8px; background: #10293c; padding: 12px; }
    .controls { display: grid; gap: 10px; align-content: start; }
    .row { display: grid; gap: 4px; font-size: 12px; color: #b8d5e9; }
    .row input, .row select { background: #0f2b41; color: #e8f5ff; border: 1px solid #3b607a; border-radius: 6px; padding: 6px 8px; }
    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }
    .checks label { display: flex; align-items: center; gap: 6px; color: #cfe3f3; }
    button { border: 1px solid #4f7896; background: #123149; color: #e8f5ff; border-radius: 6px; padding: 7px 10px; cursor: pointer; }
    button:hover { background: #17405e; }
    .stats { margin-top: 10px; border-top: 1px solid #30516b; padding-top: 8px; display: grid; gap: 4px; font-size: 12px; color: #cfe3f3; }
    .right { display: grid; grid-template-rows: auto 280px; gap: 12px; }
    .inspectors { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .inspect {
      border: 1px solid #33546e;
      border-radius: 7px;
      background: #0f2b41;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-height: 260px;
    }
    .inspect h3 { margin: 0; font-size: 12px; color: #9fc2d9; text-transform: uppercase; letter-spacing: 0.4px; }
    .inspect pre { margin: 0; font-size: 11px; color: #d9ecfb; white-space: pre-wrap; overflow: auto; line-height: 1.3; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>Island Viewer</h1>
      <a href="/dev/index.html">← Back to Museum</a>
    </div>

    <div class="layout">
      <section class="panel controls">
        <label class="row">Profile<select id="profile"></select></label>
        <label class="row">Seed<input id="seed" type="number" value="1337" /></label>
        <label class="row">Zoom<input id="zoom" type="number" min="0.00001" step="0.01" value="0.22" /></label>
        <div class="row">Camera: drag on canvas to pan · use mouse wheel to zoom at cursor.</div>

        <div class="checks">
          <label><input type="checkbox" id="terrain" checked />Terrain</label>
          <label><input type="checkbox" id="buildings" checked />Buildings</label>
          <label><input type="checkbox" id="foliage" checked />Foliage</label>
          <label><input type="checkbox" id="docks" checked />Docks</label>
          <label><input type="checkbox" id="polygons" />Polygons</label>
        </div>

        <button id="regenBtn" type="button">Regenerate</button>
        <div class="stats" id="stats"></div>
      </section>

      <section class="right">
        <section class="panel" id="stage"></section>
        <section class="inspectors">
          <article class="inspect">
            <h3>Config JSON</h3>
            <pre id="configJson">{}</pre>
          </article>
          <article class="inspect">
            <h3>Selected Island JSON</h3>
            <pre id="selectedIslandJson">{}</pre>
          </article>
          <article class="inspect">
            <h3>Evaluated View JSON</h3>
            <pre id="viewJson">{}</pre>
          </article>
        </section>
      </section>
    </div>
  </main>

  <script type="module">
    import { createDevCanvas } from './shared/devCanvas.js';
    import { createIslandViewerManager } from './shared/islandViewerManager.js';

    const config = await fetch('./data/island-viewer-config.json').then((r) => r.json());
    const manager = createIslandViewerManager(config);

    const profileEl = document.getElementById('profile');
    const seedEl = document.getElementById('seed');
    const zoomEl = document.getElementById('zoom');
    const statsEl = document.getElementById('stats');
    const configJsonEl = document.getElementById('configJson');
    const selectedIslandJsonEl = document.getElementById('selectedIslandJson');
    const viewJsonEl = document.getElementById('viewJson');
    const stageEl = document.getElementById('stage');
    const { canvas, ctx } = createDevCanvas(stageEl, { width: 900, height: 620 });
    configJsonEl.textContent = JSON.stringify(config, null, 2);
    let selectedIsland = null;

    for (const profile of config.profiles || []) {
      const option = document.createElement('option');
      option.value = profile.id;
      option.textContent = profile.label;
      if (profile.id === manager.state.profileId) option.selected = true;
      profileEl.appendChild(option);
    }
    seedEl.value = String(manager.state.seed);

    const layerMap = {
      terrain: document.getElementById('terrain'),
      buildings: document.getElementById('buildings'),
      foliage: document.getElementById('foliage'),
      docks: document.getElementById('docks'),
      polygons: document.getElementById('polygons')
    };

    function syncZoomInput() {
      zoomEl.value = String(Number(manager.state.zoom.toFixed(5)));
    }

    Object.entries(layerMap).forEach(([key, el]) => {
      el.checked = !!manager.state.layers[key];
      el.addEventListener('change', () => {
        manager.state.layers[key] = !!el.checked;
      });
    });

    syncZoomInput();
    zoomEl.addEventListener('change', () => {
      const next = Number(zoomEl.value);
      if (!Number.isFinite(next) || next <= 0) {
        syncZoomInput();
        return;
      }
      manager.zoomAtScreen(next, canvas.width * 0.5, canvas.height * 0.5, canvas.width, canvas.height);
      syncZoomInput();
    });

    function regenerate() {
      manager.regenerate(Number(seedEl.value || 1), profileEl.value);
    }

    document.getElementById('regenBtn').addEventListener('click', regenerate);
    profileEl.addEventListener('change', regenerate);

    let isDragging = false;
    let dragPointerId = null;
    let lastClientX = 0;
    let lastClientY = 0;
    canvas.style.cursor = 'grab';

    canvas.addEventListener('pointerdown', (event) => {
      isDragging = true;
      dragPointerId = event.pointerId;
      lastClientX = event.clientX;
      lastClientY = event.clientY;

      const rect = canvas.getBoundingClientRect();
      const sx = ((event.clientX - rect.left) / rect.width) * canvas.width;
      const sy = ((event.clientY - rect.top) / rect.height) * canvas.height;
      const world = manager.screenToWorld(sx, sy, canvas.width, canvas.height);
      let nearest = null;
      let bestDist = Infinity;
      for (const island of manager.state.islands) {
        const d = Math.hypot(world.x - island.x, world.y - island.y);
        if (d < bestDist) {
          bestDist = d;
          nearest = island;
        }
      }
      selectedIsland = nearest;

      canvas.style.cursor = 'grabbing';
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener('pointermove', (event) => {
      if (!isDragging || event.pointerId !== dragPointerId) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const dx = (event.clientX - lastClientX) * scaleX;
      const dy = (event.clientY - lastClientY) * scaleY;
      manager.panByPixels(dx, dy);
      lastClientX = event.clientX;
      lastClientY = event.clientY;
    });

    function stopDrag(event) {
      if (!isDragging || event.pointerId !== dragPointerId) return;
      isDragging = false;
      dragPointerId = null;
      canvas.style.cursor = 'grab';
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener('pointerup', stopDrag);
    canvas.addEventListener('pointercancel', stopDrag);

    canvas.addEventListener('wheel', (event) => {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = ((event.clientX - rect.left) / rect.width) * canvas.width;
      const sy = ((event.clientY - rect.top) / rect.height) * canvas.height;
      const zoomFactor = Math.exp(-event.deltaY * 0.0015);
      const nextZoom = manager.state.zoom * zoomFactor;
      manager.zoomAtScreen(nextZoom, sx, sy, canvas.width, canvas.height);
      syncZoomInput();
    }, { passive: false });

    function frame() {
      manager.draw(ctx, canvas.width, canvas.height);

      selectedIslandJsonEl.textContent = JSON.stringify(selectedIsland || {}, null, 2);
      viewJsonEl.textContent = JSON.stringify({
        seed: manager.state.seed,
        profile: manager.state.profileId,
        zoom: manager.state.zoom,
        cameraX: manager.state.cameraX,
        cameraY: manager.state.cameraY,
        islandCount: manager.state.islands.length,
        layers: manager.state.layers
      }, null, 2);

      statsEl.innerHTML = `
        <div><strong>Seed:</strong> ${manager.state.seed}</div>
        <div><strong>Profile:</strong> ${manager.state.profileId}</div>
        <div><strong>Islands:</strong> ${manager.state.islands.length}</div>
        <div><strong>World:</strong> ${manager.state.worldWidth} × ${manager.state.worldHeight}</div>
        <div><strong>Zoom:</strong> ${manager.state.zoom.toFixed(5)}</div>
        <div><strong>Camera:</strong> ${manager.state.cameraX.toFixed(1)}, ${manager.state.cameraY.toFixed(1)}</div>
      `;
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
